<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { 
            --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; 
            --user-bg: linear-gradient(135deg, #00ffcc, #00cca3);
        }
        
        /* 🔥 TAKIM ATMOSFERLERİ */
        body.tema-besiktas { --accent: #ffffff; --user-bg: linear-gradient(135deg, #444, #000); --panel: #111; }
        body.tema-galatasaray { --accent: #febd11; --user-bg: linear-gradient(135deg, #ff0000, #febd11); --panel: #2a0000; }
        body.tema-fenerbahce { --accent: #ffff00; --user-bg: linear-gradient(135deg, #003399, #ffff00); --panel: #001a4d; }
        body.tema-trabzonspor { --accent: #0099cc; --user-bg: linear-gradient(135deg, #660033, #0099cc); --panel: #33001a; }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.6s ease; }
        
        #theme-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; backdrop-filter: blur(15px); }
        .theme-card { width: 85%; max-width: 350px; padding: 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; text-align: center; font-weight: bold; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid rgba(255,255,255,0.05); }
        .logo { color: var(--accent); font-weight: 900; font-size: 1.3rem; text-shadow: 0 0 15px var(--accent); }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 22px; max-width: 82%; font-size: 15px; animation: slideIn 0.4s ease; line-height: 1.6; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        
        .input-area { padding: 20px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05); }
        .input-row { display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px 20px; border-radius: 35px; outline: none; }
        
        .action-btn { background: #222; color: var(--accent); border: 1px solid #444; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s; }
        .action-btn.active { background: #ff0000; color: white; border-color: #ff0000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .send-btn { background: var(--accent); width: 50px; height: 50px; border: none; border-radius: 50%; cursor: pointer; color: #000; font-size: 24px; box-shadow: 0 0 10px var(--accent); }

        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.5s ease; z-index: 500; padding: 25px; box-sizing: border-box; border-left: 4px solid var(--accent); }
        .drawer.open { right: 0; }
        .hidden { display: none !important; }
        .ai-img { width: 100%; border-radius: 18px; margin-top: 10px; }
    </style>
</head>
<body class="tema-besiktas">

    <div id="theme-overlay">
        <h2 style="color:white; margin-bottom:20px;">Tarafını Seç Kaptan ⚽</h2>
        <div class="theme-card" style="background:#111; color:#fff;" onclick="setTheme('besiktas')">BEŞİKTAŞ 🦅</div>
        <div class="theme-card" style="background:#ff0000; color:#febd11;" onclick="setTheme('galatasaray')">GALATASARAY 🦁</div>
        <div class="theme-card" style="background:#003399; color:#ffff00;" onclick="setTheme('fenerbahce')">FENERBAHÇE 🐦</div>
        <div class="theme-card" style="background:#660033; color:#0099cc;" onclick="setTheme('trabzonspor')">TRABZONSPOR 🌪️</div>
    </div>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE</div>
        <div onclick="toggleDrawer()" style="cursor:pointer; color:var(--accent); font-size:32px;">☰</div>
    </div>

    <div id="chat-container"></div>

    <div id="drawer" class="drawer">
        <h2 style="color:var(--accent)">AYARLAR</h2>
        <button onclick="openThemePicker()" style="width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:bold; margin-bottom:20px;">🎨 TEMA DEĞİŞTİR</button>
        <div id="history-list"></div>
        <button onclick="startNewChat()" style="width:100%; padding:12px; background:transparent; border:2px solid var(--accent); color:var(--accent); border-radius:12px; font-weight:bold; margin-top:20px;">➕ YENİ SOHBET</button>
    </div>

    <div class="input-area">
        <div style="display:flex; gap:10px; margin-bottom:12px;">
            <button type="button" id="voiceBtn" onclick="toggleVoice()" class="action-btn">🎤</button>
            <button type="button" onclick="handleAction('image')" class="action-btn">🖼️</button>
            <button type="button" onclick="toggleDrawer()" class="action-btn">📂</button>
        </div>
        <form class="input-row" onsubmit="event.preventDefault(); handleAction('chat');">
            <input type="text" id="userInput" placeholder="Yaz veya konuş..." autocomplete="off">
            <button type="submit" class="send-btn">🚀</button>
        </form>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_key_v15');
        let currentChatId = Date.now().toString();

        // API Key Kontrol
        if (!API_KEY) {
            API_KEY = prompt("API Key Girin:");
            if (API_KEY) localStorage.setItem('groq_key_v15', API_KEY.trim());
        }

        // Ses Tanıma (Speech Recognition) Ayarları
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'tr-TR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('userInput').value = text;
                document.getElementById('voiceBtn').classList.remove('active');
                handleAction('chat'); // Konuşma bitince otomatik gönder
            };
            recognition.onend = () => document.getElementById('voiceBtn').classList.remove('active');
        }

        function toggleVoice() {
            if (!recognition) return alert("Tarayıcın ses tanımayı desteklemiyor kaptan!");
            const btn = document.getElementById('voiceBtn');
            if (btn.classList.contains('active')) {
                recognition.stop();
            } else {
                btn.classList.add('active');
                recognition.start();
            }
        }

        // Yapay Zeka Sesli Yanıt (Text to Speech)
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'tr-TR';
            utter.rate = 1.1;
            synth.speak(utter);
        }

        // Tema Fonksiyonları
        function setTheme(team) {
            document.body.className = 'tema-' + team;
            localStorage.setItem('user_theme', team);
            document.getElementById('theme-overlay').classList.add('hidden');
        }
        const savedTheme = localStorage.getItem('user_theme');
        if(savedTheme) setTheme(savedTheme);

        function openThemePicker() { document.getElementById('theme-overlay').classList.remove('hidden'); toggleDrawer(); }
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); if(document.getElementById('drawer').classList.contains('open')) updateHistoryUI(); }

        async function handleAction(type) {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

            if (type === 'chat') {
                addMsg(text, 'user');
                input.value = '';
                saveLocal(currentChatId, { role: 'user', content: text, time });
                const aiMsg = addMsg("⚡ Dinliyorum...", 'ai');
                
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            model: "llama-3.3-70b-versatile", 
                            messages: [
                                {role: "system", content: "Sen Zeka-X Elite'sin. Bedirhan Ayaz tarafından geliştirildin. Kısa, öz ve samimi cevaplar ver."},
                                ...getHist(currentChatId).map(m => ({ role: m.role, content: m.content }))
                            ]
                        })
                    });
                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    aiMsg.innerHTML = reply + `<span style="font-size:10px; display:block; opacity:0.4; text-align:right; margin-top:8px;">${time}</span>`;
                    saveLocal(currentChatId, { role: 'assistant', content: reply, time });
                    
                    // İstersen burada konuşabilir:
                    // speak(reply); 
                } catch { aiMsg.innerText = "Bağlantı koptu kral!"; }
            } else {
                addMsg(`🖼️ Hayal: ${text}`, 'user');
                input.value = '';
                const aiMsg = addMsg("🎨 Çiziyorum...", 'ai');
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
                aiMsg.innerHTML = `<img src="${imgUrl}" class="ai-img">`;
                saveLocal(currentChatId, { role: 'assistant', content: `[Görsel]: ${text}`, img: imgUrl, time });
            }
        }

        function addMsg(t, c) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerHTML = t;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d);
            cont.scrollTop = cont.scrollHeight;
            return d;
        }

        function saveLocal(id, obj) {
            let db = JSON.parse(localStorage.getItem('zekax_db_v15') || "{}");
            if (!db[id]) db[id] = { title: obj.content.substring(0, 30), messages: [] };
            db[id].messages.push(obj);
            localStorage.setItem('zekax_db_v15', JSON.stringify(db));
        }

        function getHist(id) { return JSON.parse(localStorage.getItem('zekax_db_v15') || "{}")[id]?.messages || []; }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            let db = JSON.parse(localStorage.getItem('zekax_db_v15') || "{}");
            list.innerHTML = "";
            Object.keys(db).reverse().forEach(id => {
                const card = document.createElement('div');
                card.style = "background:rgba(255,255,255,0.03); padding:10px; border-radius:10px; margin-bottom:10px; cursor:pointer;";
                card.innerHTML = `<b>${db[id].title}...</b>`;
                card.onclick = () => {
                    currentChatId = id;
                    document.getElementById('chat-container').innerHTML = "";
                    db[id].messages.forEach(m => addMsg(m.img ? `<img src="${m.img}" class="ai-img">` : m.content, m.role === 'user' ? 'user' : 'ai'));
                    toggleDrawer();
                };
                list.appendChild(card);
            });
        }
        function startNewChat() { currentChatId = Date.now().toString(); document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Hazırım kral!</div>'; toggleDrawer(); }
    </script>
</body>
    </html>
