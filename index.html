<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { --bg: #050505; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; }
        .user { align-self: flex-end; background: var(--accent); color: #000; }
        .ai { align-self: flex-start; background: #222; }
        .input-box { padding: 15px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; background: #222; color: #fff; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div style="padding:15px; background:#111; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
        <span style="color:var(--accent); font-weight:bold;">⚡ ZEKA-X 🦾</span>
        <button onclick="localStorage.removeItem('groq_key'); location.reload();" style="font-size:10px; padding:5px;">ANAHTARI SIFIRLA</button>
    </div>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Bir şey yaz...">
        <button onclick="send()">🚀</button>
    </div>

    <script>
        let key = localStorage.getItem('groq_key');
        if (!key) {
            key = prompt("Groq API Anahtarını (gsk_...) gir:");
            if (key) localStorage.setItem('groq_key', key.trim());
        }

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || !key) return;

            addMsg("👤 Sen: " + text, 'user');
            input.value = '';
            const aiMsg = addMsg("🤖 Düşünüyorum...", 'ai');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", // En güncel model
                        messages: [{ role: "user", content: text }] 
                    })
                });
                const data = await res.json();
                if (data.choices) aiMsg.innerText = "🤖 Zeka-X: " + data.choices[0].message.content;
                else throw new Error();
            } catch {
                aiMsg.innerText = "❌ Hata! Anahtarın yanlış olabilir veya Groq şu an yoğun.";
            }
        }

        function addMsg(t, c) {
            const d = document.createElement('div');
            d.className = 'msg ' + c;
            d.innerText = t;
            document.getElementById('chat').appendChild(d);
            return d;
        }
    </script>
</body>
</html>
