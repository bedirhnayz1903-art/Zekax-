<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility 3D: Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-size: 20px; text-shadow: 0 0 10px #00f2ff; pointer-events: none; }
        #story-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; padding: 15px; border-radius: 10px; color: white; text-align: center; pointer-events: none; transition: 0.5s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 1px solid rgba(0,242,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="ui">Healility Senkronizasyonu: <span id="dist">0</span>%</div>
    <div id="crosshair"></div>
    <div id="story-box"><b>KİBO:</b> "Bağlantı başarılı. Derin ağın 3. katmanındayız. Takip et beni!"</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, kibo, clock;
        let platforms = [];
        let speed = 0.15;
        let velocity = 0;
        let jumping = false;
        let score = 0;

        const messages = [
            "Güzel! Neon yolları takip et, aşağısı sonsuz bir boşluk.",
            "Healility sunucuları uyanıyor... Daha hızlı olmalısın!",
            "Ekibin diğer üyeleri çıkış kapısını hazırlıyor. Az kaldı!"
        ];

        init();
        animate();

        function init() {
            // Sahne ve Kamera
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05); // Sis efekti ile derinlik
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Işıklar
            const ambient = new THREE.AmbientLight(0x404040, 2); 
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0x00f2ff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // Oyuncu (3D Kapsül Model)
            const pGeo = new THREE.CapsuleGeometry(0.4, 0.8, 4, 16);
            const pMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc, emissive: 0x004433 });
            player = new THREE.Mesh(pGeo, pMat);
            player.position.y = 1;
            scene.add(player);

            // Yardımcı Dron KİBO (Parlayan Küre)
            const kGeo = new THREE.SphereGeometry(0.2, 16, 16);
            const kMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00f2ff, emissiveIntensity: 2 });
            kibo = new THREE.Mesh(kGeo, kMat);
            scene.add(kibo);

            // İlk Platformlar
            for(let i=0; i<15; i++) createPlatform(i * -8);

            clock = new THREE.Clock();

            // Kontroller
            window.addEventListener('mousedown', () => { if(!jumping) { velocity = 0.22; jumping = true; } });
            window.addEventListener('touchstart', () => { if(!jumping) { velocity = 0.22; jumping = true; } });
        }

        function createPlatform(z) {
            const width = 3 + Math.random() * 2;
            const geo = new THREE.BoxGeometry(width, 0.4, 6);
            const mat = new THREE.MeshPhongMaterial({ color: 0x111122, emissive: 0x050510 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Neon Kenar Efekti
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00f2ff }));
            mesh.add(line);

            mesh.position.set((Math.random() - 0.5) * 4, 0, z);
            scene.add(mesh);
            platforms.push(mesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            // Karakter İleri Gidiş
            player.position.z -= speed;
            score += 1;
            document.getElementById('dist').innerText = Math.floor(score / 10);

            // Zıplama Fiziği
            player.position.y += velocity;
            if(player.position.y > 0.8) {
                velocity -= 0.012; // Yerçekimi
            } else {
                // Platform Kontrolü
                let onSolid = false;
                platforms.forEach(p => {
                    if(Math.abs(player.position.z - p.position.z) < 3 && Math.abs(player.position.x - p.position.x) < 2) {
                        onSolid = true;
                    }
                });

                if(onSolid) {
                    player.position.y = 0.8;
                    velocity = 0;
                    jumping = false;
                } else if(player.position.y < -5) {
                    // Düştü - Reset
                    player.position.set(0, 1, 0);
                    score = 0;
                }
            }

            // KİBO Takip Mekaniği (Seni izleyen yardımcı)
            kibo.position.x = player.position.x + Math.sin(delta * 2) * 1.5;
            kibo.position.y = player.position.y + 1.5 + Math.cos(delta * 3) * 0.5;
            kibo.position.z = player.position.z - 2;

            // Kamera Takibi (TPS Kamera)
            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 3, player.position.z + 7), 0.1);
            camera.lookAt(player.position);

            // Sonsuz Yol Üretimi
            if(player.position.z < platforms[platforms.length-1].position.z + 50) {
                createPlatform(platforms[platforms.length-1].position.z - 8);
                if(platforms.length > 20) {
                    scene.remove(platforms.shift());
                }
            }

            // Hikaye Güncelleme
            if(score % 500 === 0) {
                const msg = messages[Math.floor(Math.random() * messages.length)];
                document.getElementById('story-box').innerHTML = `<b>KİBO:</b> "${msg}"`;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
