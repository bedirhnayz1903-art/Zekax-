<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Hybrid Intelligence</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a73e8; --bg: #ffffff; --t: #202124; --s: #f8f9fa; --b: #dadce0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--t); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- GÄ°RÄ°Ĺž PANELÄ° --- */
        #gate-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 0.5s;
        }
        .logo-big { font-size: 52px; font-weight: 800; color: var(--p); letter-spacing: -3px; margin-bottom: 40px; }
        .login-box { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .guest-btn {
            background: none; border: 1px solid var(--b); color: #5f6368;
            padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: 600;
            transition: 0.3s; width: 200px;
        }
        .guest-btn:hover { background: #f1f3f4; border-color: #999; }

        /* --- MAIN UI --- */
        header { padding: 15px 40px; border-bottom: 1px solid var(--b); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .u-info { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
        .u-pic { width: 32px; height: 32px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; border: 1px solid var(--b); overflow: hidden; }
        .u-pic img { width: 100%; height: 100%; object-fit: cover; }

        #chat-flow { flex: 1; padding: 30px 18%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .m-wrap { display: flex; flex-direction: column; max-width: 85%; animation: msgIn 0.4s ease; }
        .u-wrap { align-self: flex-end; }
        .a-wrap { align-self: flex-start; }
        .m-label { font-size: 10px; font-weight: 800; color: #5f6368; margin-bottom: 6px; text-transform: uppercase; }
        .u-wrap .m-label { text-align: right; }
        .bubble { padding: 16px 22px; border-radius: 20px; font-size: 16px; line-height: 1.6; }
        .u-bubble { background: var(--p); color: #fff; border-bottom-right-radius: 4px; }
        .a-bubble { background: var(--s); color: var(--t); border: 1px solid var(--b); border-bottom-left-radius: 4px; }

        footer { padding: 25px 18%; background: #fff; border-top: 1px solid var(--b); }
        .i-group { display: flex; background: var(--s); border-radius: 40px; padding: 8px 10px 8px 30px; align-items: center; }
        input { flex: 1; border: none; background: transparent; padding: 12px 0; font-size: 17px; outline: none; }
        .s-btn { background: var(--p); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="gate-screen">
    <div class="logo-big">HEALILITY</div>
    <div class="login-box">
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="onGoogleSignIn"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        
        <p style="color: #999; font-size: 13px;">veya</p>
        
        <button class="guest-btn" onclick="Core.guestEntry()">Misafir Olarak Devam Et</button>
    </div>
</div>

<header>
    <div style="font-weight: 800; font-size: 22px; color: var(--p);">HEALILITY</div>
    <div id="u-display" class="u-info"></div>
</header>

<div id="chat-flow"></div>

<footer>
    <div class="i-group">
        <input type="text" id="ai-input" placeholder="Yaz bakalÄ±m, buradayÄ±m..." autocomplete="off">
        <button class="s-btn" onclick="Core.send()">âž”</button>
    </div>
</footer>

<script>
    // --- GOOGLE SIGN IN CALLBACK ---
    function onGoogleSignIn(response) {
        try {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const data = JSON.parse(window.atob(base64));
            
            Core.memory.name = data.given_name;
            Core.updateHeader(data.given_name, data.picture);
            Core.enterApp("Google");
        } catch (err) {
            console.error("GiriĹź HatasÄ±:", err);
            alert("Google giriĹźi Ĺźu an yapÄ±lamÄ±yor, lĂĽtfen Misafir modunu kullan kanka.");
        }
    }

    const Core = {
        flow: document.getElementById('chat-flow'),
        field: document.getElementById('ai-input'),
        memory: { name: "Dostum", mode: "Guest" },

        guestEntry() {
            this.memory.name = "Dostum";
            this.updateHeader("Misafir", null);
            this.enterApp("Guest");
        },

        enterApp(type) {
            document.getElementById('gate-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gate-screen').remove();
                this.welcome(type);
            }, 500);
        },

        updateHeader(name, pic) {
            const html = `
                <span>${name}</span>
                <div class="u-pic">${pic ? `<img src="${pic}">` : 'đź‘¤'}</div>
            `;
            document.getElementById('u-display').innerHTML = html;
        },

        welcome(type) {
            let msg = type === "Google" 
                ? `Selam **${this.memory.name}**! Google ile baÄźlandÄ±n, artÄ±k seni tanÄ±yorum. Neler yapÄ±yoruz bugĂĽn?`
                : `Selam! Misafir olarak giriĹź yaptÄ±n. Kim olduÄźunu sĂ¶yleyene kadar sana **Dostum** diyeceÄźim. Muhabbete baĹźlayalÄ±m mÄ±?`;
            this.render(msg, 'ai');
        },

        process(input) {
            const raw = input.toLowerCase().trim();

            // MATEMATÄ°K (Her zaman aktif)
            let m = raw.replace(/x/g, '*').replace(/Ă·/g, '/').replace(/,/g, '.');
            if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(m) && m.length >= 3) {
                try { return `HesapladÄ±m: **${eval(m)}**. BaĹźka iĹźlem var mÄ±?`; } catch(e){}
            }

            // Ä°SÄ°M Ă–ÄžRENME (Misafir Modu Ä°Ă§in)
            if (raw.includes("adÄ±m") || raw.includes("ismim") || raw.startsWith("ben ")) {
                let n = input.split(" ").pop().replace(/[^a-zA-ZÄźĂĽĹźÄ±Ă¶Ă§ÄžĂśĹžÄ°Ă–Ă‡]/g, "");
                this.memory.name = n;
                this.updateHeader(n, null);
                return `TamamdÄ±r **${n}**, adÄ±nÄ± hafÄ±zama kazÄ±dÄ±m!`;
            }

            // SAMÄ°MÄ° CEVAPLAR
            if (raw === "naber" || raw === "nasÄ±lsÄ±n") return `Ä°yiyim be kanka, senden naber? BugĂĽn enerji tavan!`;
            if (raw.includes("beĹźiktaĹź")) return "BeĹźiktaĹź JK! đź¦… Siyah beyaz aĹźkÄ±! Sence bu hafta ne yaparÄ±z?";
            if (["yok", "hayÄ±r", "boĹźver"].some(w => raw === w)) return "Eyvallah, sen nasÄ±l istersen Ă¶yle olsun.";

            const randoms = ["Valla ilginĂ§ bir konu...", "Hadi ya? Anlat dinliyorum.", "DoÄźru sĂ¶ze ne denir?", "Seni anlÄ±yorum kanka."];
            return randoms[Math.floor(Math.random() * randoms.length)];
        },

        send() {
            const val = this.field.value.trim();
            if(!val) return;
            this.render(val, 'u');
            this.field.value = "";
            setTimeout(() => this.render(this.process(val), 'ai'), 600);
        },

        render(txt, side) {
            const w = document.createElement('div');
            w.className = `m-wrap ${side}-wrap`;
            const l = document.createElement('span');
            l.className = 'm-label';
            l.innerText = side === 'u' ? this.memory.name : 'Healility';
            const b = document.createElement('div');
            b.className = `bubble ${side}-bubble`;
            b.innerHTML = txt;
            w.appendChild(l); w.appendChild(b);
            this.flow.appendChild(w);
            this.flow.scrollTop = this.flow.scrollHeight;
        }
    };

    Core.field.addEventListener("keypress", (e) => { if(e.key === "Enter") Core.send(); });
</script>

</body>
</html>
