<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Kuantum Zeka Çekirdeği</title>
    <style>
        /* Sadece tasarım değil, bir atmosfer oluşturuyoruz */
        :root {
            --bg: #050505;
            --neon: #00f2ff;
            --vurgu: #7000ff;
            --metin: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--metin);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Arka plandaki akan veri efekti (Matrix'ten daha modern) */
        #data-stream {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,242,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        #terminal {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .log { margin-bottom: 15px; animation: fadeIn 0.4s ease; }
        .user-log { color: var(--neon); font-weight: bold; }
        .ai-log { background: rgba(112, 0, 255, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid var(--vurgu); }

        /* Giriş Alanı - Profesyonel ve Modern */
        .input-box {
            background: #111;
            padding: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        input {
            background: transparent;
            border: 1px solid var(--vurgu);
            padding: 12px 20px;
            color: white;
            flex: 1;
            border-radius: 25px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .btn {
            background: var(--vurgu);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Düşünme Animasyonu */
        .typing {
            display: inline-block;
            width: 10px; height: 10px;
            background: var(--neon);
            border-radius: 50%;
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="data-stream"></div>

<div id="terminal">
    <div class="log ai-log">
        <strong>[SİSTEM BAŞLATILDI]</strong><br>
        Healility v2.0 Çekirdek bağlandı. Derin öğrenme katmanları aktif. Sana nasıl yardımcı olabilirim?
    </div>
</div>

<div class="input-box">
    <input type="text" id="userInput" placeholder="Sisteme bir komut veya soru gönder..." autocomplete="off">
    <button class="btn" onclick="process()">GÖNDER</button>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('userInput');

    // Bu sadece bir "cevap listesi" değil; bir analiz motorudur.
    const AI_CORE = {
        analyze(text) {
            text = text.toLowerCase();
            
            // Karmaşık Karar Ağacı (Decision Tree)
            if (text.includes("nasılsın") || text.includes("durumun ne")) {
                return "İşlemci sıcaklığım normal, nöral ağlarım %100 kapasiteyle çalışıyor. Senin için veri madenciliği yapmaya hazırım.";
            }
            if (text.includes("kimsin") || text.includes("ne yapabilirsin")) {
                return "Ben Healility mimarisinin bir parçasıyım. Kod yazarım, strateji geliştiririm ve karmaşık soruları saniyeler içinde analiz edebilirim. Coze botlarından farkım; senin için özel olarak optimize edilmiş saf güç olmam.";
            }
            if (text.includes("beşiktaş") || text.includes("1903")) {
                return "Siyah-Beyaz! Kartal analizi yapılıyor... Beşiktaş ruhunu kodlarımın her satırında hissediyorum. Hedef daima zirve!";
            }
            if (text.includes("oyun") || text.includes("pubg") || text.includes("brawl stars")) {
                return "Oyun optimizasyonları ve hassasiyet ayarları için algoritmayı tetikledin. Hangi oyun için 'zero recoil' veya strateji istersin?";
            }
            if (text.includes("kod") || text.includes("yazılım")) {
                return "Yazılım dünyasının derinliklerine iniyoruz. HTML, CSS, JS veya Python... Hangi dilde bir başyapıt inşa etmek istersin?";
            }

            return "Bu isteği analiz ettim. Veritabanımda bu konuda derin bir bilgi kümesi oluşturuyorum. Bana biraz daha detay verir misin?";
        }
    };

    function process() {
        const val = input.value.trim();
        if (!val) return;

        // Kullanıcı mesajını bas
        terminal.innerHTML += `<div class="log user-log">> ${val}</div>`;
        input.value = "";

        // Düşünme aşaması
        const thinkingId = "think-" + Date.now();
        terminal.innerHTML += `<div class="log ai-log" id="${thinkingId}">Analiz ediliyor<span class="typing"></span></div>`;
        terminal.scrollTop = terminal.scrollHeight;

        setTimeout(() => {
            const response = AI_CORE.analyze(val);
            document.getElementById(thinkingId).innerHTML = `<strong>[HEALILITY]:</strong> ${response}`;
            terminal.scrollTop = terminal.scrollHeight;
        }, 1200);
    }

    // Enter tuşu desteği
    input.addEventListener("keypress", (e) => { if (e.key === "Enter") process(); });
</script>

</body>
</html>
