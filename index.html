<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobil 2D Oyun</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #222;
}

canvas {
    display: block;
    margin: auto;
    background: #eee;
}

/* Butonlar */
.controls {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
}

.left-controls {
    display: flex;
    gap: 10px;
}

.right-controls {
    display: flex;
    gap: 10px;
}

button {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    font-size: 20px;
    background: rgba(0,0,0,0.5);
    color: white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="controls">
    <div class="left-controls">
        <button id="left">◀</button>
        <button id="right">▶</button>
    </div>
    <div class="right-controls">
        <button id="jump">⤒</button>
        <button id="shoot">🔥</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.8;

// Oyuncu
let player = {
    x: 100,
    y: canvas.height - 100,
    w: 40,
    h: 50,
    velY: 0,
    speed: 5,
    jumping: false
};

// Düşman
let enemy = {
    x: canvas.width - 100,
    y: canvas.height - 100,
    w: 40,
    h: 50
};

let bullets = [];
const gravity = 0.5;

// Dokunma durumları
let moveLeft = false;
let moveRight = false;

// Butonlar
const leftBtn = document.getElementById("left");
const rightBtn = document.getElementById("right");
const jumpBtn = document.getElementById("jump");
const shootBtn = document.getElementById("shoot");

// Hareket
leftBtn.ontouchstart = () => moveLeft = true;
leftBtn.ontouchend = () => moveLeft = false;

rightBtn.ontouchstart = () => moveRight = true;
rightBtn.ontouchend = () => moveRight = false;

// Zıplama
jumpBtn.ontouchstart = () => {
    if (!player.jumping) {
        player.velY = -12;
        player.jumping = true;
    }
};

// Ateş
shootBtn.ontouchstart = () => {
    bullets.push({
        x: player.x + player.w,
        y: player.y + 20,
        w: 10,
        h: 5,
        speed: 10
    });
};

// Çarpışma
function collide(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function update() {
    if (moveLeft) player.x -= player.speed;
    if (moveRight) player.x += player.speed;

    player.velY += gravity;
    player.y += player.velY;

    if (player.y >= canvas.height - 100) {
        player.y = canvas.height - 100;
        player.jumping = false;
    }

    bullets.forEach((b, i) => {
        b.x += b.speed;

        if (collide(b, enemy)) {
            console.log("Düşman vuruldu!");
            bullets.splice(i, 1);
        }

        if (b.x > canvas.width) {
            bullets.splice(i, 1);
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Oyuncu
    ctx.fillStyle = "blue";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // Düşman
    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

    // Mermiler
    ctx.fillStyle = "black";
    bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
