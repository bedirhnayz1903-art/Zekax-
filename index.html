<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X | PRO CHAT</title>
    <style>
        :root { --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 1px solid #222; }
        .logo { color: var(--accent); font-weight: bold; font-size: 1.1rem; }
        .menu-btn { font-size: 24px; cursor: pointer; color: var(--accent); }

        /* Sohbet Ekranı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; }
        .ai { align-self: flex-start; background: #1d1d1d; border: 1px solid #333; }

        /* Geçmiş Paneli (Drawer) */
        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.4s; z-index: 100; padding: 20px; box-sizing: border-box; box-shadow: -10px 0 30px #000; }
        .drawer.open { right: 0; }
        .drawer-h { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        
        #history-list { overflow-y: auto; max-height: 75vh; }
        .chat-topic { background: #1d1d1d; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border-left: 4px solid var(--accent); font-size: 14px; display: flex; justify-content: space-between; }
        .chat-topic span { opacity: 0.6; font-size: 11px; }

        /* Giriş Alanı */
        .input-area { padding: 15px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #1d1d1d; border: 1px solid #333; color: white; padding: 12px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        
        .new-chat-btn { background: #222; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ZEKA-X ELITE</div>
        <div class="menu-btn" onclick="toggleDrawer()">⋮</div>
    </div>

    <div id="chat-container">
        <div class="msg ai">Merhaba! Ben Zeka-X. Sana nasıl yardımcı olabilirim?</div>
    </div>

    <div id="drawer" class="drawer">
        <div class="drawer-h">
            <span style="font-weight:bold; color:var(--accent);">GEÇMİŞ KONULAR</span>
            <span onclick="toggleDrawer()" style="cursor:pointer; font-size:24px;">✕</span>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">+ Yeni Sohbet Başlat</button>
        <div id="history-list"></div>
        <button onclick="clearAll()" style="background:#331111; color:red; border:none; width:100%; padding:10px; border-radius:10px; margin-top:20px;">Tüm Geçmişi Sil</button>
    </div>

    <form class="input-area" onsubmit="event.preventDefault(); handleSend();">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın..." autocomplete="off">
        <button type="submit" class="send-btn">➤</button>
    </form>

    <script>
        let currentChatId = Date.now().toString(); // Her girişte yeni bir ID
        const API_KEY = "BURAYA_API_KEY_GELECEK"; // Kendi API anahtarını buraya yapıştır!

        window.onload = loadHistoryList;

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            if(document.getElementById('drawer').classList.contains('open')) loadHistoryList();
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            
            // Mesajı hafızaya kaydet
            saveMessage(currentChatId, { role: 'user', content: text });

            // AI Cevabı (Taslak)
            const aiLoadingMsg = addMessage("Düşünüyor...", 'ai');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: text }]
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiLoadingMsg.textContent = aiText;
                saveMessage(currentChatId, { role: 'assistant', content: aiText });
            } catch (e) {
                aiLoadingMsg.textContent = "Bağlantı hatası! Lütfen API anahtarını kontrol et.";
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function saveMessage(chatId, msgObj) {
            let allChats = JSON.parse(localStorage.getItem('zekax_v4_chats') || "{}");
            if (!allChats[chatId]) allChats[chatId] = { title: msgObj.content.substring(0, 20) + "...", messages: [] };
            allChats[chatId].messages.push(msgObj);
            localStorage.setItem('zekax_v4_chats', JSON.stringify(allChats));
        }

        function loadHistoryList() {
            const list = document.getElementById('history-list');
            let allChats = JSON.parse(localStorage.getItem('zekax_v4_chats') || "{}");
            list.innerHTML = "";
            
            Object.keys(allChats).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = 'chat-topic';
                item.innerHTML = `<div>${allChats[id].title}</div> <span>${new Date(parseInt(id)).toLocaleDateString()}</span>`;
                item.onclick = () => loadSpecificChat(id);
                list.appendChild(item);
            });
        }

        function loadSpecificChat(id) {
            currentChatId = id;
            let allChats = JSON.parse(localStorage.getItem('zekax_v4_chats') || "{}");
            const container = document.getElementById('chat-container');
            container.innerHTML = ""; // Ekranı temizle
            
            allChats[id].messages.forEach(m => {
                addMessage(m.content, m.role === 'user' ? 'user' : 'ai');
            });
            toggleDrawer(); // Paneli kapat
        }

        function startNewChat() {
            currentChatId = Date.now().toString();
            document.getElementById('chat-container').innerHTML = '<div class="msg ai">Yeni bir sohbet başladı! Sorunu sorabilirsin.</div>';
            toggleDrawer();
        }

        function clearAll() {
            if(confirm("Tüm sohbetler silinsin mi?")) {
                localStorage.removeItem('zekax_v4_chats');
                location.reload();
            }
        }
    </script>
</body>
    </html>
