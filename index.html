<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility 3D: Çatışma</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; border: 2px solid #00f2ff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; pointer-events: none; }
        #story { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.8); border: 1px solid #ff0055; padding: 15px; border-radius: 10px; color: white; text-align: center; pointer-events: none; }
        #health-bar { width: 200px; height: 10px; background: #333; border: 1px solid #00f2ff; margin-top: 5px; }
        #health-fill { width: 100%; height: 100%; background: #00f2ff; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="ui">
        SİSTEM DURUMU: AKTİF<br>
        DÜŞMAN İMHASI: <span id="kills">0</span>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>
    <div id="crosshair"></div>
    <div id="story"><b>KİBO:</b> "Güvenlik botları sisteme sızdı! Onları Healility sunucularından uzak tut!"</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, kibo, clock;
        let bullets = [], enemies = [];
        let canShoot = true, health = 100, kills = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5); // Göz hizası

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Zemin (Grid)
            const grid = new THREE.GridHelper(100, 50, 0x00f2ff, 0x050515);
            scene.add(grid);

            // Işıklandırma
            const light = new THREE.PointLight(0x00f2ff, 2, 50);
            light.position.set(0, 5, 5);
            scene.add(light);

            // KİBO (Takipçi Dron)
            const kiboGeo = new THREE.IcosahedronGeometry(0.3, 0);
            const kiboMat = new THREE.MeshPhongMaterial({ color: 0x00f2ff, wireframe: true });
            kibo = new THREE.Mesh(kiboGeo, kiboMat);
            scene.add(kibo);

            // Kontroller (Ateş Etme)
            window.addEventListener('mousedown', shoot);
            window.addEventListener('touchstart', shoot);

            clock = new THREE.Clock();
            spawnEnemy();
        }

        function shoot() {
            if (!canShoot) return;
            
            // Mermi oluştur
            const bGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const bMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bGeo, bMat);
            
            bullet.position.copy(camera.position);
            bullet.position.y -= 0.2; // Hafif aşağıdan çıksın
            
            // Ateş yönü
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = direction.multiplyScalar(0.8);
            
            bullets.push(bullet);
            scene.add(bullet);

            // KİBO tepkisi
            kibo.scale.set(1.5, 1.5, 1.5);
            setTimeout(() => kibo.scale.set(1, 1, 1), 100);
        }

        function spawnEnemy() {
            const eGeo = new THREE.BoxGeometry(1, 2, 1);
            const eMat = new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0x330011 });
            const enemy = new THREE.Mesh(eGeo, eMat);
            
            // Rastgele konum (ileride)
            enemy.position.set((Math.random() - 0.5) * 20, 1, -20 - Math.random() * 20);
            enemies.push(enemy);
            scene.add(enemy);

            // Sürekli düşman üret
            setTimeout(spawnEnemy, 2000 - Math.min(kills * 50, 1500));
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            // 1. KİBO Hareketi (Kamera yanında süzülür)
            kibo.position.x = camera.position.x + Math.sin(delta) * 1.2 + 1;
            kibo.position.y = camera.position.y + Math.cos(delta * 1.5) * 0.3 + 0.5;
            kibo.position.z = camera.position.z - 2;
            kibo.rotation.y += 0.05;

            // 2. Mermi Hareketleri
            bullets.forEach((b, index) => {
                b.position.add(b.userData.velocity);
                if (b.position.z < -100) {
                    scene.remove(b);
                    bullets.splice(index, 1);
                }
            });

            // 3. Düşman Hareketleri ve Çarpışma
            enemies.forEach((e, eIdx) => {
                // Oyuncuya doğru yürü
                const dir = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
                e.position.add(dir.multiplyScalar(0.05 + (kills * 0.002)));
                e.lookAt(camera.position);

                // Mermi çarptı mı?
                bullets.forEach((b, bIdx) => {
                    if (e.position.distanceTo(b.position) < 1) {
                        scene.remove(e);
                        enemies.splice(eIdx, 1);
                        scene.remove(b);
                        bullets.splice(bIdx, 1);
                        kills++;
                        document.getElementById('kills').innerText = kills;
                        if(kills % 5 === 0) updateStory();
                    }
                });

                // Oyuncuya çarptı mı?
                if (e.position.distanceTo(camera.position) < 1.5) {
                    health -= 0.5;
                    document.getElementById('health-fill').style.width = health + "%";
                    if(health <= 0) location.reload(); // Öldün
                }
            });

            renderer.render(scene, camera);
        }

        function updateStory() {
            const lines = [
                "KİBO: 'İnanılmaz atış! Veri tabanları temizleniyor.'",
                "KİBO: 'Dikkat et, sağ taraftan yeni bir dalga geliyor!'",
                "KİBO: 'Healility protokolü %50 tamamlandı. Dayan!'",
                "KİBO: 'Gelişmiş botlar tespit edildi! Odaklan!'"
            ];
            document.getElementById('story').innerHTML = `<b>KİBO:</b> "${lines[Math.floor(Math.random()*lines.length)]}"`;
        }
    </script>
</body>
</html>
