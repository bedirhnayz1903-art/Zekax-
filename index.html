<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility: Sniper Elite v5</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --danger: #ff0055; --dark: rgba(0, 10, 20, 0.9); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }

        /* Gelişmiş HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 10px; color: white; }

        /* Eğitim Paneli */
        #tutorial-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white; padding: 20px;
        }
        .step-card { border-top: 4px solid var(--neon); padding: 30px; border-radius: 15px; background: var(--dark); max-width: 300px; }

        /* Butonlar */
        .btn-grid { position: absolute; bottom: 30px; left: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; pointer-events: auto; }
        .control-btn {
            width: 70px; height: 70px; background: var(--dark); border: 2px solid var(--neon);
            border-radius: 50%; color: var(--neon); font-size: 10px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--neon);
            transition: 0.2s;
        }
        .control-btn:active { transform: scale(0.9); background: var(--neon); color: black; }

        #scope-view {
            position: absolute; inset: 0; border: 250px solid black; border-radius: 50%;
            display: none; pointer-events: none; z-index: 5; transform: scale(2);
        }

        #ammo-v { font-size: 40px; font-weight: 900; color: var(--gold); }
    </style>
</head>
<body>

    <div id="tutorial-overlay">
        <div class="step-card" id="tutorial-card">
            <h2 style="color: var(--neon)">HOŞ GELDİN ASKER</h2>
            <p id="tut-text">Ben KİBO. Healility binasının tepesindesin. Şehri korumak için önce temel eğitimi tamamlamalısın.</p>
            <button onclick="nextStep()" style="background:var(--neon); border:none; padding:10px 20px; border-radius:5px; font-weight:bold;">ANLAŞILDI</button>
        </div>
    </div>

    <div id="scope-view"></div>

    <div id="hud">
        <div style="display: flex; justify-content: space-between;">
            <div class="glass-panel">🛰️ SİNYAL: GÜÇLÜ <br> RAKIM: 120m</div>
            <div class="glass-panel">İMHASI: <span id="score">0</span></div>
        </div>

        <div class="btn-grid">
            <div class="control-btn" onclick="toggleZoom()">DÜRBÜN</div>
            <div class="control-btn" onclick="startReload()">MÜHİMMAT</div>
            <div class="control-btn" onclick="changeWeather()">HAVA DURUMU</div>
            <div class="control-btn" onclick="toggleKibo()">KİBO GİZLE</div>
        </div>

        <div style="align-self: flex-end; text-align: right;">
            <div id="ammo-v">10/10</div>
            <div class="glass-panel" style="border-right: 5px solid var(--neon)">
                <b>KİBO STATUS:</b> <span id="kibo-status">Aktif</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock, kibo, sniperRifle;
        let ammo = 10, kills = 0, isZoomed = false, tutStep = 0;
        let enemies = [], bullets = [], buildings = [];
        let moveTarget = new THREE.Vector2(), currentMove = new THREE.Vector2();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 250);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 70, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Güneş
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // ŞEHİR KURULUMU
            createCity();

            // KİBO
            kibo = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.7, 1),
                new THREE.MeshStandardMaterial({ color: 0x00f2ff, wireframe: true })
            );
            scene.add(kibo);

            // MOBİL KONTROL
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                moveTarget.x = -((t.clientX / window.innerWidth) - 0.5) * 2.5;
                moveTarget.y = -Math.PI/3 - ((t.clientY / window.innerHeight) - 0.5) * 1.5;
            });

            window.addEventListener('touchstart', (e) => {
                if(e.target.tagName !== 'BUTTON' && e.target.className !== 'control-btn' && tutStep >= 2) shoot();
            });

            clock = new THREE.Clock();
        }

        function createCity() {
            // Sniper Yuvası (Binamız)
            const myTower = new THREE.Mesh(
                new THREE.BoxGeometry(30, 180, 30),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            myTower.position.y = -20;
            scene.add(myTower);

            // Şehir Binaları (Detaylı)
            for(let i=0; i<80; i++) {
                const h = 20 + Math.random() * 100;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(15, h, 15),
                    new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${Math.random()*360}, 40%, 30%)`) })
                );
                b.position.set((Math.random()-0.5)*600, h/2 - 70, (Math.random()-0.5)*600 - 150);
                scene.add(b);
            }

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000,2000), new THREE.MeshStandardMaterial({color: 0x333333}));
            floor.rotation.x = -Math.PI/2; floor.position.y = -70;
            scene.add(floor);
        }

        function nextStep() {
            tutStep++;
            const text = document.getElementById('tut-text');
            if(tutStep === 1) {
                text.innerText = "Ekranı kaydırarak etrafa bakabilirsin. Binanın altındaki hedefleri tespit et.";
            } else if(tutStep === 2) {
                text.innerText = "Harika! Şimdi ekrana dokunarak ateş etmeyi dene. Mermin biterse 'MÜHİMMAT' butonunu kullan.";
                document.getElementById('tutorial-overlay').style.background = "transparent";
                document.getElementById('tutorial-card').style.marginTop = "20px";
            } else {
                document.getElementById('tutorial-overlay').style.display = "none";
                spawnEnemies();
            }
        }

        function toggleZoom() {
            isZoomed = !isZoomed;
            camera.fov = isZoomed ? 15 : 65;
            camera.updateProjectionMatrix();
            document.getElementById('scope-view').style.display = isZoomed ? "block" : "none";
        }

        function startReload() {
            document.getElementById('ammo-v').innerText = "WAIT";
            setTimeout(() => { ammo = 10; updateUI(); }, 1500);
        }

        function changeWeather() {
            const colors = [0x87CEEB, 0xffa500, 0x444444];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            scene.background = new THREE.Color(randomColor);
            scene.fog.color = new THREE.Color(randomColor);
        }

        function toggleKibo() {
            kibo.visible = !kibo.visible;
            document.getElementById('kibo-status').innerText = kibo.visible ? "Aktif" : "Gizli";
        }

        function shoot() {
            if(ammo <= 0) return;
            ammo--; updateUI();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.v = dir.multiplyScalar(6);
            bullets.push(b);
            scene.add(b);
        }

        function spawnEnemies() {
            const e = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.5), new THREE.MeshStandardMaterial({color: 0xff0000}));
            e.add(body);
            e.position.set((Math.random()-0.5)*200, -68, (Math.random()-0.5)*200 - 100);
            e.userData.vx = (Math.random()-0.5) * 0.2;
            enemies.push(e);
            scene.add(e);
            setTimeout(spawnEnemies, 2000);
        }

        function updateUI() {
            document.getElementById('ammo-v').innerText = ammo + "/10";
            document.getElementById('score').innerText = kills;
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            currentMove.x += (moveTarget.x - currentMove.x) * 0.1;
            currentMove.y += (moveTarget.y - currentMove.y) * 0.1;
            camera.rotation.set(currentMove.y, currentMove.x, 0);

            kibo.position.set(camera.position.x + 4, camera.position.y + Math.sin(t)*2, camera.position.z - 8);
            kibo.rotation.y += 0.05;

            bullets.forEach((b, i) => {
                b.position.add(b.userData.v);
                if(b.position.y < -70) { scene.remove(b); bullets.splice(i,1); }
                enemies.forEach((e, ei) => {
                    if(b.position.distanceTo(e.position) < 2) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(i, 1);
                        kills++; updateUI();
                    }
                });
            });

            enemies.forEach(e => { e.position.x += e.userData.vx; });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
