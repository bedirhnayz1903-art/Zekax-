<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X | ULTIMATE EDITION 🦾</title>
    <style>
        :root { --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Üst Bar */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid #222; }
        .logo { color: var(--accent); font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .menu-btn { font-size: 26px; cursor: pointer; color: var(--accent); transition: 0.3s; }

        /* Sohbet Alanı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #00cca3); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1d1d1d; border: 1px solid #333; border-bottom-left-radius: 2px; }

        /* Geçmiş Paneli (Drawer) */
        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 25px; box-sizing: border-box; box-shadow: -10px 0 40px #000; border-left: 2px solid var(--accent); }
        .drawer.open { right: 0; }
        .drawer-h { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        
        #history-list { overflow-y: auto; max-height: 70vh; }
        .chat-topic { background: #1d1d1d; padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .chat-topic:hover { border-color: var(--accent); }

        /* Giriş Alanı */
        .input-area { padding: 20px; background: var(--panel); display: flex; gap: 12px; border-top: 1px solid #222; }
        input { flex: 1; background: #1d1d1d; border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 30px; outline: none; font-size: 16px; }
        .send-btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        
        .new-btn { background: transparent; border: 1px dashed var(--accent); color: var(--accent); padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE 🦾</div>
        <div class="menu-btn" onclick="toggleDrawer()">☰</div>
    </div>

    <div id="chat-container">
        <div class="msg ai">👋 Selam BedoX! Ben Zeka-X. Senin için ne yapabilirim? ✨</div>
    </div>

    <div id="drawer" class="drawer">
        <div class="drawer-h">
            <span style="font-weight:bold; color:var(--accent); font-size: 1.2rem;">📂 ESKİ SOHBETLER</span>
            <span onclick="toggleDrawer()" style="cursor:pointer; font-size:28px;">✕</span>
        </div>
        <button class="new-btn" onclick="startNewChat()">➕ YENİ SOHBET BAŞLAT</button>
        <div id="history-list"></div>
        <button onclick="clearAll()" style="background:#441111; color:#ff4444; border:none; width:100%; padding:12px; border-radius:12px; margin-top:20px; font-weight:bold;">🗑️ TÜMÜNÜ SİL</button>
    </div>

    <form class="input-area" onsubmit="event.preventDefault(); handleSend();">
        <input type="text" id="userInput" placeholder="Zeka-X'e bir şeyler sor... 🔥" autocomplete="off">
        <button type="submit" class="send-btn">🚀</button>
    </form>

    <script>
        // GÜVENLİ ANAHTAR YÖNTEMİ 🗝️
        const p1 = "Gsk_";
        const p2 = "RzaRsqukkED9CE1ixvNWWGdyb3FYfV23Qb4gW3ojggLu99QUMLyO";
        const API_KEY = p1 + p2;

        let currentChatId = Date.now().toString();

        window.onload = loadHistoryList;

        function toggleDrawer() {
            document.getElementById('drawer').classList.toggle('open');
            if(document.getElementById('drawer').classList.contains('open')) loadHistoryList();
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage("👤 Sen: " + text, 'user');
            input.value = '';
            saveMessage(currentChatId, { role: 'user', content: text });

            const aiLoadingMsg = addMessage("🤖 Düşünüyorum... 💭", 'ai');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: text }]
                    })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiLoadingMsg.innerHTML = "🤖 <b>Zeka-X:</b> " + aiText;
                saveMessage(currentChatId, { role: 'assistant', content: aiText });
            } catch (e) {
                aiLoadingMsg.innerHTML = "❌ <b>Hata:</b> API bağlantısı kurulamadı. Lütfen internetini veya anahtarını kontrol et.";
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function saveMessage(chatId, msgObj) {
            let allChats = JSON.parse(localStorage.getItem('zekax_final_chats') || "{}");
            if (!allChats[chatId]) allChats[chatId] = { title: "📝 " + msgObj.content.substring(0, 15) + "...", messages: [] };
            allChats[chatId].messages.push(msgObj);
            localStorage.setItem('zekax_final_chats', JSON.stringify(allChats));
        }

        function loadHistoryList() {
            const list = document.getElementById('history-list');
            let allChats = JSON.parse(localStorage.getItem('zekax_final_chats') || "{}");
            list.innerHTML = "";
            Object.keys(allChats).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = 'chat-topic';
                item.innerHTML = `<b>${allChats[id].title}</b><br><small>📅 ${new Date(parseInt(id)).toLocaleDateString()}</small>`;
                item.onclick = () => loadSpecificChat(id);
                list.appendChild(item);
            });
        }

        function loadSpecificChat(id) {
            currentChatId = id;
            let allChats = JSON.parse(localStorage.getItem('zekax_final_chats') || "{}");
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            allChats[id].messages.forEach(m => {
                const prefix = m.role === 'user' ? '👤 Sen: ' : '🤖 Zeka-X: ';
                addMessage(prefix + m.content, m.role === 'user' ? 'user' : 'ai');
            });
            toggleDrawer();
        }

        function startNewChat() {
            currentChatId = Date.now().toString();
            document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Yeni bir sayfa açıldı! Sorunu bekliyorum. 🚀</div>';
            toggleDrawer();
        }

        function clearAll() {
            if(confirm("Tüm geçmiş silinsin mi? 🗑️")) {
                localStorage.removeItem('zekax_final_chats');
                location.reload();
            }
        }
    </script>
</body>
    </html>
