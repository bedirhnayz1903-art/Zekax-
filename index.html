<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid #222; }
        .logo { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        .menu-btn { font-size: 26px; cursor: pointer; color: var(--accent); }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 15px; animation: pop 0.3s ease; }
        @keyframes pop { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #00cca3); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1d1d1d; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.4s; z-index: 100; padding: 25px; box-sizing: border-box; border-left: 2px solid var(--accent); }
        .drawer.open { right: 0; }
        .chat-topic { background: #1d1d1d; padding: 15px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 1px solid #333; }
        .input-area { padding: 20px; background: var(--panel); display: flex; gap: 12px; border-top: 1px solid #222; }
        input { flex: 1; background: #1d1d1d; border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 30px; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE 🦾</div>
        <div class="menu-btn" onclick="toggleDrawer()">☰</div>
    </div>

    <div id="chat-container">
        <div class="msg ai">👋 Selam BedoX! Siteyi ilk kez açıyorsan, Groq anahtarını girmen gerekecek. ✨</div>
    </div>

    <div id="drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span style="font-weight:bold; color:var(--accent);">📂 GEÇMİŞ</span>
            <span onclick="toggleDrawer()" style="cursor:pointer; font-size:28px;">✕</span>
        </div>
        <button onclick="startNewChat()" style="width:100%; padding:10px; margin-bottom:20px; background:none; border:1px dashed var(--accent); color:var(--accent); border-radius:10px; font-weight:bold;">➕ YENİ SOHBET</button>
        <button onclick="setApiKey()" style="width:100%; padding:10px; margin-bottom:20px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold;">🔑 ANAHTARI GÜNCELLE</button>
        <div id="history-list"></div>
    </div>

    <form class="input-area" onsubmit="event.preventDefault(); handleSend();">
        <input type="text" id="userInput" placeholder="Zeka-X'e bir şeyler sor... 🔥" autocomplete="off">
        <button type="submit" class="send-btn">🚀</button>
    </form>

    <script>
        let API_KEY = localStorage.getItem('groq_key');

        function setApiKey() {
            const key = prompt("Lütfen Groq API Anahtarını yapıştırın (gsk_...):");
            if (key) {
                localStorage.setItem('groq_key', key);
                API_KEY = key;
                alert("Anahtar kaydedildi! Artık konuşabilirsin. ✅");
            }
        }

        // Anahtar yoksa girişte sor
        window.onload = () => {
            if (!API_KEY) setApiKey();
            loadHistoryList();
        };

        let currentChatId = Date.now().toString();

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); if(document.getElementById('drawer').classList.contains('open')) loadHistoryList(); }

        async function handleSend() {
            if (!API_KEY) { setApiKey(); return; }
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage("👤 Sen: " + text, 'user');
            input.value = '';
            saveMessage(currentChatId, { role: 'user', content: text });

            const aiLoadingMsg = addMessage("🤖 Düşünüyorum... 💭", 'ai');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama3-8b-8192", messages: [{ role: "user", content: text }] })
                });
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiLoadingMsg.innerHTML = "🤖 <b>Zeka-X:</b> " + aiText;
                saveMessage(currentChatId, { role: 'assistant', content: aiText });
            } catch (e) { 
                aiLoadingMsg.innerHTML = "❌ <b>Hata:</b> Anahtarın hatalı olabilir veya internetin yok. Menüden anahtarı tekrar girmeyi dene.";
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            const container = document.getElementById('chat-container');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function saveMessage(chatId, msgObj) {
            let allChats = JSON.parse(localStorage.getItem('zekax_final_v2') || "{}");
            if (!allChats[chatId]) allChats[chatId] = { title: "📝 " + msgObj.content.substring(0, 15) + "...", messages: [] };
            allChats[chatId].messages.push(msgObj);
            localStorage.setItem('zekax_final_v2', JSON.stringify(allChats));
        }

        function loadHistoryList() {
            const list = document.getElementById('history-list');
            let allChats = JSON.parse(localStorage.getItem('zekax_final_v2') || "{}");
            list.innerHTML = "";
            Object.keys(allChats).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = 'chat-topic';
                item.innerHTML = `<b>${allChats[id].title}</b><br><small>📅 ${new Date(parseInt(id)).toLocaleDateString()}</small>`;
                item.onclick = () => loadSpecificChat(id);
                list.appendChild(item);
            });
        }

        function loadSpecificChat(id) {
            currentChatId = id;
            let allChats = JSON.parse(localStorage.getItem('zekax_final_v2') || "{}");
            document.getElementById('chat-container').innerHTML = "";
            allChats[id].messages.forEach(m => {
                addMessage(m.role === 'user' ? '👤 Sen: ' + m.content : '🤖 Zeka-X: ' + m.content, m.role === 'user' ? 'user' : 'ai');
            });
            toggleDrawer();
        }

        function startNewChat() { currentChatId = Date.now().toString(); document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Yeni bir sayfa açıldı! Sorunu bekliyorum. 🚀</div>'; toggleDrawer(); }
    </script>
</body>
    </html>
