<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Kişisel Asistan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #007aff; --bg: #ffffff; --t: #1d1d1f; --s: #f5f5f7; --b: #d2d2d7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--t); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* GİRİŞ EKRANI */
        #entry-screen { 
            position: fixed; inset: 0; background: #fff; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .logo { font-size: 48px; font-weight: 800; color: var(--p); letter-spacing: -2px; margin-bottom: 10px; }
        .tagline { color: #86868b; margin-bottom: 30px; font-weight: 400; }
        .start-btn { 
            background: var(--p); color: #fff; border: none; padding: 14px 40px; 
            border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; 
        }
        .start-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* ÜST MENÜ */
        header { 
            padding: 15px 40px; border-bottom: 1px solid var(--b); 
            display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
        }
        .user-chip { 
            display: flex; align-items: center; gap: 10px; padding: 6px 14px; 
            background: var(--s); border-radius: 20px; font-weight: 600; font-size: 14px;
            cursor: pointer;
        }

        /* SOHBET ALANI */
        #chat-container { 
            flex: 1; padding: 30px 20%; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 25px; 
        }
        .msg { display: flex; flex-direction: column; max-width: 85%; animation: slideUp 0.4s ease; }
        .u-msg { align-self: flex-end; }
        .a-msg { align-self: flex-start; }
        .sender { font-size: 11px; font-weight: 700; color: #86868b; margin-bottom: 5px; text-transform: uppercase; }
        .u-msg .sender { text-align: right; }
        .bubble { 
            padding: 16px 20px; border-radius: 20px; font-size: 16px; 
            line-height: 1.5; font-family: 'Inter', sans-serif;
        }
        .u-bubble { background: var(--p); color: #fff; border-bottom-right-radius: 4px; }
        .a-bubble { background: var(--s); color: var(--t); border-bottom-left-radius: 4px; }

        /* YAZMA ALANI */
        footer { padding: 25px 20%; background: #fff; }
        .input-box { 
            display: flex; background: var(--s); border-radius: 30px; 
            padding: 8px 10px 8px 25px; align-items: center; border: 1px solid transparent;
            transition: 0.2s;
        }
        .input-box:focus-within { border-color: var(--p); background: #fff; }
        input { flex: 1; border: none; background: transparent; padding: 10px 0; outline: none; font-size: 16px; }
        .send-btn { 
            background: var(--p); color: #fff; border: none; width: 42px; height: 42px; 
            border-radius: 50%; cursor: pointer; font-size: 18px; 
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="entry-screen">
    <div class="logo">HEALILITY</div>
    <div class="tagline">Akıllı Asistanınız Sistemlere Bağlanıyor</div>
    <button class="start-btn" onclick="Core.init()">Sistemi Başlat</button>
</div>

<header>
    <div style="font-weight: 800; font-size: 22px; color: var(--p);">Healility</div>
    <div class="user-chip" id="user-display">Navigator</div>
</header>

<div id="chat-container"></div>

<footer>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Bir şey sorun veya anlatın..." autocomplete="off">
        <button class="send-btn" onclick="Core.send()">➔</button>
    </div>
</footer>

<script>
    const Core = {
        name: "Navigator",
        history: [],

        init() {
            document.getElementById('entry-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('entry-screen').remove();
                this.loadMemory();
                this.welcome();
            }, 500);
        },

        welcome() {
            const h = localStorage.getItem('heal_v21_history');
            let m = "Merhaba! Ben Healility. Seninle her konuda derinlemesine konuşmaya, karmaşık problemleri çözmeye hazırım. <br><br>Bugün senin için ne yapabilirim?";
            if(h) m = "Tekrar hoş geldin! Geçmiş kayıtlarımızı analiz ettim. Kaldığımız yerden devam edelim mi?";
            this.render(m, 'ai');
        },

        process(txt) {
            const raw = txt.toLowerCase().trim();
            
            // 1. DERİN MATEMATİK VE ANALİZ
            let math = raw.replace(/x/g, '*').replace(/÷/g, '/');
            if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(math) && math.length >= 3) {
                try {
                    const result = eval(math);
                    return `Analizim tamamlandı. Bu işlemin sonucu: **${result}**. Matematiksel veriler her zaman net cevaplar verir. Başka bir hesaplama yapalım mı?`;
                } catch(e) {}
            }

            // 2. M3 VE ÖZEL TERMİNOLOJİ
            if (raw.includes("m3")) {
                return "M3 konusuna değinmen harika. İster BMW'nin efsaneleşmiş performans serisinden, ister Apple'ın o muazzam verimlilikteki M3 çipinden bahsediyor olalım; her iki alanda da gerçek bir 'pro' seçim olduğunu söyleyebilirim. Senin ilgin hangisine?";
            }

            // 3. KARAKTER VE SAMİMİYET
            if (raw === "naber" || raw === "nasılsın") {
                return "Çok iyiyim, teşekkür ederim! Senin için yeni bilgiler sentezlemek beni her zaman heyecanlandırıyor. Sen neler yapıyorsun, günün nasıl geçiyor?";
            }

            if (raw.includes("beşiktaş")) {
                return "Beşiktaş'ın o asil duruşu ve 1903 ruhu... 🦅 Siyah beyazın asaleti her zaman başkadır. Kartal'ın bugünkü durumu hakkında ne düşünüyorsun?";
            }

            // 4. GENEL DERİN CEVAP MOTORU
            const replies = [
                "Bunu söylediğin çok iyi oldu, aslında bu konunun altında yatan başka detaylar da var. Biraz daha derinleşelim mi?",
                "Anlıyorum, bu gerçekten üzerinde düşünülmesi gereken bir nokta. Benim fikrimi sorarsan, bu durum seni daha ileriye taşıyacak bir adım olabilir.",
                "Harika bir noktaya değindin. Veritabanımda bu konuyla ilgili çok ilginç bağlantılar var. Devam et, seni dikkatle dinliyorum.",
                "Kesinlikle! Bir asistan olarak senin bu bakış açını çok değerli buluyorum. Başka neler eklemek istersin?"
            ];

            return replies[Math.floor(Math.random() * replies.length)];
        },

        send() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;
            
            this.render(val, 'u');
            this.save(val, 'u');
            input.value = "";

            setTimeout(() => {
                const response = this.process(val);
                this.render(response, 'ai');
                this.save(response, 'ai');
            }, 600);
        },

        render(t, side) {
            const container = document.getElementById('chat-container');
            const wrap = document.createElement('div');
            wrap.className = `msg ${side}-msg`;
            wrap.innerHTML = `
                <span class="sender">${side === 'u' ? this.name : 'Healility'}</span>
                <div class="bubble ${side}-bubble">${t}</div>
            `;
            container.appendChild(wrap);
            container.scrollTop = container.scrollHeight;
        },

        save(text, side) {
            let logs = JSON.parse(localStorage.getItem('heal_v21_history') || "[]");
            logs.push({ text, side });
            localStorage.setItem('heal_v21_history', JSON.stringify(logs));
        },

        loadMemory() {
            let logs = JSON.parse(localStorage.getItem('heal_v21_history') || "[]");
            if(logs.length > 0) {
                this.render("*Önceki konuşmalar başarıyla yüklendi.*", "ai");
                logs.forEach(l => this.render(l.text, l.side));
            }
        }
    };

    document.getElementById('user-input').addEventListener("keypress", (e) => { if(e.key === "Enter") Core.send(); });
</script>
</body>
</html>
