<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Üst Menü */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid #222; }
        .logo { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        
        /* Sohbet Alanı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 15px; animation: pop 0.3s ease; line-height: 1.5; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 5px; display: block; }
        @keyframes pop { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
        
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #00cca3); color: #000; font-weight: 500; }
        .ai { align-self: flex-start; background: #1d1d1d; border: 1px solid #333; }
        
        /* Yan Menü (Genişletilmiş Geçmiş) */
        .drawer { position: fixed; top: 0; right: -100%; width: 90%; height: 100%; background: var(--panel); transition: 0.4s; z-index: 100; padding: 25px; box-sizing: border-box; border-left: 2px solid var(--accent); overflow-y: auto; }
        .drawer.open { right: 0; }
        .search-box { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #333; background: #1d1d1d; color: white; margin-bottom: 15px; }
        .history-card { background: #1d1d1d; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; cursor: pointer; }
        .history-card:hover { border-color: var(--accent); }

        /* Giriş Paneli */
        .input-area { padding: 20px; background: var(--panel); border-top: 1px solid #222; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #1d1d1d; border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 30px; outline: none; }
        .btn { border: none; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s; }
        .send-btn { background: var(--accent); width: 50px; height: 50px; }
        .tool-btn { background: #222; color: var(--accent); padding: 8px 15px; font-size: 12px; border: 1px solid #333; margin-bottom: 10px; }
        
        .ai-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE 🦾</div>
        <div onclick="toggleDrawer()" style="cursor:pointer; color:var(--accent); font-size:26px;">☰</div>
    </div>

    <div id="chat-container">
        <div class="msg ai">👋 Selam BedoX! Geçmişi aramak için "Geçmişi tara" diyebilir veya yan menüyü kullanabilirsin. 🦅</div>
    </div>

    <div id="drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-weight:bold; color:var(--accent);">📂 TÜM GEÇMİŞ</span>
            <span onclick="toggleDrawer()" style="cursor:pointer; font-size:28px;">✕</span>
        </div>
        <input type="text" class="search-box" id="historySearch" placeholder="Eski mesajlarda ara..." oninput="searchHistory()">
        <div id="history-list"></div>
        <button onclick="startNewChat()" style="width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; margin-top:10px;">➕ YENİ SOHBET</button>
    </div>

    <form class="input-area" onsubmit="event.preventDefault(); handleAction('chat');">
        <div style="display:flex; gap:5px;">
            <button type="button" class="tool-btn" onclick="handleAction('image')">🖼️ GÖRSEL YAP</button>
            <button type="button" class="tool-btn" onclick="toggleDrawer()">🔍 GEÇMİŞİ BUL</button>
        </div>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Mesaj yaz veya görsel iste..." autocomplete="off">
            <button type="submit" class="btn send-btn">🚀</button>
        </div>
    </form>

    <script>
        let API_KEY = localStorage.getItem('groq_key_final');
        let currentChatId = Date.now().toString();

        if (!API_KEY) {
            API_KEY = prompt("Groq API Anahtarını girin:");
            if (API_KEY) localStorage.setItem('groq_key_final', API_KEY.trim());
        }

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); if(document.getElementById('drawer').classList.contains('open')) updateHistoryUI(); }

        async function handleAction(type) {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('tr-TR');

            if (type === 'chat') {
                addMsg(text, 'user', timeStr);
                input.value = '';
                saveLocal(currentChatId, { role: 'user', content: text, time: timeStr, date: dateStr });

                const aiMsg = addMsg("🤖 Düşünüyorum...", 'ai', timeStr);
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            model: "llama-3.3-70b-versatile", 
                            messages: getHist(currentChatId).map(m => ({ role: m.role, content: m.content }))
                        })
                    });
                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    aiMsg.innerHTML = reply + `<span class="msg-time">${timeStr}</span>`;
                    saveLocal(currentChatId, { role: 'assistant', content: reply, time: timeStr, date: dateStr });
                } catch { aiMsg.innerText = "❌ Bağlantı hatası!"; }
            } else {
                addMsg(`🖼️ İstek: ${text}`, 'user', timeStr);
                input.value = '';
                const aiMsg = addMsg("🎨 Çiziyorum...", 'ai', timeStr);
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
                aiMsg.innerHTML = `İşte görsel: <br><img src="${imgUrl}" class="ai-img"><span class="msg-time">${timeStr}</span>`;
                saveLocal(currentChatId, { role: 'assistant', content: `[Görsel]: ${text}`, img: imgUrl, time: timeStr, date: dateStr });
            }
        }

        function addMsg(t, c, tm) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerHTML = t + `<span class="msg-time">${tm}</span>`;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d);
            cont.scrollTop = cont.scrollHeight;
            return d;
        }

        function saveLocal(id, obj) {
            let db = JSON.parse(localStorage.getItem('zekax_db_v4') || "{}");
            if (!db[id]) db[id] = { title: obj.content.substring(0, 30), date: obj.date, messages: [] };
            db[id].messages.push(obj);
            localStorage.setItem('zekax_db_v4', JSON.stringify(db));
        }

        function getHist(id) { return JSON.parse(localStorage.getItem('zekax_db_v4') || "{}")[id]?.messages || []; }

        function updateHistoryUI(filter = "") {
            const list = document.getElementById('history-list');
            let db = JSON.parse(localStorage.getItem('zekax_db_v4') || "{}");
            list.innerHTML = "";
            Object.keys(db).reverse().forEach(id => {
                if (db[id].title.toLowerCase().includes(filter.toLowerCase())) {
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.innerHTML = `<b>${db[id].title}</b><br><small>📅 ${db[id].date}</small>`;
                    card.onclick = () => {
                        currentChatId = id;
                        document.getElementById('chat-container').innerHTML = "";
                        db[id].messages.forEach(m => addMsg(m.img ? `<img src="${m.img}" class="ai-img">` : m.content, m.role === 'user' ? 'user' : 'ai', m.time));
                        toggleDrawer();
                    };
                    list.appendChild(card);
                }
            });
        }

        function searchHistory() { updateHistoryUI(document.getElementById('historySearch').value); }
        function startNewChat() { currentChatId = Date.now().toString(); document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Yeni sohbet başladı!</div>'; toggleDrawer(); }
    </script>
</body>
    </html>
