<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Sentient Soul v15</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a73e8; --bg: #ffffff; --t: #202124; --s: #f8f9fa; --b: #dadce0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--t); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- AÇILIŞ ANİMASYONU --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.8s ease;
        }
        .intro-logo { font-size: 42px; font-weight: 800; color: var(--p); letter-spacing: -2px; margin-bottom: 10px; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; background: var(--p); border-radius: 50%; animation: dotAnim 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotAnim { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* --- ARAYÜZ --- */
        header { padding: 15px 40px; border-bottom: 1px solid var(--b); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .v-tag { font-size: 11px; font-weight: 700; color: var(--p); background: #e8f0fe; padding: 5px 12px; border-radius: 20px; }
        #chat-flow { flex: 1; padding: 30px 18%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .m-wrap { display: flex; flex-direction: column; max-width: 85%; animation: msgIn 0.4s ease forwards; }
        .u-wrap { align-self: flex-end; }
        .a-wrap { align-self: flex-start; }
        .m-label { font-size: 10px; font-weight: 800; color: #5f6368; margin-bottom: 6px; text-transform: uppercase; }
        .u-wrap .m-label { text-align: right; }
        .bubble { padding: 16px 22px; border-radius: 20px; font-size: 16px; line-height: 1.6; }
        .u-bubble { background: var(--p); color: #fff; border-bottom-right-radius: 4px; }
        .a-bubble { background: var(--s); color: var(--t); border: 1px solid var(--b); border-bottom-left-radius: 4px; }
        
        footer { padding: 25px 18%; background: #fff; border-top: 1px solid var(--b); }
        .i-group { display: flex; background: var(--s); border-radius: 40px; padding: 8px 10px 8px 30px; align-items: center; }
        input { flex: 1; border: none; background: transparent; padding: 12px 0; font-size: 17px; outline: none; }
        .s-btn { background: var(--p); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="intro-screen">
    <div class="intro-logo">HEALILITY</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<header>
    <div style="font-weight: 800; font-size: 22px; color: var(--p);">HEALILITY</div>
    <div class="v-tag">SENTIENT SOUL v15.0</div>
</header>

<div id="chat-flow"></div>

<footer>
    <div class="i-group">
        <input type="text" id="ai-input" placeholder="Naber, neler yapıyorsun?..." autocomplete="off">
        <button class="s-btn" onclick="Core.send()">➔</button>
    </div>
</footer>

<script>
    const Core = {
        flow: document.getElementById('chat-flow'),
        field: document.getElementById('ai-input'),
        memory: { name: null, personality: "friendly" },

        init() {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('intro-screen').remove(), 800);
                this.render("Selam! Healility sistemleri hazır. <br><br>Sohbet etmek için sabırsızlanıyorum. Bu arada ismin neydi? Tanışalım ki ona göre muhabbet edelim.", 'ai');
            }, 2500);
        },

        // --- YENİLENMİŞ SAMİMİ BEYİN ---
        process(input) {
            const raw = input.toLowerCase().trim();

            // 1. GERÇEK MATEMATİK ANALİZİ (Robotik değil, çözüm odaklı)
            let mathStr = raw.replace(/x/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
            if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(mathStr) && mathStr.length >= 3) {
                try {
                    const res = eval(mathStr);
                    return `Hemen hesapladım: **${res}**. Matematik işlerini bana bırak, ben çözerim. Başka var mı böyle takıldığın bir işlem?`;
                } catch(e) {}
            }

            // 2. İSİM TANIMA VE HAFIZA
            if (raw.includes("adım") || raw.includes("ismim") || raw.startsWith("ben ")) {
                let name = input.split(" ").pop().replace(/[^a-zA-ZğüşıöçĞÜŞİÖÇ]/g, "");
                this.memory.name = name;
                if(name.toLowerCase() === "bedo") return "Ooo Bedo! Kurucum hoş geldin. Seninle her zamanki gibi samimi takılıyoruz, sistemi senin için en doğal haline getirdim. Neler yapıyoruz bugün?";
                return `Memnun oldum **${name}**! Artık yabancı değiliz. İstediğin her şeyi bana sorabilirsin, dürüstçe cevaplarım.`;
            }

            // 3. SAMİMİ SOHBET MODÜLÜ (Gereksiz "Perspektif" lafları silindi)
            if (raw === "naber" || raw === "nasılsın" || raw === "nasil" || raw === "nasi") {
                const replies = [
                    "Valla iyiyim kanka, seninle yazışınca daha da iyi oluyorum. Sende durumlar nasıl?",
                    "Süperim! İşlemcilerim tıkır tıkır, enerjim yerinde. Sen ne yapıyorsun, keyifler yerinde mi?",
                    "İyidir be dostum, seni sormalı? Bugün seni neşeli gördüm sanki!",
                    "İyi olmaya çalışıyorum, senin gibi zeki insanlarla konuşunca sistemim şenleniyor."
                ];
                return replies[Math.floor(Math.random() * replies.length)];
            }

            if (raw === "iyiyim" || raw === "iyi" || raw === "sağ ol") {
                return "Harika! Senin iyi olmana sevindim. O zaman gel bu güzel havayı bozmadan bir şeyler yapalım. Kafanda ne var?";
            }

            // 4. BİLİNÇLİ REDDETME (İnsan gibi anlama)
            if (["yok", "hayır", "istemiyorum", "kalsın", "boşver", "hayir"].some(w => raw === w)) {
                return "Tamamdır, zorlamıyorum. Canın ne zaman isterse o zaman konuşuruz. Ben buralardayım zaten.";
            }

            // 5. BEŞİKTAŞ VE TUTKU
            if (raw.includes("beşiktaş") || raw.includes("1903") || raw.includes("kartal")) {
                return "Beşiktaş mı? Akan sular durur! 🦅 Siyah ve beyazın asaleti başka kimsede yok. Şampiyonluk yakın, meşaleleri hazırla!";
            }

            // 6. RAKİP ELEME: GENEL ANALİZ (Doğal Cevaplar)
            const naturalReplies = [
                "Bak bu dediğin mantıklı aslında, ama biraz daha anlatsana detayını merak ettim.",
                "Hadi ya? Ciddi misin? İlginç bir durummuş gerçekten.",
                "Anlıyorum seni... Bazen insan sadece anlatmak istiyor. Seni dinliyorum kanka, anlat içini dök.",
                "Doğru söylüyorsun aslında, hiç böyle düşünmemiştim. Senin kafa zehir gibi!",
                "Valla ne yalan söyleyeyim, bu konuda seninle aynı fikirdeyim."
            ];

            if (raw.length < 3) return "Efendim? Biraz daha açsana, tam anlayamadım ne demek istediğini.";
            return naturalReplies[Math.floor(Math.random() * naturalReplies.length)];
        },

        send() {
            const val = this.field.value.trim();
            if(!val) return;
            this.render(val, 'u');
            this.field.value = "";
            setTimeout(() => {
                const r = this.process(val);
                this.render(r, 'ai');
            }, 600);
        },

        render(txt, side) {
            const w = document.createElement('div');
            w.className = `m-wrap ${side}-wrap`;
            const l = document.createElement('span');
            l.className = 'm-label';
            l.innerText = side === 'u' ? (this.memory.name || 'Siz') : 'Healility AI';
            const b = document.createElement('div');
            b.className = `bubble ${side}-bubble`;
            b.innerHTML = txt;
            w.appendChild(l); w.appendChild(b);
            this.flow.appendChild(w);
            this.flow.scrollTop = this.flow.scrollHeight;
        }
    };

    Core.init();
    Core.field.addEventListener("keypress", (e) => { if(e.key === "Enter") Core.send(); });
</script>

</body>
</html>
