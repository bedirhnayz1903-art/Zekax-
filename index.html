<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Ultra Zeka</title>
    <style>
        :root { --bg: #0d0d0f; --neon: #00f2ff; --purple: #8e2de2; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; animation: bounce 0.3s ease; }
        .user { align-self: flex-end; background: var(--purple); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); border-bottom-left-radius: 2px; }
        
        .input-area { padding: 20px; background: #1a1a1e; display: flex; gap: 10px; }
        input { flex: 1; background: #2a2a2e; border: none; padding: 15px; border-radius: 10px; color: white; outline: none; border: 1px solid transparent; }
        input:focus { border-color: var(--neon); }
        button { background: var(--neon); border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        @keyframes bounce { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="msg ai">Selam Bedo! Bellek üniteleri ve matematik motoru aktif. Bana her şeyi sorabilirsin, zorlu işlemler dahil! 🚀</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Matematik sor veya sohbet et..." autocomplete="off">
    <button onclick="send()">GİT</button>
</div>

<script>
    const chat = document.getElementById('chat-window');
    const input = document.getElementById('userInput');
    
    // BELLEK (Memory): Konuşmaları burada tutar
    let memory = [];

    function solveMath(text) {
        // Metin içindeki sayısal işlemleri (x yerine *, ÷ yerine / gibi) düzeltir
        let process = text.replace(/x/g, '*').replace(/X/g, '*').replace(/,/g, '.').replace(/÷/g, '/');
        // Sadece matematiksel karakterleri filtreler
        let mathPattern = /([0-9\+\-\*\/\.\(\)\s]+)/;
        let match = process.match(mathPattern);
        
        if (match && match[0].trim().length > 1) {
            try {
                return eval(match[0]);
            } catch (e) {
                return null;
            }
        }
        return null;
    }

    function generateResponse(userText) {
        // Belleğe ekle
        memory.push(userText);
        
        // 1. Matematik Kontrolü
        let mathResult = solveMath(userText);
        if (mathResult !== null && !isNaN(mathResult)) {
            return `Hesaplamalarımı yaptım: **${userText} = ${mathResult}**. Başka bir işlem var mı?`;
        }

        // 2. Samimi Sohbet ve Bellek Kullanımı
        let lowText = userText.toLowerCase();
        
        if (lowText.includes("kimsin")) return "Ben Healility! Belleğimde seninle yaptığım tüm konuşmalar duruyor. Sen ne istersen o olurum.";
        if (lowText.includes("beşiktaş")) return "Kartal için her zaman bir yerimiz var! 🦅 1903!";
        if (lowText.includes("hatırlıyor musun")) return `Elbette! Az önce bana "${memory[memory.length - 2] || "merhaba"}" demiştin. Belleğim saat gibi çalışıyor.`;

        // 3. Genel Cevap
        const answers = [
            "Bu çok mantıklı! Biraz daha açar mısın?",
            "Valla harikasın Bedo, bunu düşünmemiştim.",
            "Sistemlerim bu fikri sevdi. Devam edelim!",
            "İlginç bir nokta... Seninle çalışmak gerçekten zevkli."
        ];
        return answers[Math.floor(Math.random() * answers.length)];
    }

    function send() {
        let val = input.value.trim();
        if(!val) return;

        chat.innerHTML += `<div class="msg user">${val}</div>`;
        input.value = "";

        setTimeout(() => {
            let reply = generateResponse(val);
            chat.innerHTML += `<div class="msg ai">${reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 600);
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>

</body>
</html>
