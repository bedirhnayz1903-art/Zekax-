<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility: Elite Sniper Pro</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --danger: #ff0055; --bg: rgba(0, 20, 30, 0.8); }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; }

        /* Ana Arayüz */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }

        /* Üst Bilgi */
        .top-stats { display: flex; justify-content: space-between; color: white; text-shadow: 0 2px 5px #000; font-weight: bold; font-size: 14px; }

        /* Dürbün Efekti (Overlay) */
        #scope-overlay {
            position: absolute; inset: 0; border: 0px solid black; transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none;
        }
        .scope-circle { width: 300px; height: 300px; border: 200vw solid black; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .scope-cross { position: absolute; width: 100%; height: 2px; background: rgba(255,0,0,0.5); }
        .scope-v { position: absolute; width: 2px; height: 100%; background: rgba(255,0,0,0.5); }

        /* Mobil Butonlar */
        #controls { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .m-btn {
            width: 50px; height: 50px; background: var(--bg); border: 1px solid var(--neon);
            border-radius: 10px; color: var(--neon); font-size: 10px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; text-align: center;
            box-shadow: 0 0 10px var(--neon); active { transform: scale(0.9); }
        }

        /* Mühimmat ve KİBO */
        .bottom-right { align-self: flex-end; text-align: right; pointer-events: none; }
        #ammo-display { font-size: 30px; color: var(--gold); font-weight: 900; margin-bottom: 5px; }
        #kibo-log {
            background: var(--bg); border-right: 4px solid var(--neon); padding: 10px;
            border-radius: 10px 0 0 10px; color: #fff; font-size: 11px; max-width: 180px;
        }

        /* Animasyonlar */
        .reloading { animation: flash 0.5s infinite; }
        @keyframes flash { 50% { opacity: 0.3; color: red; } }
    </style>
</head>
<body>

    <div id="scope-overlay">
        <div class="scope-circle">
            <div class="scope-cross"></div>
            <div class="scope-v"></div>
        </div>
    </div>

    <div id="hud">
        <div class="top-stats">
            <div>HEALILITY OS v4.0</div>
            <div>SKOR: <span id="score">0</span></div>
        </div>

        <div id="controls">
            <div class="m-btn" onclick="toggleScope()">DÜRBÜN<br>(ZOOM)</div>
            <div class="m-btn" onclick="manualReload()">ŞARJÖR<br>(RELOAD)</div>
        </div>

        <div class="bottom-right">
            <div id="ammo-display">15/15</div>
            <div id="kibo-log">
                <b style="color:var(--neon)">KİBO:</b><br>
                <span id="kibo-msg">Sistem hazır. Hedefler şehir meydanında tespit edildi.</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * HEALILITY SNIPER ENGINE PRO
         * Mobilden GitHub İçin En Derin Yapı
         */

        let scene, camera, renderer, clock, kibo;
        let ammo = 15, kills = 0, isReloading = false, isZoomed = false;
        let enemies = [], bullets = [];
        let viewAngle = new THREE.Vector2(0, -Math.PI/4);
        let smoothAngle = new THREE.Vector2(0, -Math.PI/4);

        init();
        loop();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 60, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Gelişmiş Işıklandırma
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(100, 200, 100);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // ÇEVRE İNŞASI
            createEnvironment();

            // KİBO PRO (Gelişmiş Form)
            const kiboParts = new THREE.Group();
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.6, 1), new THREE.MeshStandardMaterial({color: 0x00f2ff, wireframe: true}));
            kiboParts.add(core);
            kibo = kiboParts;
            scene.add(kibo);

            // MOBİL ETKİLEŞİM
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                viewAngle.x = -((t.clientX / window.innerWidth) - 0.5) * 2;
                viewAngle.y = -Math.PI/3 - ((t.clientY / window.innerHeight) - 0.5) * 1.5;
            }, { passive: false });

            window.addEventListener('touchstart', (e) => {
                if(e.target.className !== 'm-btn') shoot();
            });

            clock = new THREE.Clock();
            spawnManager();
        }

        function createEnvironment() {
            // Sniper Binası
            const towerGeo = new THREE.BoxGeometry(25, 150, 25);
            const towerMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.2 });
            const tower = new THREE.Mesh(towerGeo, towerMat);
            tower.position.y = -15;
            scene.add(tower);

            // Şehir Zemini
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0x7f8c8d }));
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -60;
            scene.add(floor);

            // Renkli Binalar
            for(let i=0; i<60; i++) {
                const h = 20 + Math.random() * 80;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(15, h, 15),
                    new THREE.MeshStandardMaterial({ color: new THREE.Color(`hsl(${Math.random()*360}, 30%, 40%)`) })
                );
                b.position.set((Math.random()-0.5)*500, h/2 - 60, (Math.random()-0.5)*500 - 100);
                scene.add(b);
            }
        }

        // DÜRBÜN FONKSİYONU
        function toggleScope() {
            isZoomed = !isZoomed;
            camera.fov = isZoomed ? 15 : 60;
            camera.updateProjectionMatrix();
            document.getElementById('scope-overlay').style.opacity = isZoomed ? "1" : "0";
            document.getElementById('kibo-msg').innerText = isZoomed ? "Dürbün aktif. Nefes kontrolü yapılıyor." : "Geniş açı tarama moduna geçildi.";
        }

        function shoot() {
            if(isReloading || ammo <= 0) return;
            ammo--; updateUI();

            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            bullet.userData.v = dir.multiplyScalar(5);
            bullets.push(bullet);
            scene.add(bullet);
        }

        function manualReload() {
            if(isReloading) return;
            isReloading = true;
            document.getElementById('ammo-display').classList.add('reloading');
            setTimeout(() => {
                ammo = 15; isReloading = false;
                document.getElementById('ammo-display').classList.remove('reloading');
                updateUI();
            }, 2000);
        }

        function spawnManager() {
            // İNSAN ŞEKLİNDE HEDEFLER (Basit humanoid yapı)
            const human = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2, 4, 8), new THREE.MeshStandardMaterial({color: 0xff0044}));
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({color: 0xff0044}));
            head.position.y = 1;
            human.add(body, head);

            human.position.set((Math.random()-0.5)*150, -59, (Math.random()-0.5)*150 - 80);
            human.userData.speed = 0.05 + Math.random() * 0.1;
            enemies.push(human);
            scene.add(human);
            setTimeout(spawnManager, 1500);
        }

        function updateUI() {
            document.getElementById('ammo-display').innerText = `${ammo}/15`;
            document.getElementById('score').innerText = kills;
        }

        function loop() {
            requestAnimationFrame(loop);
            const t = clock.getElapsedTime();

            // Kamera Akışı
            smoothAngle.x += (viewAngle.x - smoothAngle.x) * 0.1;
            smoothAngle.y += (viewAngle.y - smoothAngle.y) * 0.1;
            camera.rotation.set(smoothAngle.y, smoothAngle.x, 0);

            // KİBO Hareket
            kibo.position.set(camera.position.x + 5, camera.position.y + Math.sin(t)*2, camera.position.z - 10);
            kibo.rotation.y += 0.05;

            // Mermi ve Çarpışma (Hedeflerin aşağıda kalması için kontrol)
            bullets.forEach((b, bi) => {
                b.position.add(b.userData.v);
                if(b.position.y < -60) { scene.remove(b); bullets.splice(bi, 1); }

                enemies.forEach((e, ei) => {
                    if(b.position.distanceTo(e.position) < 2) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        kills++; updateUI();
                    }
                });
            });

            // Hedeflerin Yürümesi
            enemies.forEach(e => {
                e.position.z += e.userData.speed;
                if(e.position.z > 100) e.position.z = -150; // Tekrar döngüye girsinler
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
