<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { 
            --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; 
            --user-bg: linear-gradient(135deg, #00ffcc, #00cca3); --emoji: "🦾";
        }
        
        /* 🔥 TAKIM ATMOSFERLERİ */
        body.tema-besiktas { 
            --accent: #ffffff; --user-bg: linear-gradient(135deg, #444, #000); 
            --panel: #111; --emoji: "🦅"; 
            background-image: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 0%, transparent 20%);
        }
        body.tema-galatasaray { 
            --accent: #febd11; --user-bg: linear-gradient(135deg, #ff0000, #febd11); 
            --panel: #2a0000; --emoji: "🦁";
            background-image: radial-gradient(circle at 90% 10%, rgba(255,0,0,0.1) 0%, transparent 30%);
        }
        body.tema-fenerbahce { 
            --accent: #ffff00; --user-bg: linear-gradient(135deg, #003399, #ffff00); 
            --panel: #001a4d; --emoji: "🐦";
            background-image: linear-gradient(rgba(0,51,153,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        body.tema-trabzonspor { 
            --accent: #0099cc; --user-bg: linear-gradient(135deg, #660033, #0099cc); 
            --panel: #33001a; --emoji: "🌪️";
            background-image: repeating-linear-gradient(45deg, rgba(0,153,204,0.05) 0px, rgba(0,153,204,0.05) 2px, transparent 2px, transparent 10px);
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Tema Seçim Ekranı */
        #theme-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; backdrop-filter: blur(15px); }
        .theme-card { width: 85%; max-width: 350px; padding: 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.4s; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .theme-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo { color: var(--accent); font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; text-shadow: 0 0 15px var(--accent); }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 15px 20px; border-radius: 22px; max-width: 82%; font-size: 15px; animation: slideIn 0.4s ease-out; line-height: 1.6; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; backdrop-filter: blur(5px); }
        
        .input-area { padding: 20px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05); }
        .input-row { display: flex; gap: 12px; align-items: center; }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px 24px; border-radius: 35px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        .send-btn { background: var(--accent); width: 55px; height: 55px; border: none; border-radius: 50%; cursor: pointer; color: #000; font-size: 26px; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 0 15px var(--accent); }
        .send-btn:hover { transform: scale(1.1) rotate(-10deg); }

        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 500; padding: 25px; box-sizing: border-box; border-left: 4px solid var(--accent); }
        .drawer.open { right: 0; }
        .hidden { display: none !important; }
        .ai-img { width: 100%; border-radius: 18px; margin-top: 12px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="tema-besiktas">

    <div id="theme-overlay">
        <h1 style="color:white; margin-bottom:10px; font-style: italic;">ZEKA-X ELITE</h1>
        <p style="color:rgba(255,255,255,0.6); margin-bottom:30px;">Tarafını Seç, Atmosferi Değiştir!</p>
        <div class="theme-card" style="background:#111; color:#fff;" onclick="setTheme('besiktas')">BEŞİKTAŞ 🦅</div>
        <div class="theme-card" style="background:#ff0000; color:#febd11;" onclick="setTheme('galatasaray')">GALATASARAY 🦁</div>
        <div class="theme-card" style="background:#003399; color:#ffff00;" onclick="setTheme('fenerbahce')">FENERBAHÇE 🐦</div>
        <div class="theme-card" style="background:#660033; color:#0099cc;" onclick="setTheme('trabzonspor')">TRABZONSPOR 🌪️</div>
    </div>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE</div>
        <div onclick="toggleDrawer()" style="cursor:pointer; color:var(--accent); font-size:32px;">☰</div>
    </div>

    <div id="chat-container"></div>

    <div id="drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="color:var(--accent); margin:0;">AYARLAR</h2>
            <span onclick="toggleDrawer()" style="cursor:pointer; font-size:30px;">✕</span>
        </div>
        <button onclick="openThemePicker()" style="width:100%; padding:18px; background:var(--accent); color:#000; border:none; border-radius:15px; font-weight:900; margin-bottom:20px; cursor:pointer; font-size:16px;">🎨 TAKIM DEĞİŞTİR</button>
        <div id="history-list"></div>
        <button onclick="startNewChat()" style="width:100%; padding:14px; background:transparent; border:2px solid var(--accent); color:var(--accent); border-radius:15px; font-weight:bold; margin-top:20px; cursor:pointer;">➕ YENİ SOHBET</button>
    </div>

    <div class="input-area">
        <div style="display:flex; gap:10px; margin-bottom:12px;">
            <button type="button" onclick="handleAction('image')" style="background:rgba(255,255,255,0.05); color:var(--accent); border:1px solid rgba(255,255,255,0.1); padding:10px 18px; border-radius:25px; font-size:13px; font-weight:bold; cursor:pointer;">🖼️ HAYAL ET</button>
            <button type="button" onclick="toggleDrawer()" style="background:rgba(255,255,255,0.05); color:var(--accent); border:1px solid rgba(255,255,255,0.1); padding:10px 18px; border-radius:25px; font-size:13px; font-weight:bold; cursor:pointer;">📂 ARŞİV</button>
        </div>
        <form class="input-row" onsubmit="event.preventDefault(); handleAction('chat');">
            <input type="text" id="userInput" placeholder="Mesajını gönder..." autocomplete="off">
            <button type="submit" class="send-btn">🚀</button>
        </form>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_key_v14');
        let currentChatId = Date.now().toString();

        if (!API_KEY) {
            API_KEY = prompt("Zeka-X için API Anahtarını girin:");
            if (API_KEY) localStorage.setItem('groq_key_v14', API_KEY.trim());
        }

        function openThemePicker() { document.getElementById('theme-overlay').classList.remove('hidden'); toggleDrawer(); }
        
        function setTheme(team) { 
            document.body.className = 'tema-' + team; 
            localStorage.setItem('user_theme', team); 
            document.getElementById('theme-overlay').classList.add('hidden');
            const welcomeMsg = {
                besiktas: "Vodafone Park havası geldi! Hazırım kral, 11'i mi kuruyoruz? 🦅",
                galatasaray: "Aslanlar sahada! Emirlerini bekliyorum kaptan. 🦁",
                fenerbahce: "Kadıköy ruhu burada! Ne yapıyoruz şef? 🐦",
                trabzonspor: "Fırtına koptu! Denizden ne çıkaralım reis? 🌪️"
            };
            if(!getHist(currentChatId).length) addMsg(welcomeMsg[team], 'ai');
        }
        
        const savedTheme = localStorage.getItem('user_theme');
        if(savedTheme) setTheme(savedTheme);

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); if(document.getElementById('drawer').classList.contains('open')) updateHistoryUI(); }

        async function handleAction(type) {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

            if (type === 'chat') {
                addMsg(text, 'user');
                input.value = '';
                saveLocal(currentChatId, { role: 'user', content: text, time });
                const aiMsg = addMsg("⚡ Analiz ediliyor...", 'ai');
                
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            model: "llama-3.3-70b-versatile", 
                            messages: [
                                {role: "system", content: "Sen Zeka-X Elite'sin. Geliştiricin Bedirhan Ayaz. 2026 yılı güncel futbol ve genel kültür bilgilerine hakimsin. Karşındaki kişi senin sahibin, samimi ve zeki cevaplar ver."},
                                ...getHist(currentChatId).map(m => ({ role: m.role, content: m.content }))
                            ]
                        })
                    });
                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    aiMsg.innerHTML = reply + `<span style="font-size:10px; display:block; opacity:0.4; text-align:right; margin-top:8px;">${time}</span>`;
                    saveLocal(currentChatId, { role: 'assistant', content: reply, time });
                } catch { aiMsg.innerText = "Bağlantı kesildi kral!"; }
            } else {
                addMsg(`🖼️ Hayal: ${text}`, 'user');
                input.value = '';
                const aiMsg = addMsg("🎨 Tablo çiziliyor...", 'ai');
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true&seed=${Math.random()}`;
                const img = new Image();
                img.src = imgUrl; img.className = "ai-img";
                img.onload = () => { aiMsg.innerHTML = `<img src="${imgUrl}" class="ai-img"><span style="font-size:10px; display:block; opacity:0.4; text-align:right;">${time}</span>`; };
                saveLocal(currentChatId, { role: 'assistant', content: `[Görsel]: ${text}`, img: imgUrl, time });
            }
        }

        function addMsg(t, c) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerHTML = t;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d);
            cont.scrollTop = cont.scrollHeight;
            return d;
        }

        function saveLocal(id, obj) {
            let db = JSON.parse(localStorage.getItem('zekax_db_v14') || "{}");
            if (!db[id]) db[id] = { title: obj.content.substring(0, 30), messages: [] };
            db[id].messages.push(obj);
            localStorage.setItem('zekax_db_v14', JSON.stringify(db));
        }

        function getHist(id) { return JSON.parse(localStorage.getItem('zekax_db_v14') || "{}")[id]?.messages || []; }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            let db = JSON.parse(localStorage.getItem('zekax_db_v14') || "{}");
            list.innerHTML = "";
            Object.keys(db).reverse().forEach(id => {
                const card = document.createElement('div');
                card.style = "background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; margin-bottom:12px; cursor:pointer; border:1px solid rgba(255,255,255,0.05);";
                card.innerHTML = `<b>${db[id].title}...</b>`;
                card.onclick = () => {
                    currentChatId = id;
                    document.getElementById('chat-container').innerHTML = "";
                    db[id].messages.forEach(m => addMsg(m.img ? `<img src="${m.img}" class="ai-img">` : m.content, m.role === 'user' ? 'user' : 'ai'));
                    toggleDrawer();
                };
                list.appendChild(card);
            });
        }
        function startNewChat() { currentChatId = Date.now().toString(); document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Yeni saha, yeni başlangıç!</div>'; toggleDrawer(); }
    </script>
</body>
    </html>
