<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lost World PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#0b1020;
}

canvas{
  display:block;
}

/* MENÜ */
#menu{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(#0b1020,#1b2a49);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  z-index:20;
}

button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin-top:20px;
}

/* TUTORIAL */
#tutorial{
  position:fixed;
  bottom:120px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  background:rgba(0,0,0,0.6);
  padding:10px 20px;
  border-radius:10px;
  z-index:10;
  display:none;
}

/* UI */
#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  z-index:10;
}

/* joystick */
#base{
  position:fixed;
  bottom:30px;
  left:30px;
  width:110px;
  height:110px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
}

#stick{
  position:absolute;
  width:45px;
  height:45px;
  border-radius:50%;
  background:white;
  left:32px;
  top:32px;
}

/* jump */
#jump{
  position:fixed;
  bottom:40px;
  right:30px;
  padding:18px;
  border-radius:10px;
  background:rgba(255,255,255,0.2);
  color:white;
  border:none;
}
</style>
</head>

<body>

<!-- MENÜ -->
<div id="menu">
  <h1>🌍 LOST WORLD PRO+</h1>
  <p>Hikayeli 2D Macera Oyunu</p>
  <button onclick="startGame()">▶ Başlat</button>
</div>

<!-- TUTORIAL -->
<div id="tutorial">Joystick ile hareket et, zıplamak için butona bas!</div>

<div id="ui">❤️ Can: <span id="hp">100</span></div>

<canvas id="c"></canvas>

<div id="base"><div id="stick"></div></div>
<button id="jump">⬆ Zıpla</button>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

// GAME STATE
let state="menu";

// PLAYER (İNSAN GÖRÜNÜMLÜ)
let p={
  x:100,
  y:0,
  w:30,
  h:60,
  vx:0,
  vy:0,
  g:false,
  jump:-13,
  hp:100
};

let ground=c.height-120;
let camera=0;

// PLATFORMS
let plats=[
  {x:0,y:ground,w:3000,h:120},
  {x:250,y:ground-120,w:120,h:20},
  {x:500,y:ground-200,w:120,h:20},
  {x:800,y:ground-150,w:120,h:20},
  {x:1100,y:ground-220,w:120,h:20}
];

// START GAME
function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("tutorial").style.display="block";
  state="tutorial";

  setTimeout(()=>{
    document.getElementById("tutorial").innerText="Şimdi ilerle ve dünyayı keşfet...";
  },3000);

  setTimeout(()=>{
    document.getElementById("tutorial").style.display="none";
    state="game";
  },6000);
}

// DRAW HUMAN CHARACTER
function drawPlayer(){
  let x=p.x-camera;
  let y=p.y;

  // head
  ctx.fillStyle="#ffe0bd";
  ctx.beginPath();
  ctx.arc(x+15,y+10,10,0,Math.PI*2);
  ctx.fill();

  // body
  ctx.fillStyle="#00ffcc";
  ctx.fillRect(x+10,y+20,10,25);

  // legs
  ctx.fillStyle="#333";
  ctx.fillRect(x+8,y+45,6,15);
  ctx.fillRect(x+16,y+45,6,15);
}

// WORLD
function drawWorld(){
  ctx.fillStyle="#444";
  plats.forEach(pl=>{
    ctx.fillRect(pl.x-camera,pl.y,pl.w,pl.h);
  });
}

// PHYSICS
function update(){
  p.vy+=0.6;
  p.y+=p.vy;
  p.x+=p.vx;

  p.g=false;

  plats.forEach(pl=>{
    if(p.x < pl.x+pl.w &&
       p.x+p.w > pl.x &&
       p.y+p.h < pl.y+10 &&
       p.y+p.h+p.vy >= pl.y){

      p.y=pl.y-p.h;
      p.vy=0;
      p.g=true;
    }
  });

  camera=p.x-120;

  if(p.y>c.height){
    p.x=100;
    p.y=0;
    p.hp-=20;
    document.getElementById("hp").innerText=p.hp;
  }
}

// LOOP
function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  if(state==="game"){
    update();
    drawWorld();
    drawPlayer();
  }

  requestAnimationFrame(loop);
}

loop();

/* JOYSTICK */
let base=document.getElementById("base");
let stick=document.getElementById("stick");
let drag=false;

base.addEventListener("touchstart",()=>drag=true);
base.addEventListener("touchend",()=>{
  drag=false;
  stick.style.left="32px";
  stick.style.top="32px";
  p.vx=0;
});

base.addEventListener("touchmove",(e)=>{
  if(!drag)return;

  let t=e.touches[0];
  let r=base.getBoundingClientRect();

  let dx=t.clientX-r.left-55;

  stick.style.left=(32+dx*0.2)+"px";

  if(state==="game"){
    p.vx=dx*0.05;
  }
});

/* JUMP */
document.getElementById("jump").ontouchstart=()=>{
  if(state==="game" && p.g){
    p.vy=p.jump;
  }
};

document.addEventListener("keydown",(e)=>{
  if(e.key===" " && p.g){
    p.vy=p.jump;
  }
});
</script>

</body>
</html>
