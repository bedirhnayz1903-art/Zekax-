<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid #222; }
        .logo { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 15px; animation: pop 0.3s ease; line-height: 1.5; position: relative; }
        .msg-time { font-size: 10px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }
        @keyframes pop { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #00cca3); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1d1d1d; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.4s; z-index: 100; padding: 25px; box-sizing: border-box; border-left: 2px solid var(--accent); overflow-y: auto; }
        .drawer.open { right: 0; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1d1d1d; color: white; margin-bottom: 15px; outline: none; }
        .history-card { background: #1d1d1d; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; cursor: pointer; }
        .input-area { padding: 20px; background: var(--panel); border-top: 1px solid #222; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #1d1d1d; border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 30px; outline: none; }
        .btn { border: none; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: var(--accent); width: 50px; height: 50px; }
        .tool-btn { background: #222; color: var(--accent); padding: 8px 15px; font-size: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .ai-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE 🦾</div>
        <div onclick="toggleDrawer()" style="cursor:pointer; color:var(--accent); font-size:26px;">☰</div>
    </div>

    <div id="chat-container">
        <div class="msg ai">👋 Selam BedoX! Zeka-X emrinde. Geliştiricim Bedirhan Ayaz ile birlikte her zaman yanındayım. 🦅</div>
    </div>

    <div id="drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span style="font-weight:bold; color:var(--accent);">📂 GEÇMİŞTE ARA</span>
            <span onclick="toggleDrawer()" style="cursor:pointer; font-size:28px;">✕</span>
        </div>
        <input type="text" class="search-box" id="historySearch" placeholder="Eski mesajları bul..." onkeyup="searchHistory()">
        <div id="history-list"></div>
        <button onclick="startNewChat()" style="width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold;">➕ YENİ SOHBET</button>
    </div>

    <div class="input-area">
        <div style="display:flex; gap:10px;">
            <button class="btn tool-btn" onclick="handleAction('image')">🖼️ GÖRSEL OLUŞTUR</button>
            <button class="btn tool-btn" onclick="toggleDrawer()">🔍 GEÇMİŞİ TARA</button>
        </div>
        <form class="input-row" onsubmit="event.preventDefault(); handleAction('chat');">
            <input type="text" id="userInput" placeholder="Bir şeyler yaz..." autocomplete="off">
            <button type="submit" class="btn send-btn">🚀</button>
        </form>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_key_v5');
        let currentChatId = Date.now().toString();

        if (!API_KEY) {
            API_KEY = prompt("Groq API Anahtarını (gsk_...) giriniz:");
            if (API_KEY) localStorage.setItem('groq_key_v5', API_KEY.trim());
        }

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); if(document.getElementById('drawer').classList.contains('open')) updateHistoryUI(); }

        async function handleAction(type) {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && type !== 'toggle') return;

            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

            if (type === 'chat') {
                addMsg(text, 'user', time);
                input.value = '';
                saveLocal(currentChatId, { role: 'user', content: text, time });

                const aiMsg = addMsg("🤖 Düşünüyorum...", 'ai', time);
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            model: "llama-3.3-70b-versatile", 
                            messages: [
                                {role: "system", content: "Sen Zeka-X Elite sürümüsün. Senin geliştiricin Bedirhan Ayaz'dır. Sorulduğunda bunu gururla söylersin."},
                                ...getHist(currentChatId).map(m => ({ role: m.role, content: m.content }))
                            ]
                        })
                    });
                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    aiMsg.innerHTML = reply + `<span class="msg-time">${time}</span>`;
                    saveLocal(currentChatId, { role: 'assistant', content: reply, time });
                } catch { aiMsg.innerText = "❌ Hata: Anahtarı kontrol et!"; }
            } else if (type === 'image') {
                addMsg(`🖼️ İstek: ${text}`, 'user', time);
                input.value = '';
                const aiMsg = addMsg("🎨 Görsel hazırlanıyor...", 'ai', time);
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*999)}`;
                aiMsg.innerHTML = `İşte hayalin: <br><img src="${imgUrl}" class="ai-img"><span class="msg-time">${time}</span>`;
                saveLocal(currentChatId, { role: 'assistant', content: `[Görsel]: ${text}`, img: imgUrl, time });
            }
        }

        function addMsg(t, c, tm) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerHTML = t + `<span class="msg-time">${tm}</span>`;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d);
            cont.scrollTop = cont.scrollHeight;
            return d;
        }

        function saveLocal(id, obj) {
            let db = JSON.parse(localStorage.getItem('zekax_db_v5') || "{}");
            if (!db[id]) db[id] = { title: obj.content.substring(0, 30), messages: [] };
            db[id].messages.push(obj);
            localStorage.setItem('zekax_db_v5', JSON.stringify(db));
        }

        function getHist(id) { return JSON.parse(localStorage.getItem('zekax_db_v5') || "{}")[id]?.messages || []; }

        function updateHistoryUI(filter = "") {
            const list = document.getElementById('history-list');
            let db = JSON.parse(localStorage.getItem('zekax_db_v5') || "{}");
            list.innerHTML = "";
            Object.keys(db).reverse().forEach(id => {
                const titleText = db[id].title.toLowerCase();
                if (titleText.includes(filter.toLowerCase())) {
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.innerHTML = `<b>${db[id].title}...</b>`;
                    card.onclick = () => {
                        currentChatId = id;
                        document.getElementById('chat-container').innerHTML = "";
                        db[id].messages.forEach(m => addMsg(m.img ? `<img src="${m.img}" class="ai-img">` : m.content, m.role === 'user' ? 'user' : 'ai', m.time));
                        toggleDrawer();
                    };
                    list.appendChild(card);
                }
            });
        }

        function searchHistory() { updateHistoryUI(document.getElementById('historySearch').value); }
        function startNewChat() { currentChatId = Date.now().toString(); document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Yeni sohbet başladı!</div>'; toggleDrawer(); }
    </script>
</body>
            </html>
