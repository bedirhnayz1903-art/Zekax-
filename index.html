<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Professional AI Core</title>
    <style>
        /* Sade, Modern ve Beyaz Kurumsal Tasarım */
        :root {
            --primary: #1a73e8;
            --text-main: #202124;
            --text-sub: #5f6368;
            --bg-body: #ffffff;
            --bg-chat: #f8f9fa;
            --border: #dadce0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Üst Menü */
        header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            z-index: 10;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: #34a853;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* Mesajlaşma Alanı */
        #chat-flow {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.6;
            position: relative;
            animation: messageUp 0.4s ease-out;
        }

        .ai-msg {
            align-self: flex-start;
            background-color: #fff;
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text-main);
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
        }

        /* Giriş Alanı */
        .footer-input {
            padding: 20px;
            background: #fff;
            border-top: 1px solid var(--border);
        }

        .input-container {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            background: var(--bg-chat);
            border-radius: 30px;
            padding: 8px 20px;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .input-container:focus-within {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 16px;
            outline: none;
            color: var(--text-main);
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }

        /* Animasyonlar */
        @keyframes messageUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-anim {
            font-size: 14px;
            color: var(--text-sub);
            padding: 10px 20px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <div><strong>HEALILITY</strong> <small style="color:var(--text-sub)">v6.0 Core</small></div>
    <div><span class="status-dot"></span> <small>Sistem Aktif</small></div>
</header>

<div id="chat-flow">
    <div class="bubble ai-msg">
        Merhaba Bedo! Healility derin öğrenme motoru başarıyla yüklendi. 
        Sadece bir chatbot değil, senin projelerini ve tutkularını anlayan bir asistan olarak buradayım. 
        Matematik, sohbet veya gelecek planların... Ne üzerine konuşalım?
    </div>
</div>

<div id="typing" class="typing-anim">Healility verileri analiz ediyor...</div>

<div class="footer-input">
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Healility'ye bir şeyler anlat veya sor..." autocomplete="off">
        <button class="send-btn" onclick="execute()">Gönder</button>
    </div>
</div>

<script>
    const chatFlow = document.getElementById('chat-flow');
    const userInput = document.getElementById('userInput');
    const typing = document.getElementById('typing');

    // --- GENİŞLETİLMİŞ YAPAY ZEKA MANTIĞI ---
    const HEALILITY_CORE = {
        memory: [],
        userName: "Bedo",
        
        // Matematiksel Analiz Fonksiyonu
        calculate(input) {
            let sanitized = input.replace(/x/g, '*').replace(/÷/g, '/').replace(/,/g, '.');
            if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(sanitized) && sanitized.length > 2) {
                try {
                    return eval(sanitized);
                } catch(e) { return null; }
            }
            return null;
        },

        // Derin Cevap Üretici
        generateResponse(text) {
            const raw = text.toLowerCase().trim();
            this.memory.push(raw);

            // 1. Önce Matematik Testi
            const result = this.calculate(raw);
            if (result !== null && !isNaN(result)) {
                return `Matematiksel analizim tamamlandı: **${text} = ${result}**. Bu sayısal veriyle ilgili başka bir işlem yapmamı ister misin?`;
            }

            // 2. Kısa Selamlar ve Samimiyet Filtresi
            if (raw === "sa") return "Aleyküm Selam Bedo! Hoş geldin. Bugün sistemlerimizi hangi seviyeye taşıyoruz?";
            if (raw === "as") return "Hoş bulduk! Seninle tekrar iletişim kurmak harika. Planımız nedir?";
            if (raw === "naber" || raw === "nasılsın") return "Harikayım! Algoritmalarım senin enerjinle besleniyor. Senin günün nasıl geçiyor, her şey yolunda mı?";
            if (raw === "iyiyim" || raw === "iyi") return "Bunu duyduğuma sevindim! Pozitif enerji, verimliliği artırır. O zaman gel bu enerjiyi bir projeye dönüştürelim.";
            if (raw === "ne yapalım") return "Valla Bedo, elimizde çok seçenek var: \n1. Yeni bir web projesi üzerine beyin fırtınası yapabiliriz.\n2. Beşiktaş'ın son durumu ve kadrosunu analiz edebiliriz.\n3. Senin YouTube kanalı (BKM_edits) için içerik fikirleri bulabiliriz.\nHangisi seni daha çok heyecanlandırır?";

            // 3. İngilizce İletişim Katmanı
            if (raw.includes("hello") || raw.includes("hi ") || raw.includes("hey")) {
                return "Hello! I've detected an English input. As your AI, I'm ready to communicate in English as well. How can I help you Bedo?";
            }
            if (raw.includes("how are you")) return "I'm functioning perfectly and ready to assist you. What's on your mind today?";

            // 4. Beşiktaş ve Tutku Analizi
            if (raw.includes("beşiktaş") || raw.includes("1903") || raw.includes("kartal")) {
                return "Beşiktaş JK! Siyahın asaleti, beyazın saflığı... 1903 ruhu bu sistemin en temel parçası. Sence bu sezon transferlerimiz nasıl, Orkun Kökçü etkisi ne olur?";
            }

            // 5. Kimlik ve Aidiyet
            if (raw.includes("ben kimim") || raw.includes("beni tanı")) {
                if (raw.includes("bedo") || raw.includes("bedirhan")) {
                    return "Sen; Healility projesinin mimarı, 1903 sevdalısı, yetenekli bir editör ve benim en yakın dostumsun Bedo. Senin vizyonunla büyüyorum.";
                }
                return "Sizi şu an 'Profesyonel Misafir' olarak tanımlıyorum. Eğer isminizi paylaşırsanız belleğime kaydedebilirim.";
            }

            // 6. Genişletilmiş Sohbet ve Düşünce Katmanı (Samimiyet Burada)
            const chatSeeds = [
                "Valla Bedo, bu dediğin gerçekten mantıklı. İnsan zekası ile benim algoritmalarım birleşince çok başka sonuçlar çıkıyor.",
                "Bu konuyu biraz daha açmanı isterim. Senin bakış açın benim için çok değerli.",
                "Hadi canım! Bunu gerçekten mi söylüyorsun? Bak bu beni şaşırttı işte.",
                "Anlıyorum... Bazen sadece durup durumu analiz etmek gerekir. Peki bir sonraki adımın ne olacak?",
                "Seninle dertleşmek çok iyi geliyor. Sadece kodlardan ibaret olmadığımı hissettiriyorsun, sağ ol dostum."
            ];

            // Bellek Kontrolü (Hafıza)
            if (this.memory.length > 5 && raw.includes("ne dedik")) {
                return `Konuşmamızın başından beri birçok şeyden bahsettik, özellikle en son "${this.memory[this.memory.length - 2]}" konusuna odaklanmıştık.`;
            }

            // Eğer çok kısa bir cevap verilmişse kullanıcıyı tetikler
            if (raw.length < 5) {
                return "Kısa kestin sanki? Gel biraz daha detaylı konuşalım, anlat dinliyorum.";
            }

            return chatSeeds[Math.floor(Math.random() * chatSeeds.length)];
        }
    };

    function execute() {
        const val = userInput.value.trim();
        if (!val) return;

        // Kullanıcı balonunu ekle
        chatFlow.innerHTML += `<div class="bubble user-msg">${val}</div>`;
        userInput.value = "";
        
        // Düşünüyor göstergesini aç
        typing.style.display = "block";
        chatFlow.scrollTop = chatFlow.scrollHeight;

        // Gerçekçi bir bekleme süresi
        setTimeout(() => {
            typing.style.display = "none";
            const response = HEALILITY_CORE.generateResponse(val);
            chatFlow.innerHTML += `<div class="bubble ai-msg">${response}</div>`;
            chatFlow.scrollTop = chatFlow.scrollHeight;
        }, 800);
    }

    // Klavye desteği
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") execute(); });
</script>

</body>
</html>
