<!DOCTYPE html>
<html>
<body style="margin:0; background:#111; overflow:hidden">
    <canvas id="g"></canvas>
    <script>
        const c = document.getElementById('g'), x = c.getContext('2d');
        let p = {x:200, y:200}, ms = [];
        c.width = window.innerWidth; c.height = window.innerHeight;

        // Tıklayınca Ateş Et
        window.onmousedown = e => {
            let ang = Math.atan2(e.clientY - p.y, e.clientX - p.x);
            ms.push({x:p.x, y:p.y, vx:Math.cos(ang)*8, vy:Math.sin(ang)*8});
        };

        // Hareket (Mouse takibi)
        window.onmousemove = e => { p.x = e.clientX; p.y = e.clientY; };

        function draw() {
            x.fillStyle = 'rgba(0,0,0,0.2)'; x.fillRect(0,0,c.width,c.height);
            x.fillStyle = 'lime'; x.beginPath(); x.arc(p.x, p.y, 15, 0, 7); x.fill(); // Oyuncu
            
            ms.forEach((m, i) => {
                m.x += m.vx; m.y += m.vy;
                x.fillStyle = 'red'; x.fillRect(m.x, m.y, 5, 5); // Mermi
                if(m.x<0 || m.x>c.width || m.y<0 || m.y>c.height) ms.splice(i,1);
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
