<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEKA-X ELITE</title>
    <style>
        /* Genel Stil */
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; }
        
        /* Üç Nokta Menüsü */
        .menu-container { position: fixed; top: 15px; right: 15px; z-index: 1000; }
        #menu-btn { font-size: 28px; cursor: pointer; padding: 5px 10px; background: #1a1a1a; border-radius: 50%; }
        
        /* Geçmiş Paneli */
        .history-panel { 
            display: none; position: absolute; right: 0; top: 45px; 
            background: #1a1a1a; border: 1px solid #333; width: 220px; 
            max-height: 300px; overflow-y: auto; border-radius: 8px; padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .history-panel h3 { font-size: 14px; margin-top: 0; color: #00ffcc; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #history-list { list-style: none; padding: 0; margin: 0; }
        #history-list li { font-size: 13px; padding: 8px 0; border-bottom: 1px solid #222; color: #bbb; }

        /* Sohbet Alanı (Örnek) */
        .chat-box { padding: 20px; margin-top: 50px; }
        input { padding: 10px; width: 70%; border-radius: 5px; border: none; }
        button { padding: 10px; background: #00ffcc; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="menu-container">
        <div id="menu-btn" onclick="toggleHistory()">⋮</div>
        <div id="history-panel" class="history-panel">
            <h3>Geçmiş Yazışmalar</h3>
            <ul id="history-list"></ul>
            <button onclick="clearHistory()" style="width:100%; font-size:10px; margin-top:10px; background:#ff4444; color:white;">Geçmişi Temizle</button>
        </div>
    </div>

    <div class="chat-box">
        <div id="messages"></div>
        <input type="text" id="userInput" placeholder="Zeka-X'e bir şey yaz...">
        <button onclick="sendMessage()">Gönder</button>
    </div>

    <script>
        // Sayfa açıldığında geçmişi yükle
        window.onload = function() {
            displayHistory();
        };

        // Menüyü Aç/Kapat
        function toggleHistory() {
            var panel = document.getElementById("history-panel");
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        }

        // Mesaj Gönder ve Geçmişe Kaydet
        function sendMessage() {
            var input = document.getElementById("userInput");
            var text = input.value;
            if (text.trim() !== "") {
                // Geçmişi Al
                var history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
                // Yeni mesajı ekle
                history.push(text);
                // Geri kaydet (Sadece son 10 mesajı tutalım yer kaplamasın)
                if (history.length > 10) history.shift();
                localStorage.setItem("chatHistory", JSON.stringify(history));
                
                input.value = ""; // Kutuyu boşalt
                displayHistory(); // Listeyi güncelle
                alert("Mesaj gönderildi ve geçmişe eklendi!");
            }
        }

        // Geçmişi Ekrana Yazdır
        function displayHistory() {
            var list = document.getElementById("history-list");
            var history = JSON.parse(localStorage.getItem("chatHistory") || "[]");
            list.innerHTML = ""; 
            
            if (history.length === 0) {
                list.innerHTML = "<li>Henüz geçmiş yok...</li>";
            } else {
                history.reverse().forEach(function(item) {
                    var li = document.createElement("li");
                    li.textContent = item;
                    list.appendChild(li);
                });
            }
        }

        // Geçmişi Sil
        function clearHistory() {
            localStorage.removeItem("chatHistory");
            displayHistory();
        }
    </script>
</body>
            </html>
