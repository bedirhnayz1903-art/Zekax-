<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Parkur Macera</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87CEEB, #1e1e1e);
    font-family: Arial;
}

canvas {
    display: block;
}

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
    font-size: 18px;
    text-shadow: 0 0 5px black;
}

button {
    position: fixed;
    bottom: 20px;
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.3);
    color: white;
}

#left { left: 20px; }
#right { left: 110px; }
#jump { right: 20px; }
</style>
</head>

<body>

<div id="ui">🏃 Mesafe: <span id="score">0</span></div>

<canvas id="game"></canvas>

<button id="left">⬅️</button>
<button id="right">➡️</button>
<button id="jump">⬆️</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// OYUNCU
let player = {
    x: 80,
    y: 0,
    w: 40,
    h: 40,
    dy: 0,
    gravity: 0.8,
    jumpPower: -14,
    grounded: false
};

// ZEMİN
let ground = canvas.height - 80;

// ENGELLER
let obstacles = [];
let cameraX = 0;
let score = 0;

// ENGEL ÜRET
function spawnObstacle(){
    obstacles.push({
        x: cameraX + canvas.width + Math.random()*300,
        y: ground - 40,
        w: 40,
        h: 40
    });
}

setInterval(spawnObstacle, 1500);

// GRAVITY
function updatePlayer(){
    player.dy += player.gravity;
    player.y += player.dy;

    if(player.y + player.h >= ground){
        player.y = ground - player.h;
        player.dy = 0;
        player.grounded = true;
    } else {
        player.grounded = false;
    }
}

// ÇİZİM PLAYER
function drawPlayer(){
    ctx.fillStyle = "#00ff99";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // basit yüz efekti
    ctx.fillStyle = "black";
    ctx.fillRect(player.x+10, player.y+10, 5, 5);
    ctx.fillRect(player.x+25, player.y+10, 5, 5);
}

// ENGELLER
function drawObstacles(){
    ctx.fillStyle = "#ff4444";

    obstacles.forEach((o,i)=>{
        o.x -= 5;

        ctx.fillRect(o.x - cameraX, o.y, o.w, o.h);

        // çarpışma
        if(player.x < o.x - cameraX + o.w &&
           player.x + player.w > o.x - cameraX &&
           player.y < o.y + o.h &&
           player.y + player.h > o.y){
            alert("OYUN BİTTİ 💥");
            location.reload();
        }

        if(o.x < cameraX - 200){
            obstacles.splice(i,1);
        }
    });
}

// ZEMİN
function drawGround(){
    ctx.fillStyle = "#333";
    ctx.fillRect(0, ground, canvas.width, 100);
}

// SKOR
function updateScore(){
    score += 1;
    document.getElementById("score").innerText = score;
}

// LOOP
function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    cameraX += 4;

    updatePlayer();

    drawGround();
    drawPlayer();
    drawObstacles();

    updateScore();

    requestAnimationFrame(gameLoop);
}

gameLoop();

// CONTROLS
document.getElementById("jump").ontouchstart = ()=>{
    if(player.grounded){
        player.dy = player.jumpPower;
    }
};

document.getElementById("left").ontouchstart = ()=>{
    player.x -= 10;
};

document.getElementById("right").ontouchstart = ()=>{
    player.x += 10;
};

// PC
document.addEventListener("keydown",(e)=>{
    if(e.key===" " && player.grounded){
        player.dy = player.jumpPower;
    }
});
</script>

</body>
</html>
