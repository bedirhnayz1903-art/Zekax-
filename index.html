<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility Sniper - Absolute Vision</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; padding: 20px; }
        #aim { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; border: 2px solid #00f2ff; border-radius: 50%; transform: translate(-50%, -50%); }
        .btns { position: absolute; bottom: 30px; left: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .btn { padding: 15px 25px; background: #00f2ff; color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; }
        #info { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="info">📡 DURUM: TARANIYOR...<br>SKOR: <span id="sc">0</span></div>
        <div id="aim"></div>
        <div class="btns">
            <button class="btn" onclick="zoom()">DÜRBÜN</button>
            <button class="btn" onclick="location.reload()">YENİLE</button>
        </div>
        <div id="mag" style="position:absolute; bottom:30px; right:30px; font-size:35px; color:#00f2ff; font-weight:900;">10/10</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock;
        let ammo = 10, score = 0, isZoom = false;
        let targets = [], bullets = [];
        let rotX = 0, rotY = -0.5; // Kamerayı hafif aşağı bakacak şekilde başlattım

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e); // Gökyüzü rengini belirginleştirdik
            scene.fog = new THREE.Fog(0x1a1a2e, 1, 1000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 80, 50); // Konumu kesinleştirdik

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // GÜÇLÜ IŞIKLAR (Görmeme şansın yok)
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(50, 200, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            // DÜNYA İNŞASI
            createWorld();

            // KONTROLLER
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                rotX = -((t.clientX / window.innerWidth) - 0.5) * 4;
                rotY = -((t.clientY / window.innerHeight) - 0.5) * 2 - 0.5;
            }, { passive: false });

            window.addEventListener('touchstart', (e) => {
                if(e.target.tagName !== 'BUTTON') fire();
            });

            clock = new THREE.Clock();
            spawn();
        }

        function createWorld() {
            // ÜZERİNDE DURDUĞUN DEV BİNA
            const baseTower = new THREE.Mesh(
                new THREE.BoxGeometry(40, 160, 40),
                new THREE.MeshStandardMaterial({ color: 0x333344 })
            );
            baseTower.position.y = 0;
            scene.add(baseTower);

            // ZEMİN (Çok geniş yaptık)
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(3000, 3000),
                new THREE.MeshStandardMaterial({ color: 0x0a0a0a })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -80;
            scene.add(ground);

            // 360 DERECE BİNALAR (Nereye dönersen dön bina var)
            for(let i=0; i<200; i++) {
                const h = 30 + Math.random() * 120;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(20, h, 20),
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                // Binaları her yöne dağıttık
                const angle = Math.random() * Math.PI * 2;
                const dist = 100 + Math.random() * 500;
                b.position.set(
                    Math.cos(angle) * dist,
                    h/2 - 80,
                    Math.sin(angle) * dist
                );
                scene.add(b);
            }
        }

        function zoom() {
            isZoom = !isZoom;
            camera.fov = isZoom ? 15 : 75;
            camera.updateProjectionMatrix();
        }

        function fire() {
            if(ammo <= 0) return;
            ammo--; document.getElementById('mag').innerText = ammo + "/10";
            
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.v = dir.multiplyScalar(15);
            bullets.push(b);
            scene.add(b);
        }

        function spawn() {
            // RENKLİ HEDEFLER
            const e = new THREE.Mesh(new THREE.CapsuleGeometry(1.5, 3), new THREE.MeshStandardMaterial({color: 0xff0055}));
            const angle = Math.random() * Math.PI * 2;
            const dist = 150 + Math.random() * 100;
            e.position.set(Math.cos(angle) * dist, -78, Math.sin(angle) * dist);
            targets.push(e);
            scene.add(e);
            setTimeout(spawn, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.set(rotY, rotX, 0);

            bullets.forEach((b, bi) => {
                b.position.add(b.userData.v);
                targets.forEach((t, ti) => {
                    if(b.position.distanceTo(t.position) < 8) {
                        scene.remove(t); targets.splice(ti, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        score++; document.getElementById('sc').innerText = score;
                    }
                });
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
