<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility Professional: Sniper Elite</title>
    <style>
        :root { --accent: #ffcc00; --kibo: #0088ff; }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; cursor: crosshair; }
        
        /* Arayüz Katmanı */
        #hud {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 30px; box-sizing: border-box;
            z-index: 10;
        }

        .top-info { display: flex; justify-content: space-between; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        #crosshair-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px;
        }
        .ch-line { position: absolute; background: red; box-shadow: 0 0 5px rgba(255,0,0,0.5); }
        .h { width: 100%; height: 2px; top: 19px; }
        .v { width: 2px; height: 100%; left: 19px; }

        #story-panel {
            background: rgba(255, 255, 255, 0.9);
            border-left: 5px solid var(--accent);
            padding: 20px; border-radius: 4px; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            align-self: center; transition: 0.3s;
        }

        #ammo-display {
            font-size: 32px; color: var(--accent); font-weight: 900;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px;
        }

        .reloading { animation: blink 0.5s infinite; color: red !important; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="hud">
        <div class="top-info">
            <div>📍 HEALILITY HQ - ÇATI KATI</div>
            <div>HEDEF İMHASI: <span id="killCount">0</span></div>
        </div>

        <div id="crosshair-container">
            <div class="ch-line h"></div>
            <div class="ch-line v"></div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div id="story-panel">
                <small style="color: var(--kibo); font-weight: bold;">[ KİBO SİSTEM MESAJI ]</small>
                <div id="kibo-msg">Güneşli hava sensörleri aktif. Şehir güvenliği senin elinde.</div>
            </div>
            <div id="ammo-display">CEPHANE: <span id="ammoCount">10</span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * HEALILITY PROFESSIONAL GAME ENGINE
         * Konsept: Sniper High-Rise
         */

        let scene, camera, renderer, clock, kibo;
        let ammo = 10, kills = 0, isReloading = false;
        let enemies = [], bullets = [];
        
        // Kamera Kontrol Değişkenleri
        let targetRotation = { x: -Math.PI / 4, y: 0 };
        let currentRotation = { x: -Math.PI / 4, y: 0 };
        let mouse = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            // 1. Sahne Kurulumu
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 150);

            // 2. Kamera Kurulumu
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 15);

            // 3. Renderer Kurulumu
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Profesyonel gölgeler
            document.body.appendChild(renderer.domElement);

            // 4. Işıklandırma (Profesyonel Set)
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);

            // 5. ŞEHİR MİMARİSİ
            createCity();

            // 6. KİBO (Süper Detaylı Dron)
            const kiboGroup = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.6, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0xeeeeee, shininess: 100 })
            );
            kiboGroup.add(body);
            
            const eye = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0x0088ff })
            );
            eye.position.set(0, 0, 0.5);
            kiboGroup.add(eye);
            
            kibo = kiboGroup;
            scene.add(kibo);

            // 7. Olay Dinleyicileri
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onShoot);
            window.addEventListener('touchstart', onShoot);
            window.addEventListener('resize', onResize);

            clock = new THREE.Clock();
            spawnEnemyLoop();
        }

        function createCity() {
            // Ana Bina (Durduğumuz yer)
            const mainBuilding = new THREE.Mesh(
                new THREE.BoxGeometry(20, 100, 20),
                new THREE.MeshPhongMaterial({ color: 0x333344 })
            );
            mainBuilding.position.y = 0;
            scene.add(mainBuilding);

            // Zemin
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshPhongMaterial({ color: 0x556655 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -50;
            scene.add(floor);

            // Etraftaki Binalar
            for(let i=0; i<40; i++) {
                const h = 10 + Math.random() * 40;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(10, h, 10),
                    new THREE.MeshPhongMaterial({ color: Math.random() * 0x888888 })
                );
                b.position.set(
                    (Math.random()-0.5) * 200,
                    h/2 - 50,
                    (Math.random()-0.5) * 200 - 50
                );
                scene.add(b);
            }
        }

        function onMouseMove(e) {
            // Fare hareketiyle kamera hedef açısını belirleme
            mouse.x = (e.clientX / window.innerWidth) - 0.5;
            mouse.y = (e.clientY / window.innerHeight) - 0.5;

            targetRotation.y = -mouse.x * 0.8;
            targetRotation.x = -Math.PI/4 - (mouse.y * 0.5);
        }

        function onShoot() {
            if (isReloading || ammo <= 0) return;

            ammo--;
            updateHUD();
            
            // Mermi oluşturma
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffaa00 })
            );
            b.position.copy(camera.position);
            
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.userData.velocity = dir.multiplyScalar(2.5);
            
            bullets.push(b);
            scene.add(b);

            // Geri Tepme (Recoil)
            currentRotation.x += 0.05;

            if (ammo === 0) startReload();
        }

        function startReload() {
            isReloading = true;
            document.getElementById('ammo-display').classList.add('reloading');
            document.getElementById('kibo-msg').innerText = "Dikkat! Şarjör boşalıyor, KİBO mühimmat aktarıyor.";
            
            setTimeout(() => {
                ammo = 10;
                isReloading = false;
                document.getElementById('ammo-display').classList.remove('reloading');
                updateHUD();
                document.getElementById('kibo-msg').innerText = "Cephane hazır. Av devam ediyor.";
            }, 2500);
        }

        function spawnEnemyLoop() {
            const e = new THREE.Mesh(
                new THREE.CylinderGeometry(0.5, 0.5, 2),
                new THREE.MeshPhongMaterial({ color: 0xff0044 })
            );
            e.position.set((Math.random()-0.5)*100, -49, (Math.random()-0.5)*100 - 50);
            e.userData.speed = 0.05 + Math.random() * 0.1;
            enemies.push(e);
            scene.add(e);

            setTimeout(spawnEnemyLoop, 2000);
        }

        function updateHUD() {
            document.getElementById('ammoCount').innerText = ammo;
            document.getElementById('killCount').innerText = kills;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            // 1. Yumuşak Kamera Hareketi (Slerp/Lerp mantığı)
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
            
            // 2. Head Bobbing (Nefes alma simülasyonu)
            const bobbing = Math.sin(delta * 2) * 0.002;
            camera.rotation.set(currentRotation.x + bobbing, currentRotation.y, 0);

            // 3. KİBO Akıllı Takip
            kibo.position.x = camera.position.x + Math.sin(delta) * 2 + 3;
            kibo.position.y = camera.position.y + Math.cos(delta * 1.5) * 1 + 1;
            kibo.position.z = camera.position.z - 5;
            kibo.lookAt(camera.position);

            // 4. Mermi Fiziği
            bullets.forEach((b, i) => {
                b.position.add(b.userData.velocity);
                if (b.position.y < -50) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            });

            // 5. Düşman Mantığı ve Çarpışma
            enemies.forEach((e, ei) => {
                e.position.z += e.userData.speed;
                
                bullets.forEach((b, bi) => {
                    if (e.position.distanceTo(b.position) < 2) {
                        scene.remove(e);
                        enemies.splice(ei, 1);
                        scene.remove(b);
                        bullets.splice(bi, 1);
                        kills++;
                        updateHUD();
                    }
                });

                if (e.position.z > 50) { // Kaçan düşman
                    scene.remove(e);
                    enemies.splice(ei, 1);
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
