<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE PRO 🦾</title>
    <style>
        :root { 
            --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; 
            --user-bg: linear-gradient(135deg, #00ffcc, #0088cc);
        }
        
        /* 🔥 TEMALAR */
        body.tema-besiktas { --accent: #ffffff; --user-bg: linear-gradient(135deg, #444, #000); --panel: #111; --glow: rgba(255,255,255,0.08); }
        body.tema-galatasaray { --accent: #febd11; --user-bg: linear-gradient(135deg, #ff0000, #febd11); --panel: #2a0000; --glow: rgba(255,0,0,0.15); }
        body.tema-fenerbahce { --accent: #ffff00; --user-bg: linear-gradient(135deg, #003399, #ffff00); --panel: #001a4d; --glow: rgba(0,51,153,0.2); }
        body.tema-trabzonspor { --accent: #0099cc; --user-bg: linear-gradient(135deg, #660033, #0099cc); --panel: #33001a; --glow: rgba(0,153,204,0.15); }
        body.tema-klasik { --accent: #00ffcc; --user-bg: linear-gradient(135deg, #00ffcc, #0088cc); --panel: #121212; --glow: rgba(0,255,204,0.1); }

        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* Arka Plan Efekti - Tıklamaya Engel Olmaması İçin pointer-events:none */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--glow) 0%, transparent 75%);
            pointer-events: none; z-index: -1; animation: pulseGlow 5s infinite alternate;
        }
        @keyframes pulseGlow { from { opacity: 0.4; } to { opacity: 1; } }

        /* TEMA SEÇİM EKRANI (Düzeltildi) */
        #theme-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 10000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 15px; 
            backdrop-filter: blur(15px); transition: 0.4s;
        }
        #theme-overlay.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
        
        /* Butonların Tıklanabilirliğini Garantileyen Sınıf */
        .theme-card { 
            width: 85%; max-width: 320px; padding: 20px; 
            border-radius: 18px; border: 2px solid rgba(255,255,255,0.1); 
            cursor: pointer; text-align: center; font-weight: bold; 
            font-size: 1.1rem; position: relative; z-index: 10001;
            transition: 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .theme-card:active { transform: scale(0.96); opacity: 0.8; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { color: var(--accent); font-weight: 900; font-size: 1.2rem; }
        
        #match-ticker { background: var(--accent); color: #000; font-size: 10px; font-weight: bold; text-align: center; padding: 4px 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 14.5px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(30, 30, 30, 0.9); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        .input-area { padding: 15px; background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px 18px; border-radius: 30px; outline: none; }
        
        .send-btn { background: var(--accent); width: 45px; height: 45px; border: none; border-radius: 50%; color: #000; font-size: 20px; }
        .drawer { position: fixed; top: 0; right: -100%; width: 80%; height: 100%; background: var(--panel); transition: 0.3s; z-index: 999; border-left: 2px solid var(--accent); padding: 25px; }
        .drawer.open { right: 0; }
    </style>
</head>
<body>

    <div id="theme-overlay">
        <h2 style="color:white; margin-bottom:10px;">Tarafını Seç Kaptan ⚽</h2>
        <div class="theme-card" style="background:#111; color:#fff;" onclick="setTheme('besiktas')">BEŞİKTAŞ 🦅</div>
        <div class="theme-card" style="background:#ff0000; color:#febd11;" onclick="setTheme('galatasaray')">GALATASARAY 🦁</div>
        <div class="theme-card" style="background:#003399; color:#ffff00;" onclick="setTheme('fenerbahce')">FENERBAHÇE 🐦</div>
        <div class="theme-card" style="background:#660033; color:#0099cc;" onclick="setTheme('trabzonspor')">TRABZONSPOR 🌪️</div>
        <div class="theme-card" style="background:#121212; color:#00ffcc; border: 1px solid #00ffcc;" onclick="setTheme('klasik')">🤖 KLASİK / TARAFSIZ</div>
    </div>

    <div id="match-ticker">SİSTEM ÇALIŞIYOR • ZEKA-X ELITE PRO</div>

    <div class="header">
        <div class="logo">⚡ ZEKA-X PRO</div>
        <div onclick="toggleDrawer()" style="cursor:pointer; color:var(--accent); font-size:28px;">☰</div>
    </div>

    <div id="chat-container"></div>

    <div id="drawer" class="drawer">
        <h3 style="color:var(--accent)">AYARLAR</h3>
        <button onclick="openThemePicker()" style="width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; margin-bottom:15px;">🎨 TEMA DEĞİŞTİR</button>
        <button onclick="resetKey()" style="width:100%; padding:8px; background:transparent; color:#ff4444; border:1px solid #ff4444; border-radius:10px;">🔑 ANAHTARI SIFIRLA</button>
    </div>

    <div class="input-area">
        <form style="display:flex; gap:8px; align-items:center;" onsubmit="event.preventDefault(); handleAction('chat');">
            <input type="text" id="userInput" placeholder="Mesajını yaz..." autocomplete="off">
            <button type="submit" class="send-btn">🚀</button>
        </form>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_key_v25');
        if (!API_KEY) {
            API_KEY = prompt("API Key gir kaptan:");
            if (API_KEY) localStorage.setItem('groq_key_v25', API_KEY.trim());
        }

        function resetKey() { localStorage.removeItem('groq_key_v25'); location.reload(); }

        // TEMA SEÇME FONKSİYONU - HATASIZ SÜRÜM
        function setTheme(team) {
            console.log("Seçilen tema tıklandı: " + team);
            document.body.className = 'tema-' + team;
            localStorage.setItem('user_theme', team);
            
            const overlay = document.getElementById('theme-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 400);

            const ticker = document.getElementById('match-ticker');
            if(team === 'besiktas') ticker.innerText = "🦅 BEŞİKTAŞ MODU AKTİF";
            else if(team === 'galatasaray') ticker.innerText = "🦁 GALATASARAY MODU AKTİF";
            else if(team === 'fenerbahce') ticker.innerText = "🐦 FENERBAHÇE MODU AKTİF";
            else if(team === 'trabzonspor') ticker.innerText = "🌪️ TRABZONSPOR MODU AKTİF";
            else ticker.innerText = "🤖 KLASİK MOD AKTİF";
        }

        window.onload = () => {
            const saved = localStorage.getItem('user_theme');
            if(saved) setTheme(saved);
        };

        function openThemePicker() { document.getElementById('theme-overlay').classList.remove('hidden'); document.getElementById('theme-overlay').style.opacity = '1'; toggleDrawer(); }
        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); }

        async function handleAction(type) {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';
            const aiMsg = addMsg("⚡...", 'ai');
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [{role: "system", content: "Sen Zeka-X Pro'sun. Samimi ol."}, {role: "user", content: text}]
                    })
                });
                const data = await res.json();
                aiMsg.innerHTML = data.choices[0].message.content;
            } catch { aiMsg.innerText = "Hata oluştu!"; }
        }

        function addMsg(t, c) {
            const d = document.createElement('div'); d.className = `msg ${c}`; d.innerHTML = t;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d); cont.scrollTop = cont.scrollHeight; return d;
        }
    </script>
</body>
            </html>
