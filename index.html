<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X STABLE 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #111111; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* 🚀 Giriş Paneli */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        .intro-box h1 { color: var(--accent); font-size: 2rem; margin-bottom: 15px; letter-spacing: 3px; }
        .intro-box p { color: #888; line-height: 1.6; margin-bottom: 30px; font-size: 0.9rem; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 800; cursor: pointer; }

        /* Header */
        .header { 
            padding: 15px 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222;
        }
        .zx-text { font-weight: 800; color: var(--accent); letter-spacing: 2px; font-size: 0.9rem; }

        /* Chat Container */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid #222; }

        /* Input Area - Klavye Dostu */
        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 15px; background: #000; border-top: 1px solid #222;
        }
        .input-wrapper { 
            display: flex; gap: 10px; background: #181818; padding: 5px 5px 5px 15px; 
            border-radius: 25px; align-items: center; border: 1px solid #333;
        }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; height: 40px; font-size: 16px; }
        .send-btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; color: #000; cursor: pointer; font-size: 18px; flex-shrink: 0; }

        /* Resim Önizleme */
        #preview-box { display: none; padding: 10px; background: #111; border-radius: 10px; margin-bottom: 10px; position: relative; width: fit-content; }
        #preview-box img { height: 60px; border-radius: 5px; border: 1px solid var(--accent); }
        .del-img { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; }

        .hidden { display: none !important; }
        .ai-img { width: 100%; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-box">
            <h1>ZEKA-X</h1>
            <p>Bedirhan Ayaz tarafından geliştirilen fütüristik yapay zeka.<br><br>Görselleri analiz edebilir, sorularını yanıtlayabilir ve hayalindeki her şeyi çizebilir.</p>
            <button class="start-btn" onclick="startApp()">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div class="header">
        <div class="zx-text">ZEKA-X PRIME</div>
        <div onclick="resetApp()" style="font-size: 10px; color: #444; cursor: pointer;">SISTEMI_SIFIRLA</div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <div id="preview-box">
            <img id="preview-img" src="">
            <button class="del-img" onclick="clearImg()">✕</button>
        </div>
        <form class="input-wrapper" onsubmit="event.preventDefault(); handleMsg();">
            <button type="button" onclick="document.getElementById('file').click()" style="background:none; border:none; color:#888; font-size:20px; cursor:pointer;">+</button>
            <input type="file" id="file" class="hidden" accept="image/*" onchange="showPreview(this)">
            <input type="text" id="userInput" placeholder="Mesajını yaz..." autocomplete="off">
            <button type="submit" class="send-btn">🚀</button>
        </form>
    </div>

    <script>
        const API_KEY = localStorage.getItem('groq_key_v30');
        let selectedBase64 = null;

        function startApp() { document.getElementById('intro-screen').classList.add('hidden'); }
        function resetApp() { localStorage.clear(); location.reload(); }

        function showPreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-box').style.display = 'block';
                    selectedBase64 = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImg() {
            selectedBase64 = null;
            document.getElementById('preview-box').style.display = 'none';
            document.getElementById('file').value = '';
        }

        async function handleMsg() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !selectedBase64) return;

            // Kullanıcı Mesajını Bas
            let userHTML = text;
            if (selectedBase64) userHTML += `<br><img src="data:image/jpeg;base64,${selectedBase64}" style="width:100px; border-radius:10px; margin-top:5px;">`;
            addMsg(userHTML, 'user');
            
            input.value = '';
            const tempBase64 = selectedBase64;
            clearImg();

            // Görsel Çizim Kontrolü
            let drawUrl = null;
            if (text.toLowerCase().includes("çiz") || text.toLowerCase().includes("oluştur")) {
                drawUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
            }

            try {
                // Modeli belirle (Resim varsa Vision, yoksa metin modeli)
                const model = tempBase64 ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                
                let content = [];
                if (text) content.push({ type: "text", text: text });
                if (tempBase64) content.push({ type: "image_url", image_url: { url: `data:image/jpeg;base64,${tempBase64}` } });

                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: "Sen Zeka-X'sin. Bedirhan Ayaz tarafından geliştirildin. Samimi bir dille cevap ver." },
                            { role: "user", content: tempBase64 ? content : text }
                        ]
                    })
                });

                const data = await res.json();
                let reply = data.choices[0].message.content;

                if (drawUrl) {
                    reply += `<br><img src="${drawUrl}" class="ai-img">`;
                }

                addMsg(reply, 'ai');
            } catch (err) {
                addMsg("Bir hata oluştu kaptan. Lütfen tekrar dene.", 'ai');
            }
        }

        function addMsg(t, c) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerHTML = t;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d);
            cont.scrollTop = cont.scrollHeight;
        }
    </script>
</body>
    </html>
