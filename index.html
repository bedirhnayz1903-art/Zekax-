<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY AI</title>
    <style>
        /* Sade ve Profesyonel Tasarım (Beyaz Tema) */
        body {
            background-color: #ffffff;
            color: #1f1f1f;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }

        .user {
            align-self: flex-end;
            background-color: #f1f3f4;
            color: #1f1f1f;
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background-color: #ffffff;
            color: #1f1f1f;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Giriş Alanı */
        .input-wrapper {
            border-top: 1px solid #e0e0e0;
            padding: 15px;
            background: #fff;
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            background: #f1f3f4;
            border-radius: 24px;
            padding: 5px 15px;
            align-items: center;
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 16px;
            outline: none;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover { background: #1765cc; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message ai">Merhaba, ben Healility. Size nasıl yardımcı olabilirim?</div>
</div>

<div class="input-wrapper">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Bir mesaj yazın..." autocomplete="off">
        <button onclick="handleSend()">Gönder</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat-container');
    const input = document.getElementById('userInput');

    // Akıllı Analiz Motoru
    const Engine = {
        process(text) {
            const raw = text.toLowerCase().trim();
            
            // 1. Matematik Kontrolü (637x637 vb.)
            const mathExp = raw.replace(/x/g, '*').replace(/,/g, '.').replace(/÷/g, '/');
            if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(mathExp) && mathExp.length > 1) {
                try {
                    const res = eval(mathExp);
                    return `İşlem sonucu: **${res}**`;
                } catch(e) {}
            }

            // 2. İngilizce Algılama (Basit seviye)
            const englishWords = ["hello", "how are you", "what is", "who are", "help"];
            if (englishWords.some(word => raw.includes(word))) {
                if (raw.includes("hello")) return "Hello! How can I assist you today?";
                if (raw.includes("how are you")) return "I'm functioning at full capacity. How about you?";
                return "I can understand English. Please let me know how I can help!";
            }

            // 3. Kısa Kelime & Selamlaşma Filtresi
            if (raw === "sa") return "Aleyküm Selam, hoş geldin!";
            if (raw === "as") return "Merhaba, sana nasıl yardımcı olabilirim?";
            if (raw === "hg") return "Hoş bulduk, sistemlerim emrinde.";
            if (raw === "naber" || raw === "nasılsın" || raw === "nası") return "Gayet iyiyim, teşekkür ederim. Sizin için ne yapabilirim?";

            // 4. Kullanıcı Tanıma (Bedo Özel)
            if (raw.includes("adım ne") || raw.includes("beni tanı")) {
                if (raw.includes("bedo") || raw.includes("bedirhan")) {
                    return "Seni tanıyorum Bedo! Healility projesinin kurucusu ve Beşiktaş'ın sadık dostusun. Bugün harika işler çıkaracağız.";
                }
                return "Şu an sizi 'Misafir Kullanıcı' olarak görüyorum. Ama profesyonel bir asistan olarak her sorunuza cevap verebilirim.";
            }

            // 5. Beşiktaş & Samimiyet
            if (raw.includes("beşiktaş")) return "Beşiktaş JK analizi: Siyah-Beyaz ruhu sistemlerime kodlanmış durumda. 1903!";

            // Varsayılan Profesyonel Cevap
            return "Anladım. Bu konuyu daha detaylı açıklamamı ister misiniz? Size en doğru bilgiyi sağlamak için buradayım.";
        }
    };

    function handleSend() {
        const val = input.value;
        if (!val.trim()) return;

        chat.innerHTML += `<div class="message user">${val}</div>`;
        input.value = "";

        setTimeout(() => {
            const response = Engine.process(val);
            chat.innerHTML += `<div class="message ai">${response}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 500);
    }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
</script>

</body>
</html>
