<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ULTIMATE 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --panel: #0d0d0d; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Sidebar - Geçmiş Paneli */
        #sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel); z-index: 2000; transition: 0.3s;
            display: flex; flex-direction: column; padding: 20px; border-left: 1px solid #222;
        }
        #sidebar.open { right: 0; }
        .session-item { padding: 12px; background: #181818; border-radius: 10px; margin-bottom: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item.active { border-color: var(--accent); color: var(--accent); }
        .new-btn { background: var(--accent); color: #000; padding: 12px; border-radius: 10px; border: none; font-weight: 800; margin-bottom: 20px; cursor: pointer; }

        /* Header */
        .header { padding: 15px 20px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .brand { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        /* Mesajlar */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .ai { align-self: flex-start; background: #111; border: 1px solid #222; }

        /* Giriş */
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: #000; }
        .wrapper { display: flex; gap: 10px; background: #181818; padding: 5px 5px 5px 15px; border-radius: 25px; align-items: center; border: 1px solid #333; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; height: 40px; font-size: 16px; }
        .btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        
        .ai-img { width: 100%; border-radius: 15px; margin-top: 10px; }
        #preview { display: none; height: 50px; border-radius: 5px; margin-bottom: 10px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div id="sidebar">
        <button class="new-btn" onclick="newChat()">+ YENİ SOHBET</button>
        <div id="session-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="color:#444; background:none; border:none; font-size:10px;">VERİLERİ SIFIRLA</button>
    </div>

    <div class="header">
        <div class="brand">ZEKA-X PRIME</div>
        <div onclick="toggleMenu()" style="font-size: 24px; cursor: pointer; color: var(--accent);">⋮</div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <img id="preview" src="">
        <form class="wrapper" onsubmit="event.preventDefault(); send();">
            <button type="button" onclick="document.getElementById('f').click()" style="background:none; border:none; color:#888; font-size:20px;">⊕</button>
            <input type="file" id="f" style="display:none" accept="image/*" onchange="imgPre(this)">
            <input type="text" id="in" placeholder="Mesajını yaz..." autocomplete="off">
            <button type="submit" class="btn">🚀</button>
        </form>
    </div>

    <script>
        let sessions = JSON.parse(localStorage.getItem('zx_sessions_v37')) || {};
        let currentId = localStorage.getItem('zx_cid_v37');
        let imgBase = null;
        const KEY = localStorage.getItem('groq_key_v30');

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); renderList(); }
        
        function newChat() {
            currentId = 'zx_' + Date.now();
            sessions[currentId] = { title: "Yeni Sohbet", msgs: [{role:"system", content:"Sen Zeka-X'sin. Bedirhan Ayaz yaptı. Kısa, öz ve net bilgi ver. Gereksiz uzatma."}] };
            save(); renderChat(); toggleMenu();
        }

        function imgPre(i) {
            if (i.files[0]) {
                const r = new FileReader();
                r.onload = e => { document.getElementById('preview').src = e.target.result; document.getElementById('preview').style.display='block'; imgBase = e.target.result.split(',')[1]; };
                r.readAsDataURL(i.files[0]);
            }
        }

        async function send() {
            const input = document.getElementById('in');
            const txt = input.value.trim();
            if(!txt && !imgBase) return;
            if(!currentId) newChat();

            let uH = txt;
            if(imgBase) uH += `<br><img src="data:image/jpeg;base64,${imgBase}" style="width:80px; border-radius:8px; margin-top:5px;">`;
            addMsg(uH, 'user');

            sessions[currentId].msgs.push({role:"user", content: txt});
            if(sessions[currentId].title === "Yeni Sohbet") sessions[currentId].title = txt.substring(0,20);
            
            const tmpImg = imgBase;
            input.value = ''; imgBase = null; document.getElementById('preview').style.display='none';

            let draw = (txt.toLowerCase().includes("çiz") || txt.toLowerCase().includes("oluştur")) ? `https://image.pollinations.ai/prompt/${encodeURIComponent(txt)}?nologo=true` : null;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: tmpImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: sessions[currentId].msgs
                    })
                });
                const d = await res.json();
                let rpl = d.choices[0].message.content;
                if(draw) rpl += `<br><img src="${draw}" class="ai-img">`;
                
                addMsg(rpl, 'ai');
                sessions[currentId].msgs.push({role:"assistant", content: rpl});
                save();
            } catch(e) { addMsg("Hata oluştu kral.", 'ai'); }
        }

        function addMsg(t, c) {
            const d = document.createElement('div'); d.className = `msg ${c}`; d.innerHTML = t;
            const cnt = document.getElementById('chat-container'); cnt.appendChild(d);
            cnt.scrollTop = cnt.scrollHeight;
        }

        function renderList() {
            const l = document.getElementById('session-list'); l.innerHTML = '';
            Object.keys(sessions).reverse().forEach(id => {
                const i = document.createElement('div'); i.className = `session-item ${id===currentId?'active':''}`;
                i.innerText = sessions[id].title;
                i.onclick = () => { currentId = id; save(); renderChat(); toggleMenu(); };
                l.appendChild(i);
            });
        }

        function renderChat() {
            const cnt = document.getElementById('chat-container'); cnt.innerHTML = '';
            if(currentId && sessions[currentId]) {
                sessions[currentId].msgs.forEach(m => { if(m.role!=='system') addMsg(m.content, m.role==='user'?'user':'ai'); });
            }
        }
