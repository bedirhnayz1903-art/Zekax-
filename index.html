<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility Elite | Mobile Sniper</title>
    <style>
        :root { --main: #00f2ff; --accent: #ffcc00; --danger: #ff0055; }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; touch-action: none; }
        
        /* Dashboard */
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 25px; z-index: 10;
        }

        .os-header { display: flex; justify-content: space-between; color: white; text-shadow: 0 0 10px rgba(0,0,0,0.5); font-size: 14px; }
        
        /* Sniper Scope Overlay */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: var(--danger); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px var(--danger); }

        .control-panel { display: flex; justify-content: space-between; align-items: flex-end; }
        
        #kibo-box {
            background: rgba(0, 0, 0, 0.7); border-bottom: 4px solid var(--main);
            padding: 15px; border-radius: 0 15px 0 0; color: #fff; max-width: 220px;
            font-size: 12px; backdrop-filter: blur(5px);
        }

        #mag-status {
            font-size: 35px; font-weight: 900; color: var(--accent);
            text-align: right; line-height: 1;
        }
        
        .reload-anim { animation: warning 0.4s infinite; }
        @keyframes warning { 50% { color: var(--danger); opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="os-header">
            <div>[ UNIT: HEALILITY-01 ]</div>
            <div>HEDEF: <span id="kill-val">0</span></div>
        </div>

        <div id="crosshair"></div>

        <div class="control-panel">
            <div id="kibo-box">
                <span style="color:var(--main); font-weight:bold;">KİBO.ai v.2.6</span><br>
                <div id="kibo-msg">Güneş tepe noktasında. Şehir taraması yapılıyor...</div>
            </div>
            <div id="mag-status">12<small style="font-size:15px">/12</small></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /** * GitHub Mobile Optimized Game Engine 
         * Author: Gemini Adaptive Assistant 
         */

        let scene, camera, renderer, clock, kibo;
        let ammo = 12, kills = 0, isReloading = false;
        let enemies = [], tracers = [];
        let viewShift = new THREE.Vector2(0, -Math.PI/4);
        let lerpView = new THREE.Vector2(0, -Math.PI/4);

        init();
        renderLoop();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 30, 140);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 0); // Binanın tam tepesi

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // GÜNEŞ & ATMOSFER
            const sun = new THREE.DirectionalLight(0xffffff, 1.3);
            sun.position.set(30, 80, 40);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // ŞEHİR TASARIMI
            buildSniperNest();

            // KİBO MODÜLÜ (Seni Takip Eden Gelişmiş Form)
            const kiboCore = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.5, 2),
                new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00f2ff, wireframe: true })
            );
            kibo = kiboCore;
            scene.add(kibo);

            // MOBİL KONTROL SİSTEMİ
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                viewShift.x = -((t.clientX / window.innerWidth) - 0.5) * 1.8;
                viewShift.y = -Math.PI/3.5 - ((t.clientY / window.innerHeight) - 0.5) * 1.2;
            }, { passive: false });

            window.addEventListener('touchstart', () => {
                if(isReloading) return;
                ammo > 0 ? fire() : reloadSequence();
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            clock = new THREE.Clock();
            enemyDispatcher();
        }

        function buildSniperNest() {
            // Ana Kule
            const tower = new THREE.Mesh(
                new THREE.CylinderGeometry(15, 15, 100, 32),
                new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.1 })
            );
            tower.position.y = -10;
            scene.add(tower);

            // Şehir Tabanı
            const ground = new THREE.Mesh(
                new THREE.CircleGeometry(500, 32),
                new THREE.MeshStandardMaterial({ color: 0x7f8c8d })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -50;
            scene.add(ground);

            // Etraftaki Modern Yapılar
            for(let i=0; i<50; i++) {
                const height = 15 + Math.random() * 45;
                const building = new THREE.Mesh(
                    new THREE.BoxGeometry(10, height, 10),
                    new THREE.MeshPhongMaterial({ color: 0xecf0f1 })
                );
                building.position.set(
                    (Math.random()-0.5)*300, 
                    height/2 - 50, 
                    (Math.random()-0.5)*300 - 60
                );
                scene.add(building);
            }
        }

        function fire() {
            ammo--;
            updateUI();
            
            // Lazer Tracer (Mermi İzi)
            const tracer = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 3),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff })
            );
            tracer.position.copy(camera.position);
            tracer.rotation.copy(camera.rotation);
            tracer.rotateX(Math.PI/2);
            
            const vector = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            tracer.userData.v = vector.multiplyScalar(4); // Mermi hızı
            
            tracers.push(tracer);
            scene.add(tracer);

            // KİBO Tepkisi
            kibo.scale.set(1.5, 1.5, 1.5);
            setTimeout(() => kibo.scale.set(1, 1, 1), 100);
        }

        function reloadSequence() {
            isReloading = true;
            document.getElementById('mag-status').classList.add('reload-anim');
            document.getElementById('kibo-msg').innerText = "Enerji hücreleri yenileniyor. Bekle...";
            
            setTimeout(() => {
                ammo = 12;
                isReloading = false;
                document.getElementById('mag-status').classList.remove('reload-anim');
                updateUI();
                document.getElementById('kibo-msg').innerText = "Silah stabilize edildi. Atışa hazır.";
            }, 2500);
        }

        function enemyDispatcher() {
            const e = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0xe74c3c, emissive: 0x600000 })
            );
            e.position.set((Math.random()-0.5)*120, -49, (Math.random()-0.5)*120 - 60);
            e.userData.life = true;
            enemies.push(e);
            scene.add(e);
            setTimeout(enemyDispatcher, Math.max(800, 2000 - (kills * 50)));
        }

        function updateUI() {
            document.getElementById('mag-status').innerHTML = `${ammo}<small style="font-size:15px">/12</small>`;
            document.getElementById('kill-val').innerText = kills;
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            const dt = clock.getElapsedTime();

            // Yumuşak Kamera Geçişi (Lerp)
            lerpView.x += (viewShift.x - lerpView.x) * 0.08;
            lerpView.y += (viewShift.y - lerpView.y) * 0.08;
            camera.rotation.set(lerpView.y, lerpView.x, 0);

            // KİBO Hover (Süzülme)
            kibo.position.x = camera.position.x + Math.cos(dt) * 4;
            kibo.position.y = camera.position.y + Math.sin(dt * 1.5) * 2;
            kibo.position.z = camera.position.z - 7;
            kibo.rotation.z += 0.02;

            // Tracer & Çarpışma Mantığı
            tracers.forEach((t, i) => {
                t.position.add(t.userData.v);
                if(t.position.y < -55) { scene.remove(t); tracers.splice(i, 1); }
            });

            enemies.forEach((e, ei) => {
                tracers.forEach((t, ti) => {
                    if(e.position.distanceTo(t.position) < 3) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(t); tracers.splice(ti, 1);
                        kills++; updateUI();
                    }
                });
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
