<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALILITY | Cyber Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00e676; --bg: #0a0b10; --t: #e0e0e0; --panel: #161b22; --border: #30363d; --user-b: #238636; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--t); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- AUTH SCREEN (CYBER THEME) --- */
        #auth-portal { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .glitch-logo { font-size: 60px; font-weight: 800; color: var(--p); letter-spacing: -3px; text-shadow: 0 0 15px rgba(0,230,118,0.5); }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 350px; }
        .bypass-btn { background: var(--p); color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; text-transform: uppercase; }
        .bypass-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--p); }

        /* --- HEADER --- */
        header { padding: 15px 40px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .system-status { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--p); }
        .profile-trigger { display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 6px; border: 1px solid var(--border); }

        /* --- PRO PANEL (PUROLUK) --- */
        #pro-panel {
            position: fixed; top: 75px; right: 20px; width: 300px; background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 25px; display: none; z-index: 1000; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .pro-label { font-family: 'JetBrains Mono'; color: var(--p); font-size: 11px; margin-bottom: 10px; display: block; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #8b949e; }
        .action-link { color: #f85149; font-size: 11px; cursor: pointer; text-decoration: none; margin-top: 20px; display: block; text-align: center; }

        /* --- CHAT FLOW --- */
        #chat-engine { flex: 1; padding: 30px 15%; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .m-block { display: flex; flex-direction: column; max-width: 80%; animation: fadeIn 0.4s ease; }
        .u-block { align-self: flex-end; } .a-block { align-self: flex-start; }
        .meta { font-family: 'JetBrains Mono'; font-size: 10px; color: #8b949e; margin-bottom: 5px; }
        .u-block .meta { text-align: right; }
        .bubble { padding: 16px 20px; border-radius: 12px; font-size: 15px; line-height: 1.6; border: 1px solid var(--border); }
        .u-bubble { background: var(--user-b); color: #fff; border-bottom-right-radius: 2px; }
        .a-bubble { background: #1c2128; color: var(--t); border-bottom-left-radius: 2px; }

        /* FOOTER */
        footer { padding: 25px 15%; background: var(--bg); }
        .terminal-input { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: flex; padding: 10px 20px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; font-size: 16px; }
        .send-x { color: var(--p); cursor: pointer; font-weight: 800; font-size: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-portal">
    <div class="glitch-logo">HEALILITY</div>
    <div class="auth-card">
        <p style="font-size: 13px; color: #8b949e;">SECURITY BYPASS: LOCALHOST DETECTED</p>
        <button class="bypass-btn" onclick="Core.init('Requester')">Initialize Interface</button>
        <p style="margin-top: 15px; font-size: 11px; color: #484f58;">Google Auth Encrypted for Privacy</p>
    </div>
</div>

<header>
    <div class="system-status">[ SYSTEM: OPERATIONAL ]</div>
    <div class="profile-trigger" onclick="UI.togglePanel()">
        <span id="u-name-tag">Requester</span>
        <div style="width: 24px; height: 24px; background: var(--p); border-radius: 4px; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px;">R</div>
    </div>
</header>

<div id="pro-panel">
    <span class="pro-label">// CORE IDENTITY</span>
    <h2 id="p-name">Requester</h2>
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
    <div class="data-row"><span>Log Status:</span> <span style="color: var(--p);">ENCRYPTED</span></div>
    <div class="data-row"><span>Total Queries:</span> <b id="q-count">0</b></div>
    <div class="data-row"><span>Level:</span> <b style="color: #f1e05a;">NAVIGATOR</b></div>
    <span class="action-link" onclick="Core.wipeData()">[ WIPE ALL NEURAL MEMORY ]</span>
</div>

<div id="chat-engine"></div>

<footer>
    <div class="terminal-input">
        <input type="text" id="term-field" placeholder="Kodu gir veya mesaj gönder..." autocomplete="off">
        <div class="send-x" onclick="Core.send()">➔</div>
    </div>
</footer>

<script>
    const UI = {
        togglePanel: () => {
            const p = document.getElementById('pro-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
    };

    const Core = {
        user: { id: "Requester", logs: 0 },
        
        init(alias) {
            this.user.id = alias;
            document.getElementById('auth-portal').style.display = 'none';
            document.getElementById('u-name-tag').innerText = alias;
            document.getElementById('p-name').innerText = alias;
            
            this.loadMemory();
            this.welcome();
        },

        welcome() {
            const history = localStorage.getItem('h_logs');
            let m = `**Healility Neural Core** aktif. <br><br>`;
            if(history) m += `🔐 Önceki oturum verileri kurtarıldı. Analize kaldığın yerden devam edebilirsin.`;
            else m += `Sistem temiz. İlk girişin için teşekkürler. Matematik veya genel analiz motoru emrinde.`;
            
            this.render(m, 'ai');
        },

        process(val) {
            const raw = val.toLowerCase();
            this.user.logs++;
            document.getElementById('q-count').innerText = this.user.logs;

            // MATEMATİK (Hardcoded Logic)
            let math = raw.replace(/x/g, '*').replace(/÷/g, '/');
            if (/^[0-9\+\-\*\/\.\(\)\s]+$/.test(math) && math.length >= 3) {
                try { return `Hesaplama tamamlandı: **${eval(math)}**`; } catch(e){}
            }

            if (raw.includes("naber")) return "İyiyim kanka, sistem tıkır tıkır. Senin işlemciler nasıl?";
            if (raw.includes("beşiktaş")) return "1903 Ruhu aktif! 🦅 Siyah beyaz devam.";
            
            return "Veri alındı. Analiz ediliyor... Bu konuyu biraz daha açabilirsin.";
        },

        send() {
            const f = document.getElementById('term-field');
            if(!f.value.trim()) return;
            const input = f.value;
            this.render(input, 'u');
            this.save(input, 'u');
            f.value = "";
            
            setTimeout(() => {
                const r = this.process(input);
                this.render(r, 'ai');
                this.save(r, 'ai');
            }, 500);
        },

        render(t, side) {
            const block = document.createElement('div');
            block.className = `m-block ${side}-block`;
            block.innerHTML = `<span class="meta">${side === 'u' ? this.user.id : 'HEALILITY_AI'}</span><div class="bubble ${side}-bubble">${t}</div>`;
            document.getElementById('chat-engine').appendChild(block);
            document.getElementById('chat-engine').scrollTop = document.getElementById('chat-engine').scrollHeight;
        },

        save(text, side) {
            let logs = JSON.parse(localStorage.getItem('h_logs') || "[]");
            logs.push({ text, side });
            localStorage.setItem('h_logs', JSON.stringify(logs));
        },

        loadMemory() {
            let logs = JSON.parse(localStorage.getItem('h_logs') || "[]");
            this.user.logs = logs.filter(l => l.side === 'u').length;
            document.getElementById('q-count').innerText = this.user.logs;
            if(logs.length > 0) {
                this.render("// DECRYPTING OLD RECORDS...", "ai");
                logs.forEach(l => this.render(l.text, l.side));
            }
        },

        wipeData() {
            if(confirm("Tüm veri tabanı silinecek. Onaylıyor musun?")) {
                localStorage.removeItem('h_logs');
                location.reload();
            }
        }
    };

    document.getElementById('term-field').addEventListener("keypress", (e) => { if(e.key === "Enter") Core.send(); });
</script>
</body>
</html>
