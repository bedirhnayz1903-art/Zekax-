<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ZEKA-X ULTIMATE 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --panel: #0d0d0d; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Klavye açıldığında ekranın bozulmaması için height: 100% ve overflow kullanımı */
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; }
        body { display: flex; flex-direction: column; color: var(--text); }

        /* 🚀 Giriş Ekranı */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        .intro-box h1 { color: var(--accent); font-size: 2rem; margin-bottom: 10px; letter-spacing: 3px; }
        .intro-box p { color: #888; margin-bottom: 30px; font-size: 0.9rem; line-height: 1.5; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: 800; cursor: pointer; }

        /* Sidebar - Geçmiş */
        #sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel); z-index: 2000; transition: 0.3s;
            display: flex; flex-direction: column; padding: 20px; border-left: 1px solid #222;
        }
        #sidebar.open { right: 0; }
        .session-item { padding: 12px; background: #181818; border-radius: 10px; margin-bottom: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item.active { border-color: var(--accent); color: var(--accent); }
        .new-btn { background: var(--accent); color: #000; padding: 12px; border-radius: 10px; border: none; font-weight: 800; margin-bottom: 20px; cursor: pointer; }

        /* Header */
        .header { height: 60px; padding: 0 20px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .brand { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        /* Mesaj Alanı - Esnek yapı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .ai { align-self: flex-start; background: #111; border: 1px solid #222; }

        /* Giriş Alanı - Klavye üstünde kalması için tasarlandı */
        .input-area { padding: 10px 15px 25px 15px; background: #000; border-top: 1px solid #222; flex-shrink: 0; }
        .wrapper { display: flex; gap: 10px; background: #181818; padding: 5px 5px 5px 15px; border-radius: 25px; align-items: center; border: 1px solid #333; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; height: 40px; font-size: 16px; }
        .btn { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        #preview { display: none; height: 50px; border-radius: 5px; margin-bottom: 8px; border: 1px solid var(--accent); }
        .ai-img { width: 100%; border-radius: 15px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-box">
            <h1>ZEKA-X</h1>
            <p>Bedirhan Ayaz tarafından tasarlanan akıllı asistan.<br>Görsel analiz, çizim ve hızlı bilgi.</p>
            <button class="start-btn" onclick="document.getElementById('intro-screen').classList.add('hidden')">BAŞLAT</button>
        </div>
    </div>

    <div id="sidebar">
        <button class="new-btn" onclick="newChat()">+ YENİ SOHBET</button>
        <div id="session-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="color:#444; background:none; border:none; font-size:10px; cursor:pointer;">VERİLERİ SIFIRLA</button>
    </div>

    <div class="header">
        <div class="brand">ZEKA-X ULTIMATE</div>
        <div onclick="toggleMenu()" style="font-size: 24px; cursor: pointer; color: var(--accent); padding: 5px;">⋮</div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <img id="preview" src="">
        <form class="wrapper" onsubmit="event.preventDefault(); send();">
            <button type="button" onclick="document.getElementById('f').click()" style="background:none; border:none; color:#888; font-size:20px; cursor:pointer;">⊕</button>
            <input type="file" id="f" style="display:none" accept="image/*" onchange="imgPre(this)">
            <input type="text" id="in" placeholder="Bir şey sor..." autocomplete="off">
            <button type="submit" class="btn">🚀</button>
        </form>
    </div>

    <script>
        let sessions = JSON.parse(localStorage.getItem('zx_v38_sessions')) || {};
        let currentId = localStorage.getItem('zx_v38_cid');
        let imgBase = null;
        const KEY = localStorage.getItem('groq_key_v30');

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); renderList(); }
        
        function newChat() {
            currentId = 'zx_' + Date.now();
            sessions[currentId] = { title: "Yeni Sohbet", msgs: [{role:"system", content:"Sen Zeka-X'sin. Bedirhan Ayaz yaptı. Kısa, öz ve net bilgi ver."}] };
            save(); renderChat(); document.getElementById('sidebar').classList.remove('open');
        }

        function imgPre(i) {
            if (i.files[0]) {
                const r = new FileReader();
                r.onload = e => { 
                    document.getElementById('preview').src = e.target.result; 
                    document.getElementById('preview').style.display='block'; 
                    imgBase = e.target.result.split(',')[1]; 
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        async function send() {
            const input = document.getElementById('in');
            const txt = input.value.trim();
            if(!txt && !imgBase) return;
            if(!currentId) newChat();

            let displayTxt = txt;
            if(imgBase) displayTxt += `<br><img src="data:image/jpeg;base64,${imgBase}" style="width:80px; border-radius:8px; margin-top:5px;">`;
            addMsg(displayTxt, 'user');

            sessions[currentId].msgs.push({role:"user", content: txt || "Görseli analiz et."});
            if(sessions[currentId].title === "Yeni Sohbet") sessions[currentId].title = txt ? txt.substring(0,20) : "Görsel Sohbet";
            
            const tmpImg = imgBase;
            input.value = ''; imgBase = null; document.getElementById('preview').style.display='none';

            let draw = (txt.toLowerCase().includes("çiz") || txt.toLowerCase().includes("oluştur")) ? `https://image.pollinations.ai/prompt/${encodeURIComponent(txt)}?nologo=true` : null;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: tmpImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: sessions[currentId].msgs
                    })
                });
                const d = await res.json();
                let rpl = d.choices[0].message.content;
                if(draw) rpl += `<br><img src="${draw}" class="ai-img">`;
                
                addMsg(rpl, 'ai');
                sessions[currentId].msgs.push({role:"assistant", content: rpl});
                save();
            } catch(e) { addMsg("Bağlantı hatası kral.", 'ai'); }
        }

        function addMsg(t, c) {
            const d = document.createElement('div'); d.className = `msg ${c}`; d.innerHTML = t;
            const cnt = document.getElementById('chat-container'); cnt.appendChild(d);
            cnt.scrollTop = cnt.scrollHeight;
        }

        function renderList() {
            const l = document.getElementById('session-list'); l.innerHTML = '';
            Object.keys(sessions).reverse().forEach(id => {
                const i = document.createElement('div'); i.className = `session-item ${id===currentId?'active':''}`;
                i.innerText = sessions[id].title;
                i.onclick = () => { currentId = id; save(); renderChat(); document.getElementById('sidebar').classList.remove('open'); };
                l.appendChild(i);
            });
        }

        function renderChat() {
            const cnt = document.getElementById('chat-container'); cnt.innerHTML = '';
            if(currentId && sessions[currentId]) {
                sessions[currentId].msgs.forEach(m => { if(m.role!=='system') addMsg(m.content, m.role==='user'?'user':'ai'); });
            }
        }

        function save() { 
            localStorage.setItem('zx_v38_sessions', JSON.stringify(sessions)); 
            localStorage.setItem('zx_v38_cid', currentId); 
        }

        window.onload = () => { if(currentId) renderChat(); };
    </script>
</body>
</html>
