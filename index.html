<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lost World - Story Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0b1020;
    font-family: Arial;
}

canvas {
    display: block;
}

/* UI */
#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
    text-shadow: 0 0 5px black;
}

#story {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 10px;
    max-width: 80%;
    text-align: center;
}

/* JOYSTICK */
#joystickBase {
    position: fixed;
    bottom: 30px;
    left: 30px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
}

#joystick {
    position: absolute;
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    left: 30px;
    top: 30px;
}
</style>
</head>

<body>

<div id="ui">❤️ Can: <span id="hp">100</span></div>
<div id="story">Bir gün kaybolmuş bir dünyada uyandın...</div>

<canvas id="game"></canvas>

<div id="joystickBase">
    <div id="joystick"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
let player = {
    x: 100,
    y: 0,
    w: 40,
    h: 40,
    vx: 0,
    vy: 0,
    speed: 3,
    jumpPower: -12,
    grounded: false,
    hp: 100
};

// WORLD
let ground = canvas.height - 100;
let cameraX = 0;

// PLATFORMS
let platforms = [
    {x:0, y:ground, w:2000, h:100},
    {x:300, y:ground-120, w:120, h:20},
    {x:600, y:ground-200, w:120, h:20},
    {x:950, y:ground-150, w:120, h:20},
];

// STORY TRIGGERS
let storyStep = 0;
let stories = [
    "Bir gün kaybolmuş bir dünyada uyandın...",
    "Buradan çıkmanın tek yolu ilerlemek...",
    "Ama bu dünya seni test ediyor...",
    "Gerçek çıkış en sonda..."
];

// DRAW PLAYER
function drawPlayer(){
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(player.x - cameraX, player.y, player.w, player.h);
}

// DRAW WORLD
function drawPlatforms(){
    ctx.fillStyle = "#444";

    platforms.forEach(p=>{
        ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
    });
}

// PHYSICS
function update(){
    player.vy += 0.6;
    player.y += player.vy;
    player.x += player.vx;

    player.grounded = false;

    platforms.forEach(p=>{
        if(player.x < p.x + p.w &&
           player.x + player.w > p.x &&
           player.y + player.h < p.y + 10 &&
           player.y + player.h + player.vy >= p.y){

            player.y = p.y - player.h;
            player.vy = 0;
            player.grounded = true;
        }
    });

    cameraX = player.x - 100;
}

// STORY UPDATE
function updateStory(){
    if(player.x > 250 && storyStep === 0){
        storyStep = 1;
        document.getElementById("story").innerText = stories[1];
    }
    if(player.x > 600 && storyStep === 1){
        storyStep = 2;
        document.getElementById("story").innerText = stories[2];
    }
    if(player.x > 950 && storyStep === 2){
        storyStep = 3;
        document.getElementById("story").innerText = stories[3];
    }
}

// LOOP
function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    update();
    updateStory();

    drawPlatforms();
    drawPlayer();

    if(player.hp <= 0){
        alert("OYUN BİTTİ");
        location.reload();
    }

    requestAnimationFrame(loop);
}

loop();

// JOYSTICK
let joystick = document.getElementById("joystick");
let base = document.getElementById("joystickBase");

let dragging = false;
let center = {x:50, y:50};

base.addEventListener("touchstart", e=>{
    dragging = true;
});

base.addEventListener("touchend", e=>{
    dragging = false;
    joystick.style.left = "30px";
    joystick.style.top = "30px";
    player.vx = 0;
});

base.addEventListener("touchmove", e=>{
    if(!dragging) return;

    let touch = e.touches[0];
    let rect = base.getBoundingClientRect();

    let dx = touch.clientX - rect.left - 50;
    let dy = touch.clientY - rect.top - 50;

    joystick.style.left = (30 + dx*0.2) + "px";
    joystick.style.top = (30 + dy*0.2) + "px";

    player.vx = dx * 0.05;
});

// JUMP
document.addEventListener("keydown", e=>{
    if(e.key === " " && player.grounded){
        player.vy = player.jumpPower;
    }
});
</script>

</body>
</html>
