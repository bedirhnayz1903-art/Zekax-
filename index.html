<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Lost World PRO ENGINE v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0b1020;
}

canvas{display:block;}

/* ================= MENU ================= */
#menu{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(#0b1020,#1b2a49);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:50;
}

#menu button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:10px;
}

/* ================= UI ================= */
#ui{
position:fixed;
top:10px;
left:10px;
color:white;
z-index:10;
font-size:14px;
}

/* ================= STORY ================= */
#story{
position:fixed;
bottom:140px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:white;
padding:10px 15px;
border-radius:10px;
z-index:10;
text-align:center;
max-width:80%;
display:none;
}

/* ================= JOYSTICK ================= */
#base{
position:fixed;
bottom:30px;
left:30px;
width:110px;
height:110px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick{
position:absolute;
width:45px;
height:45px;
background:white;
border-radius:50%;
left:32px;
top:32px;
}

/* ================= JUMP ================= */
#jump{
position:fixed;
bottom:40px;
right:30px;
padding:18px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.2);
color:white;
}
</style>
</head>

<body>

<!-- =============== MENU =============== -->
<div id="menu">
<h1>🌍 LOST WORLD PRO ENGINE</h1>
<p>Hikaye + Aksiyon + Wave System</p>
<button onclick="startGame()">▶ Başlat</button>
</div>

<!-- =============== STORY =============== -->
<div id="story"></div>

<!-- =============== UI =============== -->
<div id="ui">
❤️ HP: <span id="hp">100</span> |
🪙 Coin: <span id="coin">0</span> |
👹 Wave: <span id="wave">1</span>
</div>

<canvas id="c"></canvas>

<!-- JOYSTICK -->
<div id="base"><div id="stick"></div></div>

<button id="jump">⬆ Zıpla</button>

<script>

/* ================= CANVAS ================= */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* ================= GAME STATE ================= */
let state="menu";

/* ================= PLAYER ================= */
let p={
x:100,
y:0,
w:30,
h:60,
vx:0,
vy:0,
g:false,
jump:-13,
hp:100,
coin:0
};

/* ================= WORLD ================= */
let ground=c.height-120;
let camera=0;

/* ================= SYSTEMS ================= */
let wave=1;
let enemies=[];
let coins=[];
let boss=null;
let checkpoint={x:0,y:0};

/* ================= STORY ================= */
let storyIndex=0;
let stories=[
"Bir gün bilinmeyen bir dünyada uyandın...",
"Bu dünya seni test ediyor...",
"Coinleri topla ve hayatta kal...",
"Her wave daha zor olacak...",
"Boss yaklaşıyor..."
];

/* ================= START GAME ================= */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("story").style.display="block";
state="story";
showStory();
}

/* ================= STORY SYSTEM ================= */
function showStory(){
document.getElementById("story").innerText=stories[storyIndex];
setTimeout(()=>{
storyIndex++;
if(storyIndex<stories.length){
showStory();
}else{
state="game";
document.getElementById("story").style.display="none";
spawnWave();
spawnCoins();
}
},2500);
}

/* ================= SPAWN ENEMIES ================= */
function spawnWave(){
enemies=[];
for(let i=0;i<wave;i++){
enemies.push({
x:400+i*200,
y:ground-60,
w:30,
h:60,
vx:1.5+wave*0.2,
hp:1
});
}
document.getElementById("wave").innerText=wave;
}

/* ================= COINS ================= */
function spawnCoins(){
coins=[];
for(let i=0;i<5;i++){
coins.push({
x:300+i*250,
y:ground-80
});
}
}

/* ================= BOSS ================= */
function spawnBoss(){
boss={
x:800,
y:ground-120,
w:80,
h:120,
hp:10
};
}

/* ================= PLAYER DRAW ================= */
function drawPlayer(){
ctx.fillStyle="#00ffcc";
ctx.fillRect(p.x-camera,p.y,p.w,p.h);

// head
ctx.fillStyle="#ffe0bd";
ctx.fillRect(p.x-camera+5,p.y-10,20,20);
}

/* ================= ENEMY DRAW ================= */
function drawEnemies(){
ctx.fillStyle="red";

enemies.forEach((e,i)=>{
e.x -= e.vx;

ctx.fillRect(e.x-camera,e.y,e.w,e.h);

// collision
if(Math.abs(p.x-e.x)<30 && Math.abs(p.y-e.y)<40){
p.hp-=10;
document.getElementById("hp").innerText=p.hp;
e.x+=300;
}

if(e.x<camera-200){
enemies.splice(i,1);
}
});
}

/* ================= COIN DRAW ================= */
function drawCoins(){
ctx.fillStyle="gold";

coins.forEach((co,i)=>{
ctx.beginPath();
ctx.arc(co.x-camera,co.y,8,0,Math.PI*2);
ctx.fill();

if(Math.abs(p.x-co.x)<30){
coins.splice(i,1);
p.coin++;
document.getElementById("coin").innerText=p.coin;
}
});
}

/* ================= BOSS DRAW ================= */
function drawBoss(){
if(!boss)return;

ctx.fillStyle="purple";
ctx.fillRect(boss.x-camera,boss.y,boss.w,boss.h);

if(Math.abs(p.x-boss.x)<50){
p.hp-=2;
}
}

/* ================= PHYSICS ================= */
function update(){

p.vy+=0.6;
p.y+=p.vy;
p.x+=p.vx;

p.g=false;

if(p.y+60>=ground){
p.y=ground-60;
p.vy=0;
p.g=true;
}

camera=p.x-120;

/* checkpoint */
if(p.x>600){
checkpoint.x=p.x;
checkpoint.y=p.y;
}

/* wave system */
if(enemies.length===0 && state==="game"){
wave++;
spawnWave();

if(wave%3===0){
spawnBoss();
}
}

/* respawn */
if(p.hp<=0){
p.x=checkpoint.x;
p.y=checkpoint.y;
p.hp=100;
document.getElementById("hp").innerText=p.hp;
}
}

/* ================= LOOP ================= */
function loop(){
ctx.clearRect(0,0,c.width,c.height);

if(state==="game"){
update();
drawEnemies();
drawCoins();
drawBoss();
drawPlayer();
}

requestAnimationFrame(loop);
}
loop();

/* ================= JOYSTICK ================= */
let base=document.getElementById("base");
let stick=document.getElementById("stick");
let drag=false;

base.addEventListener("touchstart",()=>drag=true);
base.addEventListener("touchend",()=>{
drag=false;
stick.style.left="32px";
stick.style.top="32px";
p.vx=0;
});

base.addEventListener("touchmove",(e)=>{
if(!drag)return;

let t=e.touches[0];
let r=base.getBoundingClientRect();

let dx=t.clientX-r.left-55;

stick.style.left=(32+dx*0.2)+"px";

p.vx=dx*0.05;
});

/* ================= JUMP ================= */
document.getElementById("jump").ontouchstart=()=>{
if(p.g){
p.vy=p.jump;
}
};

document.addEventListener("keydown",(e)=>{
if(e.key===" " && p.g){
p.vy=p.jump;
}
});

</script>

</body>
</html>
