<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility: Gökdelen Savunması</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #ammo-box { font-size: 24px; color: #ffcc00; font-weight: bold; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid red; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #story { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70%; background: rgba(255,255,255,0.9); border-bottom: 5px solid #ffcc00; padding: 15px; border-radius: 5px; color: #333; text-align: center; }
        #kibo-name { color: #0088ff; font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div id="ui">
        BİNA YÜKSEKLİĞİ: 150m <br>
        AVLANAN DÜŞMAN: <span id="kills">0</span> <br>
        <div id="ammo-box">CEPHANE: <span id="ammo">20</span></div>
    </div>
    
    <div id="crosshair"></div>
    
    <div id="story">
        <span id="kibo-name">🤖 KİBO</span>
        <div id="kibo-msg">Güneşli bir gün, Healility binasının tepesindeyiz. Aşağıdaki sızmaları durdur!</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, kibo, clock;
        let bullets = [], enemies = [];
        let ammo = 20, kills = 0, isReloading = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Gökyüzü mavisi (Güneşli)

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Binanın tepesinden aşağı bakış açısı
            camera.position.set(0, 40, 10);
            camera.rotation.x = -Math.PI / 3; 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // GÜNEŞ (Işıklandırma)
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(10, 50, 20);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            // BİNA (Üzerinde durduğumuz yer)
            const bGeo = new THREE.BoxGeometry(20, 40, 20);
            const bMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
            const building = new THREE.Mesh(bGeo, bMat);
            building.position.y = 20; // Yerin yarısı aşağıda, yarısı yukarıda
            scene.add(building);

            // ŞEHİR ZEMİNİ
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x999999 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // KİBO (Parlak ve Renkli)
            const kiboGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const kiboMat = new THREE.MeshPhongMaterial({ color: 0x0088ff, emissive: 0x0044aa });
            kibo = new THREE.Mesh(kiboGeo, kiboMat);
            scene.add(kibo);

            // ATEŞ ETME
            window.addEventListener('mousedown', shoot);
            window.addEventListener('touchstart', shoot);

            clock = new THREE.Clock();
            spawnEnemy();
        }

        function shoot() {
            if (ammo <= 0) {
                document.getElementById('kibo-msg').innerText = "Mermin bitti! Yenileniyor...";
                reload();
                return;
            }
            if (isReloading) return;

            ammo--;
            document.getElementById('ammo').innerText = ammo;

            const bGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const bMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
            const bullet = new THREE.Mesh(bGeo, bMat);
            
            bullet.position.copy(camera.position);
            
            // Kamera açısına göre aşağıya doğru fırlat
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = direction.multiplyScalar(1.5);
            
            bullets.push(bullet);
            scene.add(bullet);
        }

        function reload() {
            isReloading = true;
            setTimeout(() => {
                ammo = 20;
                document.getElementById('ammo').innerText = ammo;
                document.getElementById('kibo-msg').innerText = "Cephane dolu! Ateşe devam.";
                isReloading = false;
            }, 2000);
        }

        function spawnEnemy() {
            // İNSANLAR (Aşağıda yürüyen küçük figürler)
            const eGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.2);
            const eMat = new THREE.MeshPhongMaterial({ color: Math.random() * 0xff0000 });
            const enemy = new THREE.Mesh(eGeo, eMat);
            
            // Binanın uzağında rastgele yerlerde başlasınlar
            enemy.position.set((Math.random() - 0.5) * 40, 0.6, (Math.random() - 0.5) * 40 - 20);
            enemies.push(enemy);
            scene.add(enemy);

            setTimeout(spawnEnemy, 1500);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // KİBO TAKİP (Kamera yanında uçsun)
            kibo.position.x = camera.position.x + 2;
            kibo.position.y = camera.position.y + Math.sin(time * 2) * 0.5;
            kibo.position.z = camera.position.z - 3;

            // MERMİ HAREKETİ
            bullets.forEach((b, i) => {
                b.position.add(b.userData.velocity);
                if (b.position.y < 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            });

            // DÜŞMAN HAREKETİ VE VURULMA
            enemies.forEach((e, ei) => {
                e.position.x += Math.sin(time + ei) * 0.05; // Rastgele yürüme efekti
                
                bullets.forEach((b, bi) => {
                    if (e.position.distanceTo(b.position) < 1.5) {
                        scene.remove(e);
                        enemies.splice(ei, 1);
                        scene.remove(b);
                        bullets.splice(bi, 1);
                        kills++;
                        document.getElementById('kills').innerText = kills;
                    }
                });
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
