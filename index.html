<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility Parkur Macerası</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f1b;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation; /* Mobilde çift tıklama zoomunu engeller */
        }
        #gameCanvas {
            background-color: #1a1a2e;
            border-bottom: 4px solid #e94560;
            box-shadow: 0 0 20px #e94560;
            margin-top: 20px;
        }
        #storyPanel {
            width: 90%;
            max-width: 400px;
            height: 100px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ffcc;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            line-height: 1.4;
        }
        #scoreBoard {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        .instruction {
            margin-top: 5px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Mesafe: <span id="score">0</span>m</div>
    
    <canvas id="gameCanvas" width="320" height="400"></canvas>
    
    <div id="storyPanel">
        Bağlantı kuruldu... Ekibin diğer iki üyesi hattan izliyor. Görevin Healility sunucusuna ulaşmak. Koşmaya başla!
    </div>
    
    <div class="instruction">Zıplamak için ekrana dokun!</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const storyPanel = document.getElementById("storyPanel");

        // Karakterimiz (Ana Kahraman)
        let player = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            dy: 0,
            jumpPower: -12,
            gravity: 0.6,
            grounded: false,
            color: "#00ffcc"
        };

        // Engeller (Güvenlik Dronları / Çatı Boşlukları)
        let obstacles = [];
        let frame = 0;
        let score = 0;
        let gameActive = true;

        // Ekrana dokunma/tıklama ile zıplama
        canvas.addEventListener("mousedown", jump);
        canvas.addEventListener("touchstart", jump);

        function jump() {
            if (player.grounded && gameActive) {
                player.dy = player.jumpPower;
                player.grounded = false;
            } else if (!gameActive) {
                resetGame();
            }
        }

        function resetGame() {
            player.y = 300;
            player.dy = 0;
            obstacles = [];
            score = 0;
            frame = 0;
            gameActive = true;
            updateStory(0);
            gameLoop();
        }

        function updateStory(currentScore) {
            if (currentScore === 0) {
                storyPanel.innerText = "Bağlantı kuruldu... Ekibin hattan izliyor. Görevin Healility sunucusuna ulaşmak. Koşmaya başla!";
            } else if (currentScore === 200) {
                storyPanel.innerText = "Radyo: 'Güzel atlayış! Birinci güvenlik duvarını geçtin. Lazerli dronlara dikkat et!'";
            } else if (currentScore === 500) {
                storyPanel.innerText = "Radyo: 'Çok hızlandın! Healility dış çeperine ulaştın. Sistemler seni fark etti, dayan!'";
            } else if (currentScore === 1000) {
                storyPanel.innerText = "Radyo: 'İnanılmazsın! Ana sunucu kapısı göründü. Ekip olarak arkandayız, son bir gayret!'";
            }
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0; // Diğer çizimleri etkilemesin
        }

        function drawObstacles() {
            ctx.fillStyle = "#e94560"; // Neon kırmızı engeller
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
        }

        function updatePhysics() {
            // Yerçekimi
            player.dy += player.gravity;
            player.y += player.dy;

            // Zemin çarpışması
            if (player.y + player.height > canvas.height - 10) {
                player.y = canvas.height - player.height - 10;
                player.dy = 0;
                player.grounded = true;
            }

            // Engel üretimi (Parkur zorluğu zamanla artar)
            if (frame % Math.max(70 - Math.floor(score/50), 30) === 0) {
                let obsHeight = 20 + Math.random() * 30;
                obstacles.push({
                    x: canvas.width,
                    y: canvas.height - obsHeight - 10,
                    width: 20,
                    height: obsHeight
                });
            }

            // Engelleri hareket ettir
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= (4 + score / 300); // Gittikçe hızlanan parkur

                // Çarpışma algılama
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameActive = false; // Oyun Bitti
                }

                // Ekrandan çıkan engeli sil
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        function gameLoop() {
            if (!gameActive) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Sistem Çöktü!", canvas.width / 2, canvas.height / 2);
                ctx.font = "14px Arial";
                ctx.fillText("Yeniden başlamak için dokun", canvas.width / 2, canvas.height / 2 + 30);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            updatePhysics();
            drawPlayer();
            drawObstacles();

            score++;
            if (score % 10 === 0) {
                scoreElement.innerText = score / 10;
                updateStory(score / 10);
            }
            
            frame++;
            requestAnimationFrame(gameLoop);
        }

        // Oyunu başlat
        gameLoop();
    </script>
</body>
</html>
