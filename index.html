<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ZEKA-X CORE 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --panel: #0d0d0d; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; }
        body { display: flex; flex-direction: column; color: var(--text); }

        /* 🚀 Karşılama Paneli */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        .intro-box h1 { color: var(--accent); font-size: 2.2rem; margin-bottom: 15px; letter-spacing: 5px; font-weight: 800; }
        .intro-box p { color: #aaa; line-height: 1.6; margin-bottom: 30px; font-size: 0.9rem; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 18px 50px; border-radius: 35px; font-weight: 800; cursor: pointer; }

        /* Sidebar */
        #sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel); z-index: 10000; transition: 0.3s;
            display: flex; flex-direction: column; padding: 25px; border-left: 1px solid #222;
        }
        #sidebar.open { right: 0; }
        .session-item { padding: 12px; background: #181818; border-radius: 12px; margin-bottom: 10px; font-size: 13px; cursor: pointer; border: 1px solid transparent; }
        .session-item.active { border-color: var(--accent); color: var(--accent); }

        /* Header */
        .header { height: 60px; padding: 0 20px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .brand { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        /* Mesaj Alanı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 14.5px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .ai { align-self: flex-start; background: #111; border: 1px solid #222; }

        /* Giriş Alanı */
        .input-area { padding: 15px 15px 30px 15px; background: #000; border-top: 1px solid #222; flex-shrink: 0; }
        .wrapper { display: flex; gap: 10px; background: #151515; padding: 5px 5px 5px 15px; border-radius: 30px; align-items: center; border: 1px solid #252525; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; height: 45px; font-size: 16px; }
        .btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #preview { display: none; height: 60px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--accent); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-box">
            <h1>ZEKA-X</h1>
            <p>Bedirhan Ayaz tarafından geliştirilen, görsel okuyabilen ve zeki bellek sistemine sahip asistan.</p>
            <button class="start-btn" onclick="startApp()">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="sidebar">
        <button onclick="newChat()" style="background:var(--accent); color:#000; padding:12px; border-radius:10px; border:none; font-weight:800; cursor:pointer; margin-bottom:20px;">+ YENİ SOHBET</button>
        <div id="session-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="color:#444; background:none; border:none; font-size:10px; cursor:pointer;">BELLEĞİ TEMİZLE</button>
    </div>

    <div class="header">
        <div class="brand">ZEKA-X PRIME</div>
        <div onclick="toggleMenu()" style="font-size: 28px; cursor: pointer; color: var(--accent); padding: 5px;">⋮</div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <img id="preview" src="">
        <form onsubmit="event.preventDefault(); sendMsg();" class="wrapper">
            <button type="button" onclick="document.getElementById('file-in').click()" style="background:none; border:none; color:#555; font-size:24px; cursor:pointer;">⊕</button>
            <input type="file" id="file-in" style="display:none" accept="image/*" onchange="previewImg(this)">
            <input type="text" id="user-in" placeholder="Zeka-X'e yaz..." autocomplete="off">
            <button type="submit" class="btn">🚀</button>
        </form>
    </div>

    <script>
        let sessions = JSON.parse(localStorage.getItem('zx_v41_data')) || {};
        let currentId = localStorage.getItem('zx_v41_id');
        let imgData = null;
        
        // ÖNEMLİ: API Key kontrolü
        const API_KEY = localStorage.getItem('groq_key_v30');

        function startApp() { document.getElementById('intro-screen').classList.add('hidden'); if(!currentId) newChat(); }
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); renderHistory(); }

        function newChat() {
            currentId = 'zx_' + Date.now();
            sessions[currentId] = { title: "Yeni Sohbet", msgs: [{role: "system", content: "Sen Zeka-X'sin. Bedirhan Ayaz tarafından geliştirildin. Soruları kısa ve net cevapla."}] };
            save(); renderMessages(); document.getElementById('sidebar').classList.remove('open');
        }

        function previewImg(input) {
            if (input.files[0]) {
                const r = new FileReader();
                r.onload = e => {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                    imgData = e.target.result.split(',')[1];
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        async function sendMsg() {
            const input = document.getElementById('user-in');
            const txt = input.value.trim();
            if (!txt && !imgData) return;
            if (!currentId) newChat();

            // Ekran Gösterimi
            let htmlTxt = txt;
            if(imgData) htmlTxt += `<br><img src="data:image/jpeg;base64,${imgData}" style="width:100px; border-radius:10px; margin-top:10px;">`;
            addMsgToUI(htmlTxt, 'user');

            // API'ye gidecek yapı
            let userContent = imgData ? [{type:"text", text:txt || "Görseli analiz et"}, {type:"image_url", image_url:{url:`data:image/jpeg;base64,${imgData}`}}] : txt;
            sessions[currentId].msgs.push({role: "user", content: userContent});
            
            if(sessions[currentId].title === "Yeni Sohbet") sessions[currentId].title = txt ? txt.substring(0,20) : "Görsel Sohbet";
            
            const tmpImg = imgData;
            input.value = ''; imgData = null; document.getElementById('preview').style.display = 'none';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: tmpImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: sessions[currentId].msgs
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const reply = data.choices[0].message.content;
                addMsgToUI(reply, 'ai');
                sessions[currentId].msgs.push({role: "assistant", content: reply});
                save();
            } catch (err) {
                addMsgToUI("Hata: API Anahtarını kontrol et veya tekrar dene. " + err.message, 'ai');
            }
        }

        function addMsgToUI(t, c) {
            const d = document.createElement('div'); d.className = `msg ${c}`; d.innerHTML = t;
            const container = document.getElementById('chat-container');
            container.appendChild(d); container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const list = document.getElementById('session-list'); list.innerHTML = '';
            Object.keys(sessions).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = `session-item ${id === currentId ? 'active' : ''}`;
                item.innerText = sessions[id].title;
                item.onclick = () => { currentId = id; save(); renderMessages(); toggleMenu(); };
                list.appendChild(item);
            });
        }

        function renderMessages() {
            const container = document.getElementById('chat-container'); container.innerHTML = '';
            if(currentId && sessions[currentId]) {
                sessions[currentId].msgs.forEach(m => {
                    if(m.role !== 'system') {
                        let text = typeof m.content === 'string' ? m.content : m.content[0].text;
                        addMsgToUI(text, m.role === 'user' ? 'user' : 'ai');
                    }
                });
            }
        }

        function save() { 
            localStorage.setItem('zx_v41_data', JSON.stringify(sessions)); 
            localStorage.setItem('zx_v41_id', currentId); 
        }

        window.onload = () => { if(currentId) renderMessages(); };
    </script>
</body>
</html>
