<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEKA-X ELITE 🦾</title>
    <style>
        :root { 
            --bg: #050505; --panel: #121212; --accent: #00ffcc; --text: #e0e0e0; 
            --user-bg: linear-gradient(135deg, #00ffcc, #00cca3);
        }
        
        /* Tema Renkleri */
        body.tema-besiktas { --accent: #ffffff; --user-bg: linear-gradient(135deg, #333, #000); --text: #fff; }
        body.tema-galatasaray { --accent: #ff0000; --user-bg: linear-gradient(135deg, #ff0000, #febd11); }
        body.tema-fenerbahce { --accent: #003399; --user-bg: linear-gradient(135deg, #003399, #ffff00); }
        body.tema-trabzonspor { --accent: #660033; --user-bg: linear-gradient(135deg, #660033, #0099cc); }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--panel); border-bottom: 2px solid #222; }
        .logo { color: var(--accent); font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 5px var(--accent); }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .msg { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 15px; animation: pop 0.3s ease; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--user-bg); color: #fff; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1d1d1d; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        /* Tema Seçim Ekranı */
        #theme-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .theme-btn { width: 80%; max-width: 300px; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .hidden { display: none !important; }

        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: var(--panel); transition: 0.4s; z-index: 100; padding: 25px; box-sizing: border-box; border-left: 2px solid var(--accent); overflow-y: auto; }
        .drawer.open { right: 0; }
        .input-area { padding: 20px; background: var(--panel); border-top: 1px solid #222; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; background: #1d1d1d; border: 1px solid #333; color: white; padding: 14px 20px; border-radius: 30px; outline: none; }
        .send-btn { background: var(--accent); width: 50px; height: 50px; border: none; border-radius: 50%; cursor: pointer; font-size: 22px; }
        .tool-btn { background: #222; color: var(--accent); padding: 8px 15px; font-size: 12px; border: 1px solid #333; border-radius: 30px; margin-bottom: 10px; cursor: pointer; }
        .ai-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body class="tema-besiktas">

    <div id="theme-overlay" class="hidden">
        <h2 style="color:white;">Bir Takım Seç Kaptan 🦅</h2>
        <button class="theme-btn" style="background:#000; color:#fff;" onclick="setTheme('besiktas')">Beşiktaş 🦅</button>
        <button class="theme-btn" style="background:#ff0000; color:#febd11;" onclick="setTheme('galatasaray')">Galatasaray 🦁</button>
        <button class="theme-btn" style="background:#003399; color:#ffff00;" onclick="setTheme('fenerbahce')">Fenerbahçe 🐦</button>
        <button class="theme-btn" style="background:#660033; color:#0099cc;" onclick="setTheme('trabzonspor')">Trabzonspor 🌪️</button>
    </div>

    <div class="header">
        <div class="logo">⚡ ZEKA-X ELITE 🦾</div>
        <div onclick="toggleDrawer()" style="cursor:pointer; color:var(--accent); font-size:26px;">☰</div>
    </div>

    <div id="chat-container">
        <div class="msg ai">👋 Selam! Takımını seçtin mi? Ruhun sahaya yansısın. 🦅</div>
    </div>

    <div id="drawer" class="drawer">
        <button onclick="document.getElementById('theme-overlay').classList.remove('hidden')" style="width:100%; padding:10px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:bold; margin-bottom:20px;">🎨 TEMA DEĞİŞTİR</button>
        <div id="history-list"></div>
        <button onclick="startNewChat()" style="width:100%; padding:12px; background:none; border:1px solid var(--accent); color:var(--accent); border-radius:10px; font-weight:bold; margin-top:20px;">➕ YENİ SOHBET</button>
    </div>

    <div class="input-area">
        <div style="display:flex; gap:10px;">
            <button class="tool-btn" onclick="handleAction('image')">🖼️ GÖRSEL OLUŞTUR</button>
            <button class="tool-btn" onclick="toggleDrawer()">🔍 GEÇMİŞİ TARA</button>
        </div>
        <form class="input-row" onsubmit="event.preventDefault(); handleAction('chat');">
            <input type="text" id="userInput" placeholder="Yaz bakalım kral..." autocomplete="off">
            <button type="submit" class="send-btn">🚀</button>
        </form>
    </div>

    <script>
        let API_KEY = localStorage.getItem('groq_key_v8');
        let currentChatId = Date.now().toString();

        if (!API_KEY) {
            API_KEY = prompt("Lütfen Groq API Anahtarını girin:");
            if (API_KEY) localStorage.setItem('groq_key_v8', API_KEY.trim());
        }

        // Tema Yönetimi
        function setTheme(team) {
            document.body.className = 'tema-' + team;
            localStorage.setItem('user_theme', team);
            document.getElementById('theme-overlay').classList.add('hidden');
        }
        const savedTheme = localStorage.getItem('user_theme');
        if(savedTheme) setTheme(savedTheme); else document.getElementById('theme-overlay').classList.remove('hidden');

        function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); if(document.getElementById('drawer').classList.contains('open')) updateHistoryUI(); }

        async function handleAction(type) {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            const time = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

            if (type === 'chat') {
                addMsg(text, 'user', time);
                input.value = '';
                saveLocal(currentChatId, { role: 'user', content: text, time });

                const aiMsg = addMsg("🤖 Düşünüyorum...", 'ai', time);
                try {
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            model: "llama-3.3-70b-versatile", 
                            messages: [
                                {role: "system", content: "Sen Zeka-X Elite sürümüsün. Geliştiricin Bedirhan Ayaz. Samimi lakapları (Kral, Reis vb.) anla ve doğal davran."},
                                ...getHist(currentChatId).map(m => ({ role: m.role, content: m.content }))
                            ]
                        })
                    });
                    const data = await res.json();
                    const reply = data.choices[0].message.content;
                    aiMsg.innerHTML = reply + `<span style="font-size:10px; display:block; opacity:0.5; text-align:right;">${time}</span>`;
                    saveLocal(currentChatId, { role: 'assistant', content: reply, time });
                } catch { aiMsg.innerText = "❌ Hata: Bağlantı sorunu."; }
            } else {
                addMsg(`🖼️ İstek: ${text}`, 'user', time);
                input.value = '';
                const aiMsg = addMsg("🎨 Çiziyorum...", 'ai', time);
                const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?width=1024&height=1024&nologo=true`;
                aiMsg.innerHTML = `Hazır: <br><img src="${imgUrl}" class="ai-img">`;
                saveLocal(currentChatId, { role: 'assistant', content: `[Görsel]: ${text}`, img: imgUrl, time });
            }
        }

        function addMsg(t, c, tm) {
            const d = document.createElement('div');
            d.className = `msg ${c}`;
            d.innerHTML = t;
            const cont = document.getElementById('chat-container');
            cont.appendChild(d);
            cont.scrollTop = cont.scrollHeight;
            return d;
        }

        function saveLocal(id, obj) {
            let db = JSON.parse(localStorage.getItem('zekax_db_v8') || "{}");
            if (!db[id]) db[id] = { title: obj.content.substring(0, 30), messages: [] };
            db[id].messages.push(obj);
            localStorage.setItem('zekax_db_v8', JSON.stringify(db));
        }

        function getHist(id) { return JSON.parse(localStorage.getItem('zekax_db_v8') || "{}")[id]?.messages || []; }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            let db = JSON.parse(localStorage.getItem('zekax_db_v8') || "{}");
            list.innerHTML = "";
            Object.keys(db).reverse().forEach(id => {
                const card = document.createElement('div');
                card.style = "background:#1d1d1d; padding:10px; border-radius:10px; margin-bottom:10px; cursor:pointer; border:1px solid #333;";
                card.innerHTML = `<b>${db[id].title}...</b>`;
                card.onclick = () => {
                    currentChatId = id;
                    document.getElementById('chat-container').innerHTML = "";
                    db[id].messages.forEach(m => addMsg(m.img ? `<img src="${m.img}" class="ai-img">` : m.content, m.role === 'user' ? 'user' : 'ai', m.time));
                    toggleDrawer();
                };
                list.appendChild(card);
            });
        }
        function startNewChat() { currentChatId = Date.now().toString(); document.getElementById('chat-container').innerHTML = '<div class="msg ai">✨ Yeni sohbet başladı!</div>'; toggleDrawer(); }
    </script>
</body>
    </html>
