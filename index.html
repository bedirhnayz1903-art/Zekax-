<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMind AI Core | En Derin Bilgi</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --deep-space: #050a14;
            --matrix-green: #00ff41;
            --text-silver: #e0e0e0;
        }

        body {
            background: var(--deep-space);
            color: var(--text-silver);
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #terminal {
            width: 90%;
            max-width: 900px;
            height: 80vh;
            background: rgba(10, 20, 35, 0.95);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Scanline Efekti - Gerçekçi Ekran Hissi */
        #terminal::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
        }

        .input-area {
            display: flex;
            border-top: 1px solid var(--neon-blue);
            padding-top: 15px;
        }

        #user-input {
            background: transparent;
            border: none;
            color: var(--matrix-green);
            flex-grow: 1;
            font-size: 1.1rem;
            outline: none;
        }

        .prefix { color: var(--neon-blue); margin-right: 10px; }
        .ai-response { color: var(--text-silver); margin-bottom: 15px; border-left: 3px solid var(--neon-blue); padding-left: 10px; }
        .thought { color: #888; font-style: italic; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">
        <div class="ai-response">Sistem çevrimiçi. Veritabanı %100 kapasite ile çalışıyor. Ne sormak istersin?</div>
    </div>
    <div class="input-area">
        <span class="prefix">BEDO_X@ROOT:~$</span>
        <input type="text" id="user-input" autofocus autocomplete="off">
    </div>
</div>

<script>
    const inputField = document.getElementById('user-input');
    const outputArea = document.getElementById('output');

    // Bu "Zeka" katmanıdır. Gelen soruları analiz eder.
    const brain = {
        "merhaba": "Selam! Bilgi yarışmasında her zaman yanındayım. Ne öğrenmek istersin?",
        "kimsin": "Ben senin dijital yansımayım; her türlü veriyi işleyebilen yüksek performanslı bir asistanım.",
        "futbol": "Beşiktaş JK'nın son transfer haberlerini mi merak ediyorsun, yoksa bir taktik analiz mi yapalım?",
        "kodlama": "HTML, CSS ve JavaScript kullanarak dünyaları inşa edebiliriz. Hangi projeye başlıyoruz?",
        "saat kaç": () => new Date().toLocaleTimeString('tr-TR'),
        "varsayılan": "Bu soru üzerine derin algoritmalarımı çalıştırıyorum... Görünüşe göre bu konuda uzmanlaşmam gereken bir alan. Ama çözüm için buradayım!"
    };

    inputField.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const val = inputField.value.toLowerCase().trim();
            handleQuery(val);
            inputField.value = '';
        }
    });

    async function handleQuery(query) {
        if (!query) return;

        // Kullanıcı yazısını ekrana bas
        outputArea.innerHTML += `<div><span style="color:var(--neon-blue)">></span> ${query}</div>`;
        
        // "Düşünme" simülasyonu (Zekice bir dokunuş)
        const thinking = document.createElement('div');
        thinking.className = 'thought';
        thinking.innerText = "Sistem analiz ediyor...";
        outputArea.appendChild(thinking);
        
        await new Promise(r => setTimeout(r, 800)); // 0.8 saniye bekleme
        thinking.remove();

        // Cevabı belirle
        let response = brain[query] || brain["varsayılan"];
        if (typeof response === 'function') response = response();

        // Yapay Zeka cevabını ekrana bas
        const resDiv = document.createElement('div');
        resDiv.className = 'ai-response';
        resDiv.innerText = response;
        outputArea.appendChild(resDiv);

        // Otomatik kaydır
        outputArea.scrollTop = outputArea.scrollHeight;
    }
</script>

</body>
</html>
