<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ZEKA-X ULTIMATE 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --panel: #0d0d0d; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; }
        body { display: flex; flex-direction: column; color: var(--text); }

        /* 🚀 Karşılama Ekranı */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center; transition: 0.5s;
        }
        .intro-box { max-width: 400px; }
        .intro-box h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 15px; letter-spacing: 5px; font-weight: 800; }
        .intro-box p { color: #aaa; line-height: 1.6; margin-bottom: 30px; font-size: 1rem; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 18px 50px; border-radius: 35px; font-weight: 800; cursor: pointer; box-shadow: 0 0 25px rgba(0,255,204,0.3); transition: 0.3s; }
        .start-btn:active { transform: scale(0.95); }

        /* Sidebar - Geçmiş */
        #sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; border-left: 1px solid #222;
        }
        #sidebar.open { right: 0; }
        .session-item { padding: 12px; background: #181818; border-radius: 12px; margin-bottom: 10px; font-size: 13px; cursor: pointer; border: 1px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-item.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }
        .new-btn { background: var(--accent); color: #000; padding: 14px; border-radius: 12px; border: none; font-weight: 800; margin-bottom: 25px; cursor: pointer; }

        /* Header */
        .header { height: 65px; padding: 0 20px; background: rgba(0,0,0,0.95); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; z-index: 100; }
        .brand { color: var(--accent); font-weight: 800; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
        .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }

        /* Mesaj Alanı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        .msg { padding: 14px 18px; border-radius: 22px; max-width: 88%; font-size: 14.5px; line-height: 1.6; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #111; border: 1px solid #222; border-bottom-left-radius: 4px; }

        /* Giriş Alanı - Klavye Sabitleme */
        .input-area { padding: 15px 20px 30px 20px; background: #000; border-top: 1px solid #222; flex-shrink: 0; }
        .wrapper { display: flex; gap: 12px; background: #151515; padding: 6px 6px 6px 18px; border-radius: 30px; align-items: center; border: 1px solid #252525; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; height: 45px; font-size: 16px; }
        .btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        
        #preview { display: none; height: 60px; border-radius: 8px; margin-bottom: 10px; border: 2px solid var(--accent); object-fit: cover; }
        .ai-img { width: 100%; border-radius: 18px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; opacity: 0; visibility: hidden; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-box">
            <h1>ZEKA-X</h1>
            <p>Bedirhan Ayaz tarafından geliştirilen, görsel okuyabilen ve hayalindekileri çizebilen yeni nesil yapay zeka asistanı.</p>
            <button class="start-btn" onclick="document.getElementById('intro-screen').classList.add('hidden')">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="sidebar">
        <button class="new-btn" onclick="newChat()">+ YENİ SOHBET</button>
        <div id="session-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="color:#444; background:none; border:none; font-size:10px; cursor:pointer; margin-top:10px;">BELLEĞİ SIFIRLA</button>
    </div>

    <div class="header">
        <div class="brand"><div class="brand-dot"></div> ZEKA-X PRIME</div>
        <div onclick="toggleMenu()" style="font-size: 28px; cursor: pointer; color: var(--accent); padding: 5px;">⋮</div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <img id="preview" src="">
        <form class="wrapper" onsubmit="event.preventDefault(); send();">
            <button type="button" onclick="document.getElementById('f').click()" style="background:none; border:none; color:#555; font-size:24px; cursor:pointer;">⊕</button>
            <input type="file" id="f" style="display:none" accept="image/*" onchange="imgPre(this)">
            <input type="text" id="in" placeholder="Zeka-X'e bir şey sor..." autocomplete="off">
            <button type="submit" class="btn">🚀</button>
        </form>
    </div>

    <script>
        let sessions = JSON.parse(localStorage.getItem('zx_v39_sessions')) || {};
        let currentId = localStorage.getItem('zx_v39_cid');
        let imgBase = null;
        const KEY = localStorage.getItem('groq_key_v30');

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); renderList(); }
        
        function newChat() {
            currentId = 'zx_' + Date.now();
            sessions[currentId] = { title: "Yeni Sohbet", msgs: [{role:"system", content:"Sen Zeka-X'sin. Bedirhan Ayaz tarafından geliştirildin. Sorulara kısa, net ve öz cevaplar ver. Kim olduğunu sorarlarsa 'Ben Bedirhan Ayaz tarafından kodlanan Zeka-X'im' de."}] };
            save(); renderChat(); document.getElementById('sidebar').classList.remove('open');
        }

        function imgPre(i) {
            if (i.files[0]) {
                const r = new FileReader();
                r.onload = e => { 
                    document.getElementById('preview').src = e.target.result; 
                    document.getElementById('preview').style.display='block'; 
                    imgBase = e.target.result.split(',')[1]; 
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        async function send() {
            const input = document.getElementById('in');
            const txt = input.value.trim();
            if(!txt && !imgBase) return;
            if(!currentId) newChat();

            let displayTxt = txt;
            if(imgBase) displayTxt += `<br><img src="data:image/jpeg;base64,${imgBase}" style="width:100px; border-radius:10px; margin-top:10px;">`;
            addMsg(displayTxt, 'user');

            // Görsel varsa vision mesaj yapısı, yoksa düz metin
            let currentMsg;
            if(imgBase) {
                currentMsg = {role:"user", content: [
                    {type:"text", text: txt || "Bu resmi analiz et."},
                    {type:"image_url", image_url: {url: `data:image/jpeg;base64,${imgBase}`}}
                ]};
            } else {
                currentMsg = {role:"user", content: txt};
            }

            sessions[currentId].msgs.push(currentMsg);
            if(sessions[currentId].title === "Yeni Sohbet") sessions[currentId].title = txt ? txt.substring(0,25) : "Görsel Analiz";
            
            const tmpImg = imgBase;
            input.value = ''; imgBase = null; document.getElementById('preview').style.display='none';

            let draw = (txt.toLowerCase().includes("çiz") || txt.toLowerCase().includes("oluştur")) ? `https://image.pollinations.ai/prompt/${encodeURIComponent(txt)}?nologo=true` : null;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: tmpImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: sessions[currentId].msgs,
                        temperature: 0.6
                    })
                });
                const d = await res.json();
                let rpl = d.choices[0].message.content;
                if(draw) rpl += `<br><img src="${draw}" class="ai-img">`;
                
                addMsg(rpl, 'ai');
                sessions[currentId].msgs.push({role:"assistant", content: rpl});
                save();
            } catch(e) { addMsg("Zeka-X şu an yanıt veremiyor kral.", 'ai'); }
        }

        function addMsg(t, c) {
            const d = document.createElement('div'); d.className = `msg ${c}`; d.innerHTML = t;
            const cnt = document.getElementById('chat-container'); cnt.appendChild(d);
            cnt.scrollTop = cnt.scrollHeight;
        }

        function renderList() {
            const l = document.getElementById('session-list'); l.innerHTML = '';
            Object.keys(sessions).reverse().forEach(id => {
                const i = document.createElement('div'); i.className = `session-item ${id===currentId?'active':''}`;
                i.innerText = sessions[id].title;
                i.onclick = () => { currentId = id; save(); renderChat(); document.getElementById('sidebar').classList.remove('open'); };
                l.appendChild(i);
            });
        }

        function renderChat() {
            const cnt = document.getElementById('chat-container'); cnt.innerHTML = '';
            if(currentId && sessions[currentId]) {
                sessions[currentId].msgs.forEach(m => { 
                    if(m.role!=='system') {
                        let content = typeof m.content === 'string' ? m.content : m.content[0].text;
                        addMsg(content, m.role==='user'?'user':'ai'); 
                    }
                });
            }
        }

        function save() { 
            localStorage.setItem('zx_v39_sessions', JSON.stringify(sessions)); 
            localStorage.setItem('zx_v39_cid', currentId); 
        }

        window.onload = () => { if(currentId) renderChat(); };
    </script>
</body>
            </html>
