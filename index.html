<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>ZEKA-X ULTIMATE 🦾</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --panel: #0d0d0d; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); position: fixed; }
        body { display: flex; flex-direction: column; color: var(--text); }

        /* 🚀 Başlangıç ve Tanıtım Paneli */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        .intro-box h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 5px; font-weight: 800; }
        .intro-box p { color: #aaa; line-height: 1.6; margin-bottom: 30px; font-size: 1rem; }
        .start-btn { 
            background: var(--accent); color: #000; border: none; padding: 18px 50px; 
            border-radius: 35px; font-weight: 800; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,204,0.4);
        }

        /* ☰ Geçmiş Paneli (Sidebar) */
        #sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel); z-index: 10000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 25px; border-left: 1px solid #222;
        }
        #sidebar.open { right: 0; }
        .session-item { 
            padding: 12px; background: #181818; border-radius: 12px; margin-bottom: 8px; 
            font-size: 13px; cursor: pointer; border: 1px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .session-item.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.05); }

        /* 📱 Header */
        .header { height: 65px; padding: 0 20px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        .brand { color: var(--accent); font-weight: 800; letter-spacing: 2px; }

        /* 💬 Mesajlar Alanı */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { padding: 14px 18px; border-radius: 20px; max-width: 85%; font-size: 14.5px; line-height: 1.5; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #111; border: 1px solid #222; border-bottom-left-radius: 4px; }

        /* ⌨️ Klavye Dostu Giriş Alanı */
        .input-area { padding: 15px 15px 30px 15px; background: #000; border-top: 1px solid #222; flex-shrink: 0; }
        .wrapper { display: flex; gap: 10px; background: #151515; padding: 5px 5px 5px 15px; border-radius: 30px; align-items: center; border: 1px solid #252525; }
        input { flex: 1; background: none; border: none; color: #fff; outline: none; height: 45px; font-size: 16px; }
        .btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn:active { transform: scale(0.9); }
        
        #preview { display: none; height: 60px; border-radius: 8px; margin-bottom: 10px; border: 2px solid var(--accent); object-fit: cover; }
        .hidden { display: none !important; }
        .ai-img { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-box">
            <h1>ZEKA-X</h1>
            <p>Bedirhan Ayaz tarafından kodlanan; görsel analiz, yaratıcı çizim ve akıllı bellek özelliklerine sahip "Final" versiyon.</p>
            <button class="start-btn" onclick="startSystem()">BAŞLAT</button>
        </div>
    </div>

    <div id="sidebar">
        <button onclick="newChat()" style="background:var(--accent); color:#000; padding:14px; border-radius:12px; border:none; font-weight:800; cursor:pointer; margin-bottom:25px;">+ YENİ SOHBET</button>
        <div id="session-list" style="flex:1; overflow-y:auto;"></div>
        <button onclick="localStorage.clear(); location.reload();" style="color:#444; background:none; border:none; font-size:10px; cursor:pointer; margin-top:10px;">BELLEĞİ SIFIRLA</button>
    </div>

    <div class="header">
        <div class="brand">ZEKA-X CORE</div>
        <div id="menu-btn" style="font-size: 28px; cursor: pointer; color: var(--accent); padding: 5px;">⋮</div>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <img id="preview" src="">
        <form id="main-form" class="wrapper">
            <button type="button" onclick="document.getElementById('file-input').click()" style="background:none; border:none; color:#555; font-size:24px; cursor:pointer;">⊕</button>
            <input type="file" id="file-input" style="display:none" accept="image/*">
            <input type="text" id="user-input" placeholder="Zeka-X'e yaz veya çizdir..." autocomplete="off">
            <button type="submit" class="btn">🚀</button>
        </form>
    </div>

    <script>
        // 🛠️ AYARLAR VE HAFIZA
        let sessions = JSON.parse(localStorage.getItem('zx_final_v1')) || {};
        let currentId = localStorage.getItem('zx_final_cid');
        let currentImgBase = null;
        const GROQ_KEY = localStorage.getItem('groq_key_v30');

        // 🚀 SİSTEM BAŞLATMA
        function startSystem() {
            document.getElementById('intro-screen').classList.add('hidden');
            if(!currentId) newChat();
            addMsg("Merhaba! Ben Bedirhan Ayaz tarafından geliştirilen Zeka-X. Sana nasıl yardımcı olabilirim?", 'ai');
        }

        // ☰ MENÜ YÖNETİMİ
        document.getElementById('menu-btn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('open');
            renderSessionList();
        };

        function newChat() {
            currentId = 'zx_' + Date.now();
            sessions[currentId] = { 
                title: "Yeni Sohbet", 
                msgs: [{role: "system", content: "Sen Zeka-X'sin. Bedirhan Ayaz tarafından geliştirildin. Kısa, öz ve net bilgi ver. Kim olduğunu sorarlarsa Bedirhan Ayaz'ın yapay zekası olduğunu söyle."}] 
            };
            saveData();
            renderChat();
            document.getElementById('sidebar').classList.remove('open');
        }

        // 📸 GÖRSEL ÖNİZLEME
        document.getElementById('file-input').onchange = (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('preview').src = event.target.result;
                    document.getElementById('preview').style.display = 'block';
                    currentImgBase = event.target.result.split(',')[1];
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        };

        // ✉️ MESAJ GÖNDERİMİ (ANA MOTOR)
        document.getElementById('main-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !currentImgBase) return;

            // Kullanıcı arayüzüne ekle
            let userDisplay = text;
            if(currentImgBase) userDisplay += `<br><img src="data:image/jpeg;base64,${currentImgBase}" style="width:100px; border-radius:10px; margin-top:10px;">`;
            addMsg(userDisplay, 'user');

            // Belleğe ekle
            let msgObj = currentImgBase ? 
                {role:"user", content:[{type:"text", text:text || "Analiz et"}, {type:"image_url", image_url:{url:`data:image/jpeg;base64,${currentImgBase}`}}]} : 
                {role:"user", content:text};
            
            sessions[currentId].msgs.push(msgObj);
            if(sessions[currentId].title === "Yeni Sohbet") sessions[currentId].title = text ? text.substring(0,20) : "Görsel Analiz";

            // Çizim kontrolü
            let drawUrl = (text.toLowerCase().includes("çiz") || text.toLowerCase().includes("oluştur")) ? 
                `https://image.pollinations.ai/prompt/${encodeURIComponent(text)}?nologo=true` : null;

            const tempImg = currentImgBase;
            input.value = ''; currentImgBase = null; document.getElementById('preview').style.display = 'none';

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: tempImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
                        messages: sessions[currentId].msgs
                    })
                });

                const data = await response.json();
                let reply = data.choices[0].message.content;
                
                if(drawUrl) reply += `<br><img src="${drawUrl}" class="ai-img">`;

                addMsg(reply, 'ai');
                sessions[currentId].msgs.push({role: "assistant", content: reply});
                saveData();
            } catch (err) {
                addMsg("Bağlantı sorunu! Lütfen API anahtarını kontrol et.", 'ai');
            }
        };

        // 🛠️ YARDIMCI FONKSİYONLAR
        function addMsg(t, c) {
            const d = document.createElement('div'); d.className = `msg ${c}`; d.innerHTML = t;
            const container = document.getElementById('chat-container');
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        }

        function renderSessionList() {
            const list = document.getElementById('session-list'); list.innerHTML = '';
            Object.keys(sessions).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = `session-item ${id === currentId ? 'active' : ''}`;
                item.innerText = sessions[id].title;
                item.onclick = () => { currentId = id; saveData(); renderChat(); document.getElementById('sidebar').classList.remove('open'); };
                list.appendChild(item);
            });
        }

        function renderChat() {
            const container = document.getElementById('chat-container'); container.innerHTML = '';
            if(currentId && sessions[currentId]) {
                sessions[currentId].msgs.forEach(m => {
                    if(m.role !== 'system') {
                        let content = typeof m.content === 'string' ? m.content : m.content[0].text;
                        addMsg(content, m.role === 'user' ? 'user' : 'ai');
                    }
                });
            }
        }

        function saveData() { 
            localStorage.setItem('zx_final_v1', JSON.stringify(sessions)); 
            localStorage.setItem('zx_final_cid', currentId); 
        }

        window.onload = () => { if(currentId) renderChat(); };
    </script>
</body>
            </html>
