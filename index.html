<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility Sniper - Fixed Edition</title>
    <style>
        :root { --neon: #00f2ff; --warn: #ff0055; }
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        
        /* Arayüz */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: white; padding: 20px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; border: 2px solid var(--neon); border-radius: 50%; transform: translate(-50%, -50%); }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: red; transform: translate(-50%, -50%); }
        
        .controls { position: absolute; bottom: 30px; left: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .btn { padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); border-radius: 8px; font-weight: bold; }

        #stats { position: absolute; top: 20px; left: 20px; font-size: 14px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="stats">📍 KONUM: HEALILITY KULE<br>SKOR: <span id="score">0</span></div>
        <div id="crosshair"></div>
        <div class="controls">
            <button class="btn" onclick="zoomIn()">DÜRBÜN</button>
            <button class="btn" onclick="reload()">RELOAD</button>
        </div>
        <div style="position:absolute; bottom:30px; right:30px; font-size:30px; color:var(--neon)" id="ammo">15/15</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        /**
         * BOŞ EKRAN HATASI GİDERİLMİŞ PROFESYONEL MOTOR
         */
        let scene, camera, renderer, clock;
        let ammo = 15, kills = 0, isZoomed = false;
        let enemies = [], bullets = [];
        let moveX = 0, moveY = -Math.PI / 4; // Başlangıçta hafif aşağı baksın

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505); // Karanlık şehir teması
            scene.fog = new THREE.FogExp2(0x050505, 0.008);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 100, 20); // 100 metre yüksekteyiz

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // IŞIKLANDIRMA
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 100, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            // ŞEHRİ OLUŞTUR
            buildCity();

            // MOBİL DOKUNMATİK
            window.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                moveX = -((t.clientX / window.innerWidth) - 0.5) * 3;
                moveY = -Math.PI / 4 - ((t.clientY / window.innerHeight) - 0.5) * 1.5;
            }, { passive: false });

            window.addEventListener('touchstart', (e) => {
                if(e.target.tagName !== 'BUTTON') shoot();
            });

            clock = new THREE.Clock();
            spawnEnemies();
        }

        function buildCity() {
            // 1. ÜZERİNDE DURDUĞUMUZ BİNA (Artık göreceksin)
            const myTower = new THREE.Mesh(
                new THREE.BoxGeometry(30, 200, 30),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            myTower.position.y = 0; // Kökten yukarı doğru
            scene.add(myTower);

            // 2. ŞEHİR TABANI
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000),
                new THREE.MeshStandardMaterial({ color: 0x0a0a0a })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -100; // Yer çok aşağıda
            scene.add(ground);

            // 3. ETRAFTAKİ BİNALAR (Ekran dolacak)
            for(let i=0; i<150; i++) {
                const h = 20 + Math.random() * 150;
                const b = new THREE.Mesh(
                    new THREE.BoxGeometry(15, h, 15),
                    new THREE.MeshStandardMaterial({ color: 0x222222 })
                );
                b.position.set(
                    (Math.random() - 0.5) * 800,
                    h/2 - 100,
                    (Math.random() - 0.5) * 800 - 100
                );
                scene.add(b);
            }
        }

        function zoomIn() {
            isZoomed = !isZoomed;
            camera.fov = isZoomed ? 15 : 60;
            camera.updateProjectionMatrix();
        }

        function reload() {
            ammo = 15;
            document.getElementById('ammo').innerText = ammo + "/15";
        }

        function shoot() {
            if(ammo <= 0) return;
            ammo--;
            document.getElementById('ammo').innerText = ammo + "/15";

            const b = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.v = dir.multiplyScalar(10);
            bullets.push(b);
            scene.add(b);
        }

        function spawnEnemies() {
            // İNSAN HEDEFLER
            const e = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(1, 2.5), new THREE.MeshStandardMaterial({color: 0xff0044}));
            e.add(body);
            e.position.set((Math.random()-0.5)*200, -98, (Math.random()-0.5)*200 - 150);
            enemies.push(e);
            scene.add(e);
            setTimeout(spawnEnemies, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Kamerayı döndür
            camera.rotation.set(moveY, moveX, 0);

            // Mermi hareketi ve çarpışma
            bullets.forEach((b, bi) => {
                b.position.add(b.userData.v);
                enemies.forEach((e, ei) => {
                    if(b.position.distanceTo(e.position) < 5) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        kills++; document.getElementById('score').innerText = kills;
                    }
                });
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
