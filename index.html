<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Healility Mobile Elite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #ff0000; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        #stats { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 12px; pointer-events: none; }
        #ammo { position: absolute; bottom: 20px; right: 20px; color: #ffcc00; font-size: 24px; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="stats">SKOR: <span id="s">0</span> | FPS: <span id="fps">60</span></div>
    <div id="ammo">MAG: 15/15</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // MOBİL MOTOR DEĞİŞKENLERİ
        let scene, camera, renderer, kibo;
        let score = 0, ammo = 15;
        let touchX = 0, touchY = 0;
        let enemies = [], bullets = [];

        // 1. SAHNE VE GÜNEŞ IŞIĞI
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 1, 100);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 0); // Binanın tepesi

        renderer = new THREE.WebGLRenderer({ antialias: true, precision: "mediump" }); // Mobil için orta hassasiyet
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performans sınırı
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(10, 50, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 2. ŞEHİR YAPISI
        const cityBase = new THREE.Mesh(new THREE.BoxGeometry(10, 60, 10), new THREE.MeshStandardMaterial({color: 0x444444}));
        cityBase.position.y = 0;
        scene.add(cityBase);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0x333333}));
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -30;
        scene.add(ground);

        // 3. MOBİL KONTROLLER (Touch)
        window.addEventListener('touchmove', (e) => {
            touchX = (e.touches[0].clientX / window.innerWidth) - 0.5;
            touchY = (e.touches[0].clientY / window.innerHeight) - 0.5;
            
            // Kamerayı yumuşak döndür
            camera.rotation.y = -touchX * 2;
            camera.rotation.x = -Math.PI/2.5 - (touchY * 1);
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            if(ammo > 0) shoot();
            else { ammo = 15; updateUI(); } // Otomatik hızlı reload
        });

        function shoot() {
            ammo--;
            updateUI();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.v = dir.multiplyScalar(2);
            bullets.push(b);
            scene.add(b);
        }

        function updateUI() {
            document.getElementById('s').innerText = score;
            document.getElementById('ammo').innerText = "MAG: " + ammo + "/15";
        }

        function spawnEnemy() {
            const e = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
            e.position.set((Math.random()-0.5)*100, -29, (Math.random()-0.5)*100 - 50);
            enemies.push(e);
            scene.add(e);
            setTimeout(spawnEnemy, 2000);
        }

        // 4. OYUN DÖNGÜSÜ (Update)
        function animate() {
            requestAnimationFrame(animate);

            bullets.forEach((b, i) => {
                b.position.add(b.userData.v);
                if(b.position.y < -30) { scene.remove(b); bullets.splice(i, 1); }
            });

            enemies.forEach((e, ei) => {
                e.position.z += 0.1; // Sana doğru yavaşça gelsinler
                bullets.forEach((b, bi) => {
                    if(e.position.distanceTo(b.position) < 2) {
                        scene.remove(e); enemies.splice(ei, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        score++; updateUI();
                    }
                });
            });

            renderer.render(scene, camera);
        }

        spawnEnemy();
        animate();
    </script>
</body>
</html>
