<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini Adventure Shooter</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
    canvas { display:block; margin:0 auto; background:#222; }
    #ui {
        position:fixed;
        top:10px;
        left:10px;
        color:white;
        z-index:10;
    }
    button {
        position:fixed;
        bottom:20px;
        padding:15px;
        font-size:16px;
    }
    #left { left:20px; }
    #right { left:100px; }
    #shoot { right:20px; }
</style>
</head>
<body>

<div id="ui">
    ❤️ Can: <span id="hp">100</span> | 🔫 Mermi: <span id="ammo">∞</span>
</div>

<canvas id="game"></canvas>

<button id="left">⬅️</button>
<button id="right">➡️</button>
<button id="shoot">🔫</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
    x: 100,
    y: canvas.height - 120,
    w: 40,
    h: 40,
    hp: 100,
    speed: 6
};

let bullets = [];
let enemies = [];

function spawnEnemy(){
    enemies.push({
        x: Math.random() * canvas.width,
        y: -20,
        w: 35,
        h: 35,
        speed: 2 + Math.random()*2
    });
}

setInterval(spawnEnemy, 1500);

function drawPlayer(){
    ctx.fillStyle = "lime";
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

function drawBullets(){
    ctx.fillStyle = "yellow";
    bullets.forEach((b,i)=>{
        b.y -= 8;
        ctx.fillRect(b.x, b.y, 5, 10);

        if(b.y < 0) bullets.splice(i,1);
    });
}

function drawEnemies(){
    ctx.fillStyle = "red";
    enemies.forEach((e,ei)=>{
        e.y += e.speed;
        ctx.fillRect(e.x, e.y, e.w, e.h);

        // çarpışma
        bullets.forEach((b,bi)=>{
            if(b.x < e.x+e.w &&
               b.x+5 > e.x &&
               b.y < e.y+e.h &&
               b.y+10 > e.y){
                enemies.splice(ei,1);
                bullets.splice(bi,1);
            }
        });

        // oyuncuya çarpma
        if(e.x < player.x+player.w &&
           e.x+e.w > player.x &&
           e.y < player.y+player.h &&
           e.y+e.h > player.y){
            player.hp -= 10;
            enemies.splice(ei,1);
        }
    });
}

function updateUI(){
    document.getElementById("hp").innerText = player.hp;
}

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawPlayer();
    drawBullets();
    drawEnemies();
    updateUI();

    if(player.hp <= 0){
        alert("OYUN BİTTİ!");
        location.reload();
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();

// CONTROLS
document.getElementById("left").ontouchstart = ()=> player.x -= player.speed;
document.getElementById("right").ontouchstart = ()=> player.x += player.speed;

document.getElementById("shoot").ontouchstart = ()=>{
    bullets.push({
        x: player.x + player.w/2,
        y: player.y
    });
};

// klavye (PC için)
document.addEventListener("keydown",(e)=>{
    if(e.key=="ArrowLeft") player.x -= player.speed;
    if(e.key=="ArrowRight") player.x += player.speed;
    if(e.key==" "){
        bullets.push({
            x: player.x + player.w/2,
            y: player.y
        });
    }
});
</script>

</body>
</html>
